<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gtt" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gtt)" opacity="0.3"/>

  <!-- LEFT: beepiteheto szaruzat -->
  <polygon points="120,300 320,170 520,300" fill="none" stroke="#2ecc71" stroke-width="3"/>
  <line x1="320" y1="170" x2="320" y2="300" stroke="#2ecc71" stroke-width="2"/>
  <line x1="200" y1="237" x2="320" y2="237" stroke="#2ecc71" stroke-width="2"/>
  <line x1="440" y1="237" x2="320" y2="237" stroke="#2ecc71" stroke-width="2"/>
  <!-- koztes fodem -->
  <line x1="140" y1="300" x2="500" y2="300" stroke="#f39c12" stroke-width="5"/>
  <rect x="160" y="300" width="320" height="110" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <!-- usable room in attic -->
  <rect x="230" y="240" width="180" height="58" fill="#2ecc71" opacity="0.15"/>
  <text x="320" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">lakoter</text>
  <text x="320" y="445" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#2ecc71" font-weight="bold">Beepitheto</text>
  <text x="320" y="470" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">szaruzat + teherhordo fodem</text>

  <!-- RIGHT: nem beepiteheto racsostarto -->
  <polygon points="680,300 880,170 1080,300" fill="none" stroke="#7f8c8d" stroke-width="3"/>
  <!-- truss webs -->
  <g stroke="#7f8c8d" stroke-width="1.5">
    <line x1="680" y1="300" x2="780" y2="235"/><line x1="780" y1="300" x2="780" y2="235"/>
    <line x1="780" y1="235" x2="880" y2="300"/><line x1="880" y1="170" x2="880" y2="300"/>
    <line x1="880" y1="300" x2="980" y2="235"/><line x1="980" y1="235" x2="1080" y2="300"/><line x1="980" y1="300" x2="980" y2="235"/>
  </g>
  <line x1="680" y1="300" x2="1080" y2="300" stroke="#e74c3c" stroke-width="4"/>
  <rect x="720" y="300" width="320" height="110" fill="#2a2a4e" stroke="#7f8c8d" stroke-width="2"/>
  <text x="880" y="262" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e74c3c">nem jarhato padlas</text>
  <text x="880" y="445" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#bdc3c7" font-weight="bold">Nem beepitheto</text>
  <text x="880" y="470" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">racsostarto, hoszig. a fodemen</text>

  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12">A racsostartos padlas UTOLAG NEM epitheto be – vegleges dontes!</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="white">Beepitett vagy nem beepitett tetoter?</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Szaruzat vs racsostarto</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">a tervezes egyik korai, vegleges dontese</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
