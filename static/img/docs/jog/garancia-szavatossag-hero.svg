<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e" rx="0"/>
  <defs>
    <linearGradient id="grd1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grd1)"/>

  <!-- Shield icon -->
  <g transform="translate(600,200)">
    <path d="M0-120 L80-80 L80,20 C80,80 40,120 0,140 C-40,120 -80,80 -80,20 L-80-80 Z" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.8"/>
    <path d="M0-90 L60-60 L60,15 C60,60 30,90 0,105 C-30,90 -60,60 -60,15 L-60-60 Z" fill="#312e81" opacity="0.5"/>
    <!-- Checkmark in shield -->
    <path d="M-25,5 L-8,25 L30,-15" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Time periods -->
  <g transform="translate(250,380)" text-anchor="middle">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
    <text y="7" font-family="sans-serif" font-size="22" font-weight="bold" fill="#c4b5fd">3 év</text>
  </g>
  <g transform="translate(600,380)" text-anchor="middle">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
    <text y="7" font-family="sans-serif" font-size="22" font-weight="bold" fill="#a78bfa">5 év</text>
  </g>
  <g transform="translate(950,380)" text-anchor="middle">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="#312e81" stroke="#a78bfa" stroke-width="2.5"/>
    <text y="7" font-family="sans-serif" font-size="22" font-weight="bold" fill="#818cf8">10 év</text>
  </g>

  <!-- Labels under periods -->
  <text x="250" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">&lt;10M Ft</text>
  <text x="600" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">10–100M Ft</text>
  <text x="950" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">&gt;100M Ft</text>

  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="#f1f5f9">Garancia és szavatosság</text>
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Kötelező jótállási időszakok az építkezésnél</text>

  <!-- Brand -->
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
