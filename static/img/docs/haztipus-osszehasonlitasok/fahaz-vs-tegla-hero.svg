<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="white">Faház vs Téglaház</text>
  <text x="600" y="95" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94a3b8">Mikor éri meg a fa és mikor a tégla? – 2026-os összehasonlítás</text>

  <!-- Left house: Faház (wooden) -->
  <g transform="translate(180,180)">
    <!-- Log wall texture -->
    <rect x="0" y="60" width="200" height="150" fill="#92400e" stroke="#b45309" stroke-width="2" rx="4"/>
    <!-- Horizontal log lines -->
    <line x1="5" y1="80" x2="195" y2="80" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="100" x2="195" y2="100" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="120" x2="195" y2="120" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="140" x2="195" y2="140" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="160" x2="195" y2="160" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <line x1="5" y1="180" x2="195" y2="180" stroke="#78350f" stroke-width="1.5" opacity="0.5"/>
    <!-- Roof (wooden shingles feel) -->
    <polygon points="100,-15 -25,60 225,60" fill="#78350f" stroke="#b45309" stroke-width="2"/>
    <!-- Windows -->
    <rect x="25" y="90" width="55" height="45" fill="#451a03" stroke="#b45309" stroke-width="2" rx="2"/>
    <line x1="52.5" y1="90" x2="52.5" y2="135" stroke="#b45309" stroke-width="1.5"/>
    <line x1="25" y1="112.5" x2="80" y2="112.5" stroke="#b45309" stroke-width="1.5"/>
    <rect x="120" y="90" width="55" height="45" fill="#451a03" stroke="#b45309" stroke-width="2" rx="2"/>
    <line x1="147.5" y1="90" x2="147.5" y2="135" stroke="#b45309" stroke-width="1.5"/>
    <line x1="120" y1="112.5" x2="175" y2="112.5" stroke="#b45309" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="72" y="145" width="55" height="65" fill="#451a03" stroke="#b45309" stroke-width="2" rx="2"/>
    <!-- Tree icon -->
    <circle cx="-30" y="160" r="20" fill="#166534" opacity="0.6"/>
    <rect x="-33" y="175" width="6" height="25" fill="#78350f" opacity="0.6"/>
    <circle cx="230" y="160" r="16" fill="#166534" opacity="0.5"/>
    <rect x="227" y="172" width="6" height="22" fill="#78350f" opacity="0.5"/>
    <!-- CO2 badge -->
    <g transform="translate(70,-35)">
      <rect x="0" y="0" width="60" height="22" fill="#166534" rx="11" opacity="0.9"/>
      <text x="30" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">-CO₂</text>
    </g>
    <!-- Label -->
    <text x="100" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#d97706" font-weight="bold">FAHÁZ</text>
  </g>

  <!-- VS circle -->
  <circle cx="600" cy="300" r="36" fill="#6366f1" opacity="0.9"/>
  <text x="600" y="308" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">VS</text>

  <!-- Right house: Téglaház -->
  <g transform="translate(820,180)">
    <!-- Brick wall -->
    <rect x="0" y="60" width="200" height="150" fill="#991b1b" stroke="#dc2626" stroke-width="2" rx="4"/>
    <!-- Brick pattern -->
    <g opacity="0.3" stroke="#7f1d1d" stroke-width="1">
      <line x1="0" y1="75" x2="200" y2="75"/><line x1="0" y1="90" x2="200" y2="90"/>
      <line x1="0" y1="105" x2="200" y2="105"/><line x1="0" y1="120" x2="200" y2="120"/>
      <line x1="0" y1="135" x2="200" y2="135"/><line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="0" y1="165" x2="200" y2="165"/><line x1="0" y1="180" x2="200" y2="180"/>
      <line x1="50" y1="60" x2="50" y2="75"/><line x1="100" y1="60" x2="100" y2="75"/><line x1="150" y1="60" x2="150" y2="75"/>
      <line x1="25" y1="75" x2="25" y2="90"/><line x1="75" y1="75" x2="75" y2="90"/><line x1="125" y1="75" x2="125" y2="90"/><line x1="175" y1="75" x2="175" y2="90"/>
      <line x1="50" y1="90" x2="50" y2="105"/><line x1="100" y1="90" x2="100" y2="105"/><line x1="150" y1="90" x2="150" y2="105"/>
    </g>
    <!-- Roof (tile style) -->
    <polygon points="100,-15 -25,60 225,60" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
    <!-- Windows -->
    <rect x="25" y="90" width="55" height="45" fill="#450a0a" stroke="#dc2626" stroke-width="2" rx="2"/>
    <line x1="52.5" y1="90" x2="52.5" y2="135" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="120" y="90" width="55" height="45" fill="#450a0a" stroke="#dc2626" stroke-width="2" rx="2"/>
    <line x1="147.5" y1="90" x2="147.5" y2="135" stroke="#dc2626" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="72" y="145" width="55" height="65" fill="#450a0a" stroke="#dc2626" stroke-width="2" rx="2"/>
    <!-- 150 years badge -->
    <g transform="translate(60,-35)">
      <rect x="0" y="0" width="80" height="22" fill="#991b1b" rx="11" opacity="0.9"/>
      <text x="40" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">150+ év</text>
    </g>
    <!-- Label -->
    <text x="100" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#dc2626" font-weight="bold">TÉGLAHÁZ</text>
  </g>

  <!-- Metric badges bottom -->
  <g transform="translate(0,480)">
    <rect x="40" y="0" width="260" height="65" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="170" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Kulcsrakész Ft/m²</text>
    <text x="110" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#d97706" font-weight="bold">330-750k</text>
    <text x="170" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">vs</text>
    <text x="230" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">600-850k</text>

    <rect x="330" y="0" width="240" height="65" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="450" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Építési idő</text>
    <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#d97706" font-weight="bold">3-8 hó</text>
    <text x="450" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">vs</text>
    <text x="500" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">8-14 hó</text>

    <rect x="600" y="0" width="260" height="65" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="730" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Élettartam</text>
    <text x="670" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#d97706" font-weight="bold">50-120 év</text>
    <text x="730" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">vs</text>
    <text x="790" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#dc2626" font-weight="bold">100-150 év</text>

    <rect x="890" y="0" width="270" height="65" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="1025" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">CO₂ hatás</text>
    <text x="970" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#22c55e" font-weight="bold">-25t</text>
    <text x="1025" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">vs</text>
    <text x="1080" y="50" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ef4444" font-weight="bold">+50t</text>
  </g>

  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#475569">hazepitesikalauz.hu</text>
</svg>
