<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <!-- Lightning bolt icon -->
  <g transform="translate(520, 50)">
    <polygon points="80,0 20,120 70,120 50,220 140,80 90,80 110,0" fill="#f59e0b" opacity="0.9"/>
  </g>
  <!-- Cost tiers -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="280" height="140" rx="12" fill="#312e81"/>
    <text x="140" y="35" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#94a3b8">Alap csomag</text>
    <text x="140" y="75" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#f1f5f9">1,8-2,5M</text>
    <text x="140" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Kábel + konnektor + elosztó</text>
    <text x="140" y="125" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">~8-10e Ft/m²</text>
  </g>
  <g transform="translate(450, 160)">
    <rect x="0" y="0" width="280" height="140" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="140" y="35" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#818cf8">Közepes csomag</text>
    <text x="140" y="75" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#f1f5f9">2,5-3,5M</text>
    <text x="140" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">+ LED design + napelem előkész.</text>
    <text x="140" y="125" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#818cf8">~10-14e Ft/m²</text>
  </g>
  <g transform="translate(800, 160)">
    <rect x="0" y="0" width="280" height="140" rx="12" fill="#312e81" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="140" y="35" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fbbf24">Prémium csomag</text>
    <text x="140" y="75" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#f1f5f9">3,5-5,0M</text>
    <text x="140" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">+ okos otthon + EV töltő</text>
    <text x="140" y="125" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">~14-20e Ft/m²</text>
  </g>
  <!-- Key facts -->
  <g transform="translate(100, 370)">
    <rect x="0" y="0" width="460" height="45" rx="8" fill="#312e81"/>
    <text x="230" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f59e0b">⚡ Konnektor utólag: 50-80e Ft | Építéskor: 3-5e Ft</text>
  </g>
  <g transform="translate(620, 370)">
    <rect x="0" y="0" width="460" height="45" rx="8" fill="#312e81"/>
    <text x="230" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#34d399">🔌 Szobánként min. 6-8 konnektor 2026-ban</text>
  </g>
  <!-- Title -->
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Villanyszerelés költsége 2026</text>
  <text x="600" y="530" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Családi ház elektromos rendszere – tételes árakkal</text>
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
