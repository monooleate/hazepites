<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="g2" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#g2)" opacity="0.3"/>

  <!-- Steel frame structure -->
  <!-- Vertical studs -->
  <line x1="200" y1="180" x2="200" y2="380" stroke="#95a5a6" stroke-width="4"/>
  <line x1="280" y1="180" x2="280" y2="380" stroke="#95a5a6" stroke-width="4"/>
  <line x1="360" y1="180" x2="360" y2="380" stroke="#95a5a6" stroke-width="4"/>
  <line x1="440" y1="180" x2="440" y2="380" stroke="#95a5a6" stroke-width="4"/>
  <line x1="520" y1="180" x2="520" y2="380" stroke="#95a5a6" stroke-width="4"/>
  <!-- Top and bottom plates -->
  <line x1="180" y1="180" x2="540" y2="180" stroke="#95a5a6" stroke-width="5"/>
  <line x1="180" y1="380" x2="540" y2="380" stroke="#95a5a6" stroke-width="5"/>
  <!-- Diagonal bracing -->
  <line x1="200" y1="180" x2="280" y2="380" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="440" y1="180" x2="360" y2="380" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Roof truss -->
  <line x1="180" y1="180" x2="360" y2="120" stroke="#95a5a6" stroke-width="4"/>
  <line x1="540" y1="180" x2="360" y2="120" stroke="#95a5a6" stroke-width="4"/>

  <!-- Right side: finished house -->
  <rect x="650" y="180" width="400" height="200" rx="8" fill="#2a2a4e" stroke="#3498db" stroke-width="2"/>
  <!-- Windows -->
  <rect x="680" y="210" width="70" height="55" rx="4" fill="#5dade2" opacity="0.3" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="780" y="210" width="70" height="55" rx="4" fill="#5dade2" opacity="0.3" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="880" y="210" width="70" height="55" rx="4" fill="#5dade2" opacity="0.3" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="980" y="210" width="40" height="170" rx="4" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="640,180 850,110 1060,180" fill="none" stroke="#3498db" stroke-width="2"/>
  <!-- Insulation layers -->
  <rect x="650" y="172" width="400" height="10" rx="2" fill="#f39c12" opacity="0.4"/>

  <!-- Arrow -->
  <path d="M 570 280 L 630 280" stroke="#f39c12" stroke-width="3" fill="none" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f39c12"/></marker></defs>

  <!-- Key advantages -->
  <rect x="100" y="420" width="200" height="65" rx="8" fill="#2a2a4e" stroke="#e74c3c" stroke-width="1"/>
  <text x="200" y="448" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#e74c3c">A</text>
  <text x="200" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Tuzallossag</text>

  <rect x="330" y="420" width="200" height="65" rx="8" fill="#2a2a4e" stroke="#2ecc71" stroke-width="1"/>
  <text x="430" y="448" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#2ecc71">Z275</text>
  <text x="430" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Horgany korroziovedelem</text>

  <rect x="560" y="420" width="200" height="65" rx="8" fill="#2a2a4e" stroke="#3498db" stroke-width="1"/>
  <text x="660" y="448" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3498db" font-weight="bold">3-6 ho</text>
  <text x="660" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Epitesi ido</text>

  <rect x="790" y="420" width="200" height="65" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1"/>
  <text x="890" y="448" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f39c12" font-weight="bold">400-650e</text>
  <text x="890" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Ft/m2 kulcsrakesz</text>

  <rect x="1020" y="420" width="80" height="65" rx="8" fill="#2ecc71" opacity="0.9"/>
  <text x="1060" y="448" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white">&#x267B;</text>
  <text x="1060" y="470" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">100%</text>

  <text x="600" y="55" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="white">Acelvázas haz 2026</text>
  <text x="600" y="95" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">A csendes forradalom az epitoiparban</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
