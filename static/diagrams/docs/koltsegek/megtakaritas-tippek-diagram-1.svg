<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <!-- Background -->
  <rect width="900" height="350" fill="#0f1123" rx="12"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="dgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1d35" stroke-width="0.6"/>
    </pattern>
  </defs>
  <rect width="900" height="350" fill="url(#dgrid)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="48" fill="#0a0d1f" rx="12"/>
  <rect x="0" y="36" width="900" height="12" fill="#0a0d1f"/>
  <text x="450" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" letter-spacing="0.5">Házépítési megtakarítás – hol igen, hol nem?</text>

  <!-- === LEFT COLUMN: Ahol spórolhatsz (GREEN) === -->
  <!-- Column background -->
  <rect x="20" y="58" width="400" height="272" rx="8" fill="#052e16" opacity="0.5"/>
  <rect x="20" y="58" width="400" height="36" rx="8" fill="#166534" opacity="0.8"/>
  <rect x="20" y="82" width="400" height="12" fill="#166534" opacity="0.8"/>

  <!-- Column header -->
  <circle cx="46" cy="76" r="10" fill="#22c55e"/>
  <polyline points="40,76 44,81 54,69" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="64" y="81" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dcfce7">Ahol spórolhatsz</text>

  <!-- Row 1 -->
  <rect x="30" y="104" width="380" height="42" rx="6" fill="#14532d" opacity="0.6"/>
  <text x="50" y="122" font-family="sans-serif" font-size="12" font-weight="bold" fill="#86efac">Egyszerűbb alaprajz (téglalap)</text>
  <text x="50" y="138" font-family="sans-serif" font-size="11" fill="#4ade80">Megtakarítás: 800 ezer – 1,5 M Ft</text>
  <rect x="340" y="112" width="60" height="22" rx="4" fill="#15803d"/>
  <text x="370" y="127" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dcfce7">-15-25%</text>

  <!-- Row 2 -->
  <rect x="30" y="154" width="380" height="42" rx="6" fill="#14532d" opacity="0.6"/>
  <text x="50" y="172" font-family="sans-serif" font-size="12" font-weight="bold" fill="#86efac">Nyeregtető (kontyolt helyett)</text>
  <text x="50" y="188" font-family="sans-serif" font-size="11" fill="#4ade80">Megtakarítás: 600 ezer – 1,2 M Ft</text>
  <rect x="340" y="162" width="60" height="22" rx="4" fill="#15803d"/>
  <text x="370" y="177" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dcfce7">-20-35%</text>

  <!-- Row 3 -->
  <rect x="30" y="204" width="380" height="42" rx="6" fill="#14532d" opacity="0.6"/>
  <text x="50" y="222" font-family="sans-serif" font-size="12" font-weight="bold" fill="#86efac">3 ajánlat bekérése szakáganként</text>
  <text x="50" y="238" font-family="sans-serif" font-size="11" fill="#4ade80">Megtakarítás: 500 ezer – 2 M Ft</text>
  <rect x="340" y="212" width="60" height="22" rx="4" fill="#15803d"/>
  <text x="370" y="227" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dcfce7">-15-30%</text>

  <!-- Row 4 -->
  <rect x="30" y="254" width="380" height="42" rx="6" fill="#14532d" opacity="0.6"/>
  <text x="50" y="272" font-family="sans-serif" font-size="12" font-weight="bold" fill="#86efac">Saját festés, burkolás, takarítás</text>
  <text x="50" y="288" font-family="sans-serif" font-size="11" fill="#4ade80">Megtakarítás: 400 – 800 ezer Ft</text>
  <rect x="340" y="262" width="60" height="22" rx="4" fill="#15803d"/>
  <text x="370" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dcfce7">saját idő</text>

  <!-- Row 5 -->
  <rect x="30" y="304" width="380" height="36" rx="6" fill="#14532d" opacity="0.6"/>
  <text x="50" y="318" font-family="sans-serif" font-size="12" font-weight="bold" fill="#86efac">Fázisos építés (garázs, terasz késő)</text>
  <text x="50" y="334" font-family="sans-serif" font-size="11" fill="#4ade80">Megtakarítás: 1,5 – 4 M Ft halasztva</text>

  <!-- === RIGHT COLUMN: Ahol NE spórolj (RED) === -->
  <rect x="480" y="58" width="400" height="272" rx="8" fill="#450a0a" opacity="0.5"/>
  <rect x="480" y="58" width="400" height="36" rx="8" fill="#7f1d1d" opacity="0.8"/>
  <rect x="480" y="82" width="400" height="12" fill="#7f1d1d" opacity="0.8"/>

  <!-- Column header -->
  <circle cx="506" cy="76" r="10" fill="#ef4444"/>
  <text x="519" y="81" font-family="sans-serif" font-size="19" fill="#ef4444" font-weight="bold">!</text>
  <text x="534" y="81" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fee2e2">Ahol NE spórolj</text>

  <!-- Row 1 -->
  <rect x="490" y="104" width="380" height="42" rx="6" fill="#7f1d1d" opacity="0.5"/>
  <text x="510" y="122" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">Alapozás és talajvizsgálat</text>
  <text x="510" y="138" font-family="sans-serif" font-size="11" fill="#f87171">Hiba esetén javítás: 5 – 20 M Ft</text>
  <rect x="800" y="112" width="60" height="22" rx="4" fill="#991b1b"/>
  <text x="830" y="127" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fee2e2">TILOS</text>

  <!-- Row 2 -->
  <rect x="490" y="154" width="380" height="42" rx="6" fill="#7f1d1d" opacity="0.5"/>
  <text x="510" y="172" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">Tető- és vízszigetelés minősége</text>
  <text x="510" y="188" font-family="sans-serif" font-size="11" fill="#f87171">Ázáskár javítása: 1 – 5 M Ft</text>
  <rect x="800" y="162" width="60" height="22" rx="4" fill="#991b1b"/>
  <text x="830" y="177" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fee2e2">TILOS</text>

  <!-- Row 3 -->
  <rect x="490" y="204" width="380" height="42" rx="6" fill="#7f1d1d" opacity="0.5"/>
  <text x="510" y="222" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">Hőszigetelés vastagsága</text>
  <text x="510" y="238" font-family="sans-serif" font-size="11" fill="#f87171">20 év rezsidiff: 800 ezer – 1,5 M Ft</text>
  <rect x="800" y="212" width="60" height="22" rx="4" fill="#991b1b"/>
  <text x="830" y="227" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fee2e2">TILOS</text>

  <!-- Row 4 -->
  <rect x="490" y="254" width="380" height="42" rx="6" fill="#7f1d1d" opacity="0.5"/>
  <text x="510" y="272" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">Műszaki ellenőr kihagyása</text>
  <text x="510" y="288" font-family="sans-serif" font-size="11" fill="#f87171">Ellenőr ára: 400–600 eF | hiba: 2–5 M Ft</text>
  <rect x="800" y="262" width="60" height="22" rx="4" fill="#991b1b"/>
  <text x="830" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fee2e2">TILOS</text>

  <!-- Row 5 -->
  <rect x="490" y="304" width="380" height="36" rx="6" fill="#7f1d1d" opacity="0.5"/>
  <text x="510" y="318" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">Nyílászáró minőség (ablak U-érték)</text>
  <text x="510" y="334" font-family="sans-serif" font-size="11" fill="#f87171">25 év fűtési különbség: ~1 M Ft / ablak</text>

  <!-- Divider -->
  <line x1="450" y1="58" x2="450" y2="330" stroke="#1e2040" stroke-width="2"/>
  <circle cx="450" cy="194" r="16" fill="#0f1123" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="199" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#64748b">VS</text>
</svg>
