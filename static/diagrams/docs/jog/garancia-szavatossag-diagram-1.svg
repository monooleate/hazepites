<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Reklamáció folyamatábrája</text>

  <!-- Step 1 -->
  <rect x="250" y="65" width="300" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#5b21b6">1. Hiba dokumentálása (fotó, leírás)</text>

  <line x1="400" y1="115" x2="400" y2="135" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="250" y="135" width="300" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#5b21b6">2. Írásbeli bejelentés (15-30 nap)</text>

  <line x1="400" y1="185" x2="400" y2="205" stroke="#8b5cf6" stroke-width="2"/>

  <!-- Decision -->
  <polygon points="400,205 480,240 400,275 320,240" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#92400e">Kivitelező válasza?</text>

  <!-- Left: Accepts -->
  <line x1="320" y1="240" x2="180" y2="240" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="215" width="240" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#166534">Elismeri → javítási határidő</text>

  <!-- Right: Denies -->
  <line x1="480" y1="240" x2="620" y2="240" stroke="#ef4444" stroke-width="2"/>
  <rect x="500" y="215" width="240" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#991b1b">Vitatja → szakértő bevonása</text>

  <!-- Down: No response -->
  <line x1="400" y1="275" x2="400" y2="305" stroke="#f59e0b" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="250" y="305" width="300" height="50" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#9a3412">3. Nem válaszol → felszólítás</text>

  <line x1="400" y1="355" x2="400" y2="375" stroke="#f59e0b" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="180" y="375" width="200" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="280" y="405" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#991b1b">Békéltető testület</text>

  <rect x="420" y="375" width="200" height="50" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="405" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#991b1b">Polgári per</text>

  <!-- Cost labels -->
  <text x="280" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Díjmentes, 90 nap</text>
  <text x="520" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Illeték: min 15 000 Ft</text>
  <text x="520" y="462" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Időtartam: 1-3 év</text>

  <text x="400" y="492" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">hazepitesikalauz.hu</text>
</svg>
