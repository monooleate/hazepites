<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">Villamos méretezés – konnektor, bekötés, tábla</text>

  <!-- left: konnektor per room -->
  <text x="225" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3498db">Dugalj / helyiség</text>
  <g font-family="sans-serif" font-size="12" fill="#333">
    <text x="60" y="105">10 m² alatt</text><text x="370" y="105" text-anchor="end" font-weight="bold" fill="#2980b9">2×4 db</text>
    <text x="60" y="135">10–15 m²</text><text x="370" y="135" text-anchor="end" font-weight="bold" fill="#2980b9">3×4 db</text>
    <text x="60" y="165">15–20 m²</text><text x="370" y="165" text-anchor="end" font-weight="bold" fill="#2980b9">4×4 db</text>
    <text x="60" y="195">20–30 m²</text><text x="370" y="195" text-anchor="end" font-weight="bold" fill="#2980b9">5×4 db</text>
    <text x="60" y="225">30–40 m²</text><text x="370" y="225" text-anchor="end" font-weight="bold" fill="#2980b9">6×5 db</text>
    <text x="60" y="255">konyha</text><text x="370" y="255" text-anchor="end" font-weight="bold" fill="#e67e22">1,5×</text>
  </g>
  <line x1="50" y1="270" x2="400" y2="270" stroke="#eee"/>
  <text x="60" y="292" font-size="11" fill="#777">+ tűzhely 5×4 mm², szagelszívó, szellőztető külön kiállás</text>

  <line x1="450" y1="60" x2="450" y2="430" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- right: bekötés + tábla -->
  <text x="675" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">Bekötés + elosztótábla</text>
  <g font-family="sans-serif" font-size="12" fill="#333">
    <text x="500" y="105">25–50 m²</text><text x="845" y="105" text-anchor="end" fill="#8e44ad">1×25 A · 16-24 modul</text>
    <text x="500" y="135">51–80 m²</text><text x="845" y="135" text-anchor="end" fill="#8e44ad">3×16 A · 24-32 modul</text>
    <text x="500" y="165">81–110 m²</text><text x="845" y="165" text-anchor="end" fill="#8e44ad">3×25 A · 32 modul</text>
    <text x="500" y="195">111–150 m²</text><text x="845" y="195" text-anchor="end" fill="#8e44ad">3×25 A · 48 modul</text>
    <text x="500" y="225">151–180 m²</text><text x="845" y="225" text-anchor="end" fill="#8e44ad">3×25 A · 72 modul</text>
    <text x="500" y="255">181–300 m²</text><text x="845" y="255" text-anchor="end" fill="#8e44ad">3×32 A · 72 modul</text>
  </g>
  <line x1="500" y1="270" x2="850" y2="270" stroke="#eee"/>
  <text x="500" y="292" font-size="11" fill="#777">300 m² felett / medence, szauna: egyedi energiaigény-terv</text>

  <!-- kabel row -->
  <rect x="60" y="320" width="780" height="60" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="450" y="345" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Kábel keresztmetszet körönként (MBCU)</text>
  <text x="180" y="368" text-anchor="middle" font-size="12" fill="#555">világítás: 3×1,5 mm²</text>
  <text x="450" y="368" text-anchor="middle" font-size="12" fill="#555">dugalj: 3×2,5 mm²</text>
  <text x="720" y="368" text-anchor="middle" font-size="12" fill="#555">háromfázis: 5×4 mm²</text>

  <rect x="60" y="395" width="780" height="55" rx="8" fill="#eafaf1" stroke="#27ae60"/>
  <text x="450" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a5b36">Csillagpontos rendszer + FI-relé + földelés. Inkább több kiállás, mint kevés!</text>
  <text x="450" y="440" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Tartalékmodul a táblában a jövőhöz: napelem, hőszivattyú, autótöltő.</text>

  <text x="880" y="505" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
