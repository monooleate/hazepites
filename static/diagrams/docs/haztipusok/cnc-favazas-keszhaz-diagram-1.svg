<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <rect width="900" height="440" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">A CNC favázas készház útja – tervtől a felállításig</text>

  <!-- 6 step flow -->
  <!-- step boxes -->
  <g font-family="sans-serif">
    <!-- 1 -->
    <circle cx="100" cy="130" r="26" fill="#3498db"/><text x="100" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">1</text>
    <text x="100" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Statikai terv</text>
    <text x="100" y="202" text-anchor="middle" font-size="10" fill="#777">méretezés</text>
    <!-- 2 -->
    <circle cx="250" cy="130" r="26" fill="#3498db"/><text x="250" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">2</text>
    <text x="250" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Gyártmányterv</text>
    <text x="250" y="202" text-anchor="middle" font-size="10" fill="#777">3D + gépi kód</text>
    <!-- 3 -->
    <circle cx="400" cy="130" r="26" fill="#f39c12"/><text x="400" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">3</text>
    <text x="400" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">CNC gyártás</text>
    <text x="400" y="202" text-anchor="middle" font-size="10" fill="#777">mm-pontos vágás</text>
    <!-- 4 -->
    <circle cx="550" cy="130" r="26" fill="#2ecc71"/><text x="550" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">4</text>
    <text x="550" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Panel az üzemben</text>
    <text x="550" y="202" text-anchor="middle" font-size="10" fill="#777">kényszersablon</text>
    <!-- 5 -->
    <circle cx="700" cy="130" r="26" fill="#9b59b6"/><text x="700" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">5</text>
    <text x="700" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Szállítás</text>
    <text x="700" y="202" text-anchor="middle" font-size="10" fill="#777">darus (gyártó)</text>
    <!-- 6 -->
    <circle cx="820" cy="130" r="26" fill="#9b59b6"/><text x="820" y="138" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">6</text>
    <text x="820" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Felállítás</text>
    <text x="820" y="202" text-anchor="middle" font-size="10" fill="#777">néhány nap</text>
  </g>
  <!-- arrows -->
  <g stroke="#bbb" stroke-width="2">
    <line x1="126" y1="130" x2="224" y2="130" marker-end="url(#a)"/>
    <line x1="276" y1="130" x2="374" y2="130" marker-end="url(#a)"/>
    <line x1="426" y1="130" x2="524" y2="130" marker-end="url(#a)"/>
    <line x1="576" y1="130" x2="674" y2="130" marker-end="url(#a)"/>
    <line x1="726" y1="130" x2="794" y2="130" marker-end="url(#a)"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#bbb"/></marker></defs>

  <!-- precision panel -->
  <rect x="120" y="250" width="660" height="100" rx="10" fill="#f3fbf6" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a5b36">Gyári mérettűrések</text>
  <text x="220" y="315" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#27ae60" font-weight="bold">átló: ±6 mm</text>
  <text x="370" y="315" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#27ae60" font-weight="bold">sík: ±2 mm/m</text>
  <text x="520" y="315" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#27ae60" font-weight="bold">hossz: ±3 mm</text>
  <text x="680" y="315" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#27ae60" font-weight="bold">szög: max 0,5°</text>
  <text x="450" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#777">A helyszínen már csak összeállítás és merevítés – de a pontos alapozás (fogadószint) feltétel!</text>

  <text x="450" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">A hosszú részt a tervezés és a gyártás adja – a szerkezet helyszíni felállítása napok, nem hónapok kérdése.</text>
  <text x="880" y="430" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
