<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <!-- Warning triangles -->
  <g transform="translate(200, 80)">
    <polygon points="50,0 0,90 100,90" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <text x="50" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#f59e0b">!</text>
    <text x="50" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">Tervmódosítás</text>
    <text x="50" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">56,5% túllépés oka</text>
  </g>
  <g transform="translate(430, 80)">
    <polygon points="50,0 0,90 100,90" fill="none" stroke="#ef4444" stroke-width="3"/>
    <text x="50" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#ef4444">!</text>
    <text x="50" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fca5a5">Kevés tartalék</text>
    <text x="50" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">10% helyett 20% kell</text>
  </g>
  <g transform="translate(660, 80)">
    <polygon points="50,0 0,90 100,90" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <text x="50" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#f59e0b">!</text>
    <text x="50" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">Olcsó kivitelező</text>
    <text x="50" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Az olcsó a drága</text>
  </g>
  <g transform="translate(890, 80)">
    <polygon points="50,0 0,90 100,90" fill="none" stroke="#ef4444" stroke-width="3"/>
    <text x="50" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#ef4444">!</text>
    <text x="50" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fca5a5">Nincs szerződés</text>
    <text x="50" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Szó áll szó ellen</text>
  </g>
  <!-- Stats bar -->
  <rect x="150" y="280" width="900" height="70" rx="12" fill="#312e81"/>
  <text x="350" y="320" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#ef4444">98%</text>
  <text x="350" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">túllépi a keretet</text>
  <text x="600" y="320" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#f59e0b">15-25%</text>
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">átlagos túllépés</text>
  <text x="850" y="320" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#34d399">10</text>
  <text x="850" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">leggyakoribb hiba</text>
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Házépítés buktatói 2026</text>
  <text x="600" y="480" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">A 10 leggyakoribb hiba és hogyan kerüld el</text>
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
