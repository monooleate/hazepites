<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#14241a">Hőfáziseltolás – miért hűvös nyáron a farostos ház?</text>

  <!-- Axes -->
  <line x1="80" y1="80" x2="80" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="400" x2="840" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="40" y="100" font-family="sans-serif" font-size="12" fill="#777">35°C</text>
  <text x="40" y="250" font-family="sans-serif" font-size="12" fill="#777">24°C</text>
  <text x="40" y="395" font-family="sans-serif" font-size="12" fill="#777">14°C</text>
  <text x="120" y="425" font-family="sans-serif" font-size="12" fill="#777">12h (dél)</text>
  <text x="380" y="425" font-family="sans-serif" font-size="12" fill="#777">20h</text>
  <text x="560" y="425" font-family="sans-serif" font-size="12" fill="#777">02h</text>
  <text x="760" y="425" font-family="sans-serif" font-size="12" fill="#777">10h</text>
  <text x="450" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#999">napszak</text>

  <!-- comfort band -->
  <rect x="80" y="218" width="760" height="55" fill="#2ecc71" opacity="0.08"/>
  <text x="830" y="245" text-anchor="end" font-family="sans-serif" font-size="11" fill="#27ae60">komfortsáv</text>

  <!-- Outside temperature curve (red, large amplitude, peak ~15h near x=170) -->
  <path d="M 80 140 C 110 105, 150 95, 175 95 C 210 95, 250 150, 300 230 C 350 300, 400 350, 450 375 C 500 392, 540 393, 575 390 C 620 385, 660 330, 710 250 C 760 175, 810 150, 840 145"
        fill="none" stroke="#e74c3c" stroke-width="3"/>
  <text x="180" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">külső hőmérséklet (déli csúcs)</text>

  <!-- Inside temperature curve (blue, small amplitude, peak shifted ~18h later near x=560) -->
  <path d="M 80 248 C 150 252, 220 255, 290 252 C 360 248, 430 240, 500 232 C 540 228, 560 227, 590 229 C 660 234, 730 244, 840 250"
        fill="none" stroke="#3498db" stroke-width="3"/>
  <text x="560" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2980b9" font-weight="bold">belső hőmérséklet (farost fal mögött)</text>

  <!-- Phase shift arrow between peaks -->
  <line x1="178" y1="120" x2="565" y2="120" stroke="#f39c12" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="565,120 555,115 555,125" fill="#f39c12"/>
  <polygon points="178,120 188,115 188,125" fill="#f39c12"/>
  <rect x="300" y="105" width="150" height="28" rx="6" fill="#fff" stroke="#f39c12"/>
  <text x="375" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e67e22" font-weight="bold">16–20 óra eltolás</text>

  <text x="450" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">A déli hőcsúcs csak késő este/éjjel ér a belső térbe – mire a külső levegő már lehűlt.</text>
  <text x="840" y="478" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
