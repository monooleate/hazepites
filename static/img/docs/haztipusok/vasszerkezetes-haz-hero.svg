<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="concreteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e4d7a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a5a8c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a7fae;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3d55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2f42;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3050" stroke-width="1" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- === Frame Structure Illustration === -->
  <!-- Ground slab -->
  <rect x="100" y="500" width="500" height="20" fill="url(#concreteGrad)" rx="2"/>
  <!-- Rebar hints in ground slab -->
  <line x1="120" y1="507" x2="580" y2="507" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="120" y1="513" x2="580" y2="513" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Left pillar (ground floor) -->
  <rect x="130" y="340" width="30" height="160" fill="url(#pillarGrad)" rx="2"/>
  <line x1="143" y1="345" x2="143" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="151" y1="345" x2="151" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Middle pillar (ground floor) -->
  <rect x="330" y="340" width="30" height="160" fill="url(#pillarGrad)" rx="2"/>
  <line x1="343" y1="345" x2="343" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="351" y1="345" x2="351" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right pillar (ground floor) -->
  <rect x="530" y="340" width="30" height="160" fill="url(#pillarGrad)" rx="2"/>
  <line x1="543" y1="345" x2="543" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="551" y1="345" x2="551" y2="495" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Ground floor beam -->
  <rect x="130" y="325" width="430" height="22" fill="url(#concreteGrad)" rx="2"/>
  <line x1="140" y1="333" x2="550" y2="333" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="140" y1="339" x2="550" y2="339" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Infill walls ground floor left span -->
  <rect x="165" y="340" width="160" height="158" fill="url(#infillGrad)" rx="1" opacity="0.85"/>
  <!-- Brick pattern left span -->
  <g stroke="#2a4060" stroke-width="0.8" opacity="0.7">
    <line x1="165" y1="358" x2="325" y2="358"/>
    <line x1="165" y1="376" x2="325" y2="376"/>
    <line x1="165" y1="394" x2="325" y2="394"/>
    <line x1="165" y1="412" x2="325" y2="412"/>
    <line x1="165" y1="430" x2="325" y2="430"/>
    <line x1="165" y1="448" x2="325" y2="448"/>
    <line x1="165" y1="466" x2="325" y2="466"/>
    <line x1="165" y1="484" x2="325" y2="484"/>
    <line x1="245" y1="340" x2="245" y2="498"/>
  </g>

  <!-- Infill walls ground floor right span -->
  <rect x="365" y="340" width="160" height="158" fill="url(#infillGrad)" rx="1" opacity="0.85"/>
  <!-- Brick pattern right span -->
  <g stroke="#2a4060" stroke-width="0.8" opacity="0.7">
    <line x1="365" y1="358" x2="525" y2="358"/>
    <line x1="365" y1="376" x2="525" y2="376"/>
    <line x1="365" y1="394" x2="525" y2="394"/>
    <line x1="365" y1="412" x2="525" y2="412"/>
    <line x1="365" y1="430" x2="525" y2="430"/>
    <line x1="365" y1="448" x2="525" y2="448"/>
    <line x1="365" y1="466" x2="525" y2="466"/>
    <line x1="365" y1="484" x2="525" y2="484"/>
    <line x1="445" y1="340" x2="445" y2="498"/>
  </g>

  <!-- Left pillar (first floor) -->
  <rect x="130" y="185" width="30" height="140" fill="url(#pillarGrad)" rx="2"/>
  <line x1="143" y1="190" x2="143" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="151" y1="190" x2="151" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Middle pillar (first floor) -->
  <rect x="330" y="185" width="30" height="140" fill="url(#pillarGrad)" rx="2"/>
  <line x1="343" y1="190" x2="343" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="351" y1="190" x2="351" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right pillar (first floor) -->
  <rect x="530" y="185" width="30" height="140" fill="url(#pillarGrad)" rx="2"/>
  <line x1="543" y1="190" x2="543" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="551" y1="190" x2="551" y2="320" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- First floor beam / slab -->
  <rect x="130" y="170" width="430" height="22" fill="url(#concreteGrad)" rx="2"/>
  <line x1="140" y1="178" x2="550" y2="178" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="140" y1="184" x2="550" y2="184" stroke="#7aa3cc" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Infill walls first floor left span -->
  <rect x="165" y="185" width="160" height="135" fill="url(#infillGrad)" rx="1" opacity="0.75"/>
  <g stroke="#2a4060" stroke-width="0.8" opacity="0.6">
    <line x1="165" y1="203" x2="325" y2="203"/>
    <line x1="165" y1="221" x2="325" y2="221"/>
    <line x1="165" y1="239" x2="325" y2="239"/>
    <line x1="165" y1="257" x2="325" y2="257"/>
    <line x1="165" y1="275" x2="325" y2="275"/>
    <line x1="165" y1="293" x2="325" y2="293"/>
    <line x1="165" y1="311" x2="325" y2="311"/>
    <line x1="245" y1="185" x2="245" y2="320"/>
  </g>

  <!-- Infill walls first floor right span (open – window) -->
  <rect x="365" y="185" width="160" height="50" fill="url(#infillGrad)" rx="1" opacity="0.75"/>
  <rect x="365" y="270" width="160" height="50" fill="url(#infillGrad)" rx="1" opacity="0.75"/>
  <!-- Window -->
  <rect x="375" y="238" width="140" height="30" fill="#1e4a7a" rx="2" opacity="0.9"/>
  <line x1="445" y1="238" x2="445" y2="268" stroke="#2a6aaa" stroke-width="1.5"/>
  <line x1="375" y1="253" x2="515" y2="253" stroke="#2a6aaa" stroke-width="1.5"/>

  <!-- Roof structure (simplified truss) -->
  <polyline points="110,170 345,100 590,170" fill="none" stroke="#4a6fa5" stroke-width="4" stroke-linejoin="round"/>
  <polyline points="160,170 345,115 530,170" fill="none" stroke="#2e4d7a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="345" y1="100" x2="345" y2="170" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="230" y1="140" x2="230" y2="170" stroke="#3a5a8c" stroke-width="1.5"/>
  <line x1="460" y1="140" x2="460" y2="170" stroke="#3a5a8c" stroke-width="1.5"/>

  <!-- Labels with accent lines -->
  <!-- Pillar label -->
  <line x1="160" y1="410" x2="200" y2="410" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="205" y="414" font-family="sans-serif" font-size="11" fill="#7aa3cc">Pillér (vasbeton)</text>

  <!-- Beam label -->
  <line x1="350" y1="336" x2="350" y2="310" stroke="#a0c4e8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="360" y="307" font-family="sans-serif" font-size="11" fill="#a0c4e8">Gerenda</text>

  <!-- Infill label -->
  <line x1="245" y1="420" x2="300" y2="440" stroke="#607a95" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="305" y="444" font-family="sans-serif" font-size="11" fill="#607a95">Kitöltőfal (nem teherhordó)</text>

  <!-- Slab label -->
  <line x1="570" y1="181" x2="620" y2="181" stroke="#a0c4e8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="625" y="185" font-family="sans-serif" font-size="11" fill="#a0c4e8">Födém (vasbeton)</text>

  <!-- === Text block === -->
  <!-- Main title -->
  <text x="850" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="700" fill="#e8f2ff" filter="url(#glow)">Vázszerkezetes</text>
  <text x="850" y="318" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="700" fill="#e8f2ff" filter="url(#glow)">ház</text>

  <!-- Subtitle -->
  <text x="850" y="368" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#7aa3cc">Monolit vasbeton váz – árakkal 2026</text>

  <!-- Price badge -->
  <rect x="720" y="395" width="260" height="54" rx="8" fill="#1e3d66" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="850" y="416" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#a0c4e8">Kulcsrakész ár 2026</text>
  <text x="850" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8f2ff">550 000 – 900 000 Ft/m²</text>

  <!-- Accent line under title -->
  <rect x="730" y="330" width="240" height="3" rx="1.5" fill="#4a6fa5" opacity="0.7"/>

  <!-- Brand -->
  <text x="850" y="590" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#3a5a8c" letter-spacing="1">hazepitesikalauz.hu</text>

  <!-- Bottom accent strip -->
  <rect x="0" y="615" width="1200" height="4" fill="#4a6fa5" opacity="0.5"/>
  <rect x="700" y="615" width="500" height="4" fill="#6a9fd0" opacity="0.6"/>
</svg>
