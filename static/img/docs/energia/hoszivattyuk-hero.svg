<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Háttér vonalak -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Levegő-víz hőszivattyú ikon -->
  <g transform="translate(250,200)">
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <!-- Ventilátor -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <path d="M0,-30 Q18,-12 0,0 Q-18,12 0,30" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <path d="M-30,0 Q-12,-18 0,0 Q12,18 30,0" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#22c55e"/>
    <!-- Hőáram nyilak -->
    <path d="M70,0 L100,0" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <polygon points="100,-5 110,0 100,5" fill="#ef4444" opacity="0.6"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#22c55e">Levegő-víz</text>
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">2,2-4,5M Ft</text>
  </g>
  <!-- Földhő ikon -->
  <g transform="translate(600,200)">
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <!-- Talajrétegek -->
    <line x1="-40" y1="10" x2="40" y2="10" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
    <line x1="-40" y1="25" x2="40" y2="25" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <!-- Fúrás szimbólum -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#a855f7" stroke-width="3"/>
    <circle cx="0" cy="40" r="6" fill="#a855f7" opacity="0.5"/>
    <circle cx="0" cy="-40" r="4" fill="#a855f7"/>
    <!-- Hőhullámok -->
    <path d="M-20,-30 Q-15,-35 -10,-30" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <path d="M15,-20 Q20,-25 25,-20" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#a855f7">Földhő</text>
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">3,5-7M Ft</text>
  </g>
  <!-- Víz-víz ikon -->
  <g transform="translate(950,200)">
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Vízhullámok -->
    <path d="M-35,0 Q-25,-12 -15,0 Q-5,12 5,0 Q15,-12 25,0 Q35,12 40,0" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <path d="M-35,15 Q-25,3 -15,15 Q-5,27 5,15 Q15,3 25,15 Q35,27 40,15" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
    <!-- Cső -->
    <line x1="0" y1="-45" x2="0" y2="-15" stroke="#06b6d4" stroke-width="3"/>
    <circle cx="0" cy="-45" r="4" fill="#06b6d4"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#06b6d4">Víz-víz</text>
    <text x="0" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">3-6M Ft</text>
  </g>
  <!-- SCOP sáv -->
  <g transform="translate(200,370)">
    <text x="0" y="0" font-family="sans-serif" font-size="12" fill="#64748b">SCOP</text>
    <rect x="50" y="-12" width="200" height="16" rx="8" fill="#22c55e" opacity="0.25"/>
    <rect x="50" y="-12" width="160" height="16" rx="8" fill="#22c55e" opacity="0.5"/>
    <text x="260" y="2" font-family="sans-serif" font-size="12" fill="#22c55e">3,5-4,5</text>
  </g>
  <g transform="translate(500,370)">
    <rect x="50" y="-12" width="200" height="16" rx="8" fill="#a855f7" opacity="0.25"/>
    <rect x="50" y="-12" width="190" height="16" rx="8" fill="#a855f7" opacity="0.5"/>
    <text x="260" y="2" font-family="sans-serif" font-size="12" fill="#a855f7">4,0-5,0</text>
  </g>
  <g transform="translate(800,370)">
    <rect x="50" y="-12" width="200" height="16" rx="8" fill="#06b6d4" opacity="0.25"/>
    <rect x="50" y="-12" width="200" height="16" rx="8" fill="#06b6d4" opacity="0.5"/>
    <text x="260" y="2" font-family="sans-serif" font-size="12" fill="#06b6d4">4,5-5,5</text>
  </g>
  <!-- Cím -->
  <text x="600" y="460" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#ffffff">Hőszivattyúk 2026</text>
  <text x="600" y="505" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94a3b8">típusok · árak · megtérülés · buktatók</text>
  <!-- Brand -->
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#57534e">hazepitesikalauz.hu</text>
</svg>