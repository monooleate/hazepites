<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#ffffff" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Pince vs lemezalap – költség összehasonlítás (100 m², 2026)</text>

  <!-- Headers -->
  <rect x="200" y="55" width="250" height="35" rx="6" fill="#ede9fe"/>
  <text x="325" y="78" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">Pince</text>
  <rect x="455" y="55" width="250" height="35" rx="6" fill="#d1fae5"/>
  <text x="580" y="78" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#065f46">Lemezalap</text>

  <!-- Rows -->
  <text x="30" y="118" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Földmunka</text>
  <text x="325" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c3aed">1,5–3,0M Ft</text>
  <text x="580" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#059669" font-weight="bold">0,3–0,6M Ft</text>

  <line x1="30" y1="132" x2="720" y2="132" stroke="#e2e8f0"/>

  <text x="30" y="158" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Vasbeton</text>
  <text x="325" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c3aed">4,0–7,0M Ft</text>
  <text x="580" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#059669" font-weight="bold">1,5–2,5M Ft</text>

  <line x1="30" y1="172" x2="720" y2="172" stroke="#e2e8f0"/>

  <text x="30" y="198" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Vízszigetelés</text>
  <text x="325" y="198" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c3aed">1,5–3,0M Ft</text>
  <text x="580" y="198" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#059669" font-weight="bold">0,2–0,5M Ft</text>

  <line x1="30" y1="212" x2="720" y2="212" stroke="#e2e8f0"/>

  <text x="30" y="238" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Hőszigetelés</text>
  <text x="325" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">0,5–1,0M Ft</text>
  <text x="580" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">0,4–0,8M Ft</text>

  <line x1="30" y1="252" x2="720" y2="252" stroke="#1e293b" stroke-width="1.5"/>

  <text x="30" y="278" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b">ÖSSZESEN</text>
  <text x="325" y="278" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7c3aed">8–15M Ft</text>
  <text x="580" y="278" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#059669">2–4M Ft</text>

  <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">hazepitesikalauz.hu</text>
