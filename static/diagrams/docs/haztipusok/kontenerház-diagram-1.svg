<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#fafafa" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333">Kontenerház koltseg-osszetevok (70 m2, 2 kontener)</text>

  <!-- Stacked bar chart -->
  <rect x="100" y="60" width="700" height="30" rx="4" fill="#e67e22"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Kontener vasarlas: 1,6-3M Ft (15%)</text>

  <rect x="100" y="95" width="700" height="30" rx="4" fill="#3498db"/>
  <text x="450" y="115" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Szallitas + daruzas + alapozas: 1-2,5M Ft (12%)</text>

  <rect x="100" y="130" width="700" height="30" rx="4" fill="#f39c12"/>
  <text x="450" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Hoszigeteles (kulso, 15 cm): 1-2,5M Ft (12%)</text>

  <rect x="100" y="165" width="700" height="30" rx="4" fill="#2ecc71"/>
  <text x="450" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Ablak/ajto vagas + beepites: 800e-2M Ft (10%)</text>

  <rect x="100" y="200" width="700" height="30" rx="4" fill="#e74c3c"/>
  <text x="450" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Gepeszet (viz, villany, futes): 2-5M Ft (25%)</text>

  <rect x="100" y="235" width="700" height="30" rx="4" fill="#9b59b6"/>
  <text x="450" y="255" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Belso burkolat + festes: 1-3M Ft (15%)</text>

  <rect x="100" y="270" width="700" height="30" rx="4" fill="#1abc9c"/>
  <text x="450" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Kozmubekotes: 500e-1,5M Ft (8%)</text>

  <!-- Total -->
  <rect x="200" y="320" width="500" height="60" rx="10" fill="#2c3e50"/>
  <text x="450" y="348" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">Osszes (70 m2, kulcsrakesz)</text>
  <text x="450" y="370" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">8-19,5 millio Ft (114-279e Ft/m2)</text>
</svg>
