<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Buktatók: megelőzés vs javítás költsége</text>
  <!-- Table -->
  <rect x="30" y="55" width="840" height="35" rx="6" fill="#312e81"/>
  <text x="200" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Buktató</text>
  <text x="470" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Megelőzés költsége</text>
  <text x="700" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Hiba költsége</text>
  <text x="830" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Arány</text>
  <!-- Rows -->
  <rect x="30" y="95" width="840" height="32" fill="#f0fdf4"/>
  <text x="200" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">Talajmechanika kihagyva</text>
  <text x="470" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">80-200e Ft</text>
  <text x="700" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">2-5M Ft</text>
  <text x="830" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:25</text>

  <rect x="30" y="130" width="840" height="32" fill="#fff"/>
  <text x="200" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">Nincs műszaki ellenőr</text>
  <text x="470" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">600e-1,8M Ft</text>
  <text x="700" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">2-5M Ft</text>
  <text x="830" y="151" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:3</text>

  <rect x="30" y="165" width="840" height="32" fill="#f0fdf4"/>
  <text x="200" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">Kiviteli terv kihagyva</text>
  <text x="470" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">500e-1M Ft</text>
  <text x="700" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">2-8M Ft</text>
  <text x="830" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:5</text>

  <rect x="30" y="200" width="840" height="32" fill="#fff"/>
  <text x="200" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">Olcsó kivitelező választás</text>
  <text x="470" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">0 Ft (jobb ajánlat)</text>
  <text x="700" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">5-15M Ft</text>
  <text x="830" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:∞</text>

  <rect x="30" y="235" width="840" height="32" fill="#f0fdf4"/>
  <text x="200" y="256" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">HÉSZ nem ellenőrzött</text>
  <text x="470" y="256" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">0 Ft (telefonhívás)</text>
  <text x="700" y="256" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">1-3M Ft</text>
  <text x="830" y="256" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:∞</text>

  <rect x="30" y="270" width="840" height="32" fill="#fff"/>
  <text x="200" y="291" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e293b">Engedély nélküli építés</text>
  <text x="470" y="291" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">0 Ft (engedélykérés)</text>
  <text x="700" y="291" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">12,3M+ Ft bírság</text>
  <text x="830" y="291" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6366f1">1:∞</text>

  <!-- Summary -->
  <rect x="30" y="320" width="840" height="65" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534">A megelőzés teljes költsége: ~2-4M Ft</text>
  <text x="450" y="372" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#166534">Az összes buktató javítási költsége: 15-50M+ Ft → megelőzés 10-25x olcsóbb</text>
</svg>
