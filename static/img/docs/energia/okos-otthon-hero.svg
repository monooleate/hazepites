<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Smart home hub in center -->
  <g transform="translate(450,80)">
    <!-- Central hub circle -->
    <circle cx="150" cy="150" r="60" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
    <circle cx="150" cy="150" r="40" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
    <!-- Wi-Fi waves -->
    <path d="M135,140 Q150,125 165,140" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M125,130 Q150,110 175,130" fill="none" stroke="#34d399" stroke-width="2" opacity="0.7"/>
    <path d="M115,120 Q150,95 185,120" fill="none" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <circle cx="150" cy="155" r="4" fill="#34d399"/>

    <!-- Connected devices around hub -->
    <!-- Light bulb (top-left) -->
    <line x1="110" y1="110" x2="50" y2="50" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="40" cy="40" r="25" fill="#312e81" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M32,35 Q40,20 48,35" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <rect x="36" y="45" width="8" height="8" rx="2" fill="#fbbf24" opacity="0.6"/>
    <text x="40" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fbbf24">Világítás</text>

    <!-- Thermostat (top-right) -->
    <line x1="190" y1="110" x2="250" y2="50" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="260" cy="40" r="25" fill="#312e81" stroke="#f87171" stroke-width="1.5"/>
    <text x="260" y="45" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f87171">22°</text>
    <text x="260" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fca5a5">Fűtés</text>

    <!-- Shutter (right) -->
    <line x1="210" y1="155" x2="280" y2="155" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="290" y="130" width="40" height="50" rx="3" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="295" y1="140" x2="325" y2="140" stroke="#a855f7" stroke-width="1"/>
    <line x1="295" y1="148" x2="325" y2="148" stroke="#a855f7" stroke-width="1"/>
    <line x1="295" y1="156" x2="325" y2="156" stroke="#a855f7" stroke-width="1"/>
    <text x="310" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c084fc">Redőny</text>

    <!-- Camera (bottom-right) -->
    <line x1="190" y1="195" x2="250" y2="250" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="260" cy="260" r="25" fill="#312e81" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="260" cy="255" r="10" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="260" cy="255" r="4" fill="#34d399"/>
    <text x="260" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7">Biztonság</text>

    <!-- Phone (bottom-left) -->
    <line x1="110" y1="195" x2="50" y2="250" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="20" y="235" width="35" height="55" rx="5" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="25" y="242" width="25" height="35" rx="2" fill="#1e1b4b"/>
    <text x="37" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c4b5fd">Vezérlés</text>
  </g>

  <!-- Cost badges -->
  <g transform="translate(100,340)">
    <rect x="0" y="0" width="300" height="45" rx="22" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="1"/>
    <text x="150" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#34d399">Előkészítés: 200-500e Ft</text>
  </g>
  <g transform="translate(450,340)">
    <rect x="0" y="0" width="300" height="45" rx="22" fill="#6366f1" opacity="0.2" stroke="#818cf8" stroke-width="1"/>
    <text x="150" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#c4b5fd">Alap rendszer: 0,5-1,2M Ft</text>
  </g>
  <g transform="translate(800,340)">
    <rect x="0" y="0" width="300" height="45" rx="22" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="150" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fbbf24">Teljes: 1,2-3M Ft</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Okos otthon megoldások</text>
  <text x="600" y="500" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Mit érdemes beépíteni új házba? – 2026</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
