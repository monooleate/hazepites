<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#14202b">Műanyag vs fa-alu – keret, üveg, Uw</text>

  <!-- 3-layer glass cross-section -->
  <text x="450" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2980b9">3 rétegű, argon töltésű üvegezés</text>
  <g>
    <rect x="300" y="90" width="14" height="90" fill="#aed6f1"/>
    <rect x="314" y="90" width="40" height="90" fill="#eaf6fb"/><text x="334" y="200" text-anchor="middle" font-size="10" fill="#2980b9">argon</text>
    <rect x="354" y="90" width="14" height="90" fill="#aed6f1"/>
    <rect x="368" y="90" width="40" height="90" fill="#eaf6fb"/><text x="388" y="200" text-anchor="middle" font-size="10" fill="#2980b9">argon</text>
    <rect x="408" y="90" width="14" height="90" fill="#aed6f1"/>
  </g>
  <text x="361" y="84" text-anchor="middle" font-size="10" fill="#555">üveg | argon | üveg | argon | üveg</text>
  <!-- warm edge -->
  <rect x="300" y="180" width="122" height="10" fill="#e67e22"/>
  <text x="440" y="188" font-size="11" fill="#e67e22">melegperem (warm edge) – alacsony hőhíd</text>

  <!-- comparison table -->
  <text x="250" y="240" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Műanyag (82 mm)</text>
  <text x="650" y="240" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b5895a">Fa-alu (100 mm)</text>
  <line x1="450" y1="220" x2="450" y2="430" stroke="#e0e0e0"/>

  <g font-family="sans-serif" font-size="12" fill="#444">
    <text x="60" y="270">Uw: ~0,8 W/m²K</text>
    <text x="460" y="270">Uw: ~0,8 W/m²K (vagy jobb)</text>
    <text x="60" y="298">Ár: legjobb ár-érték</text>
    <text x="460" y="298">Ár: prémium, drágább</text>
    <text x="60" y="326">Karbantartás: minimális</text>
    <text x="460" y="326">Karbantartás: minimális (alu kívül)</text>
    <text x="60" y="354">Megjelenés: modern, letisztult</text>
    <text x="460" y="354">Megjelenés: természetes fa belül</text>
    <text x="60" y="382">Szín: fóliázott (felárral)</text>
    <text x="460" y="382">Szín: szabad (fa + festett alu)</text>
    <text x="60" y="410">Opció: –</text>
    <text x="460" y="410">Opció: tölgy borítás, rejtett vasalat</text>
  </g>

  <rect x="60" y="440" width="780" height="40" rx="8" fill="#fff9e6" stroke="#f1c40f"/>
  <text x="450" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6d00">Spórolási trükk: nagy erkélyajtók sorolása → akár -50% a nagy emelő-toló ajtóhoz képest.</text>

  <text x="880" y="495" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
