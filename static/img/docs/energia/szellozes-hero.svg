<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="airflow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Airflow arrows -->
  <path d="M150,300 Q400,200 600,300 Q800,400 1050,300" fill="none" stroke="url(#airflow)" stroke-width="60" opacity="0.3"/>
  <path d="M200,280 L350,280 L340,260 L380,285 L340,310 L350,290 L200,290 Z" fill="#38bdf8" opacity="0.6"/>
  <path d="M1000,280 L850,280 L860,260 L820,285 L860,310 L850,290 L1000,290 Z" fill="#f97316" opacity="0.6"/>

  <!-- Labels -->
  <text x="200" y="250" font-family="sans-serif" font-size="16" fill="#38bdf8">Friss levegő</text>
  <text x="900" y="250" text-anchor="end" font-family="sans-serif" font-size="16" fill="#f97316">Elhasznált levegő</text>

  <!-- HRV box center -->
  <rect x="500" y="230" width="200" height="120" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="600" y="275" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c4b5fd">HRV egység</text>
  <text x="600" y="300" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#34d399">80-93%</text>
  <text x="600" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">hővisszanyerés</text>

  <!-- Cost badge -->
  <g transform="translate(600,420)">
    <rect x="-100" y="-20" width="200" height="40" rx="20" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text y="7" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c4b5fd">1,6 – 2,5M Ft</text>
  </g>

  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Szellőzés és légtechnika</text>
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">A jól szigetelt ház tüdeje</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
