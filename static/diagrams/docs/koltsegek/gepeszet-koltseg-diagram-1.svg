<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#ffffff" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Gépészeti költségmegoszlás – 120 m²-es családi ház (2026)</text>

  <!-- Pie chart approximation with bars -->
  <!-- Fűtés 40% -->
  <rect x="100" y="70" width="320" height="50" fill="#ef4444" rx="6"/>
  <text x="260" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Fűtés/hűtés – 35-45% (3-6,5M Ft)</text>

  <!-- Víz 18% -->
  <rect x="100" y="135" width="180" height="50" fill="#3b82f6" rx="6"/>
  <text x="190" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Víz/csatorna – 15-20% (1,4-2,6M)</text>

  <!-- Villany 15% -->
  <rect x="100" y="200" width="152" height="50" fill="#fbbf24" rx="6"/>
  <text x="176" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Villany – 12-18% (960e-2,2M)</text>

  <!-- Szellőzés 20% -->
  <rect x="100" y="265" width="200" height="50" fill="#22c55e" rx="6"/>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Szellőzés – 15-25% (1,5-3,5M Ft)</text>

  <!-- Összeg -->
  <rect x="100" y="340" width="700" height="40" fill="#6366f1" rx="6" opacity="0.15"/>
  <text x="450" y="366" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1" font-weight="bold">Összesen: 8-16 millió Ft (65-135e Ft/m²)</text>

  <!-- Skála jelzés -->
  <text x="800" y="100" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94a3b8">← szélesség arányos a költséggel</text>
</svg>