<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162030;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="concreteD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2e4d7a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brickD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a06040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7a4828;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="infillD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e4a6a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3050;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="url(#bgD)" rx="8"/>

  <!-- Divider line -->
  <line x1="450" y1="20" x2="450" y2="330" stroke="#1e3050" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== LEFT SIDE: Teherhordó falrendszer ===== -->

  <!-- Title left -->
  <text x="225" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#e8f2ff">Teherhordó falrendszer</text>
  <text x="225" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7aa3cc">(pl. Porotherm, Ytong)</text>

  <!-- Foundation left -->
  <rect x="55" y="295" width="340" height="16" fill="url(#concreteD)" rx="2"/>

  <!-- Load-bearing walls -->
  <!-- Left outer wall -->
  <rect x="55" y="115" width="28" height="180" fill="url(#brickD)" rx="1"/>
  <g stroke="#7a3818" stroke-width="0.7" opacity="0.6">
    <line x1="55" y1="130" x2="83" y2="130"/>
    <line x1="55" y1="145" x2="83" y2="145"/>
    <line x1="55" y1="160" x2="83" y2="160"/>
    <line x1="55" y1="175" x2="83" y2="175"/>
    <line x1="55" y1="190" x2="83" y2="190"/>
    <line x1="55" y1="205" x2="83" y2="205"/>
    <line x1="55" y1="220" x2="83" y2="220"/>
    <line x1="55" y1="235" x2="83" y2="235"/>
    <line x1="55" y1="250" x2="83" y2="250"/>
    <line x1="55" y1="265" x2="83" y2="265"/>
    <line x1="55" y1="280" x2="83" y2="280"/>
    <line x1="69" y1="115" x2="69" y2="295"/>
  </g>

  <!-- Interior load-bearing wall (center) -->
  <rect x="198" y="160" width="24" height="135" fill="url(#brickD)" rx="1"/>
  <g stroke="#7a3818" stroke-width="0.7" opacity="0.6">
    <line x1="198" y1="173" x2="222" y2="173"/>
    <line x1="198" y1="188" x2="222" y2="188"/>
    <line x1="198" y1="203" x2="222" y2="203"/>
    <line x1="198" y1="218" x2="222" y2="218"/>
    <line x1="198" y1="233" x2="222" y2="233"/>
    <line x1="198" y1="248" x2="222" y2="248"/>
    <line x1="198" y1="263" x2="222" y2="263"/>
    <line x1="198" y1="278" x2="222" y2="278"/>
    <line x1="210" y1="160" x2="210" y2="295"/>
  </g>

  <!-- Right outer wall -->
  <rect x="367" y="115" width="28" height="180" fill="url(#brickD)" rx="1"/>
  <g stroke="#7a3818" stroke-width="0.7" opacity="0.6">
    <line x1="367" y1="130" x2="395" y2="130"/>
    <line x1="367" y1="145" x2="395" y2="145"/>
    <line x1="367" y1="160" x2="395" y2="160"/>
    <line x1="367" y1="175" x2="395" y2="175"/>
    <line x1="367" y1="190" x2="395" y2="190"/>
    <line x1="367" y1="205" x2="395" y2="205"/>
    <line x1="367" y1="220" x2="395" y2="220"/>
    <line x1="367" y1="235" x2="395" y2="235"/>
    <line x1="367" y1="250" x2="395" y2="250"/>
    <line x1="367" y1="265" x2="395" y2="265"/>
    <line x1="367" y1="280" x2="395" y2="280"/>
    <line x1="381" y1="115" x2="381" y2="295"/>
  </g>

  <!-- Roof slab / koszorú -->
  <rect x="55" y="100" width="340" height="18" fill="url(#concreteD)" rx="2"/>

  <!-- Load arrows on walls -->
  <g fill="#e05050" opacity="0.85">
    <!-- Arrow down on left wall -->
    <polygon points="69,72 64,87 74,87" />
    <line x1="69" y1="60" x2="69" y2="87" stroke="#e05050" stroke-width="2"/>
    <!-- Arrow down on center wall -->
    <polygon points="210,115 205,130 215,130" />
    <line x1="210" y1="103" x2="210" y2="130" stroke="#e05050" stroke-width="2"/>
    <!-- Arrow down on right wall -->
    <polygon points="381,72 376,87 386,87" />
    <line x1="381" y1="60" x2="381" y2="87" stroke="#e05050" stroke-width="2"/>
  </g>

  <!-- Load label left -->
  <text x="225" y="73" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e07070">Teher a falakon át megy le</text>

  <!-- Annotation: fal elbontani nem lehet -->
  <rect x="95" y="195" width="95" height="30" rx="4" fill="#2a1a1a" stroke="#a05030" stroke-width="1"/>
  <text x="142" y="207" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e07050">Fal nem</text>
  <text x="142" y="218" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e07050">bontható el</text>

  <rect x="242" y="195" width="95" height="30" rx="4" fill="#2a1a1a" stroke="#a05030" stroke-width="1"/>
  <text x="289" y="207" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e07050">Fal nem</text>
  <text x="289" y="218" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e07050">bontható el</text>

  <!-- Bottom label -->
  <text x="225" y="323" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#607a95">Korlátozott alaprajz-módosítás</text>

  <!-- ===== RIGHT SIDE: Vázszerkezetes ===== -->

  <!-- Title right -->
  <text x="675" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#e8f2ff">Vázszerkezetes</text>
  <text x="675" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7aa3cc">(monolit vasbeton)</text>

  <!-- Foundation right -->
  <rect x="505" y="295" width="340" height="16" fill="url(#concreteD)" rx="2"/>

  <!-- Pillars -->
  <!-- Left pillar -->
  <rect x="510" y="115" width="22" height="180" fill="url(#concreteD)" rx="2"/>
  <line x1="519" y1="120" x2="519" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="524" y1="120" x2="524" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Center pillar -->
  <rect x="664" y="115" width="22" height="180" fill="url(#concreteD)" rx="2"/>
  <line x1="673" y1="120" x2="673" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="678" y1="120" x2="678" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Right pillar -->
  <rect x="818" y="115" width="22" height="180" fill="url(#concreteD)" rx="2"/>
  <line x1="827" y1="120" x2="827" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="832" y1="120" x2="832" y2="290" stroke="#7aa3cc" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Top beam / gerenda -->
  <rect x="510" y="100" width="330" height="18" fill="url(#concreteD)" rx="2"/>
  <line x1="518" y1="107" x2="832" y2="107" stroke="#7aa3cc" stroke-width="1.2" stroke-dasharray="7,3"/>
  <line x1="518" y1="112" x2="832" y2="112" stroke="#7aa3cc" stroke-width="1.2" stroke-dasharray="7,3"/>

  <!-- Infill walls (light, non-structural) -->
  <!-- Left span infill -->
  <rect x="534" y="118" width="128" height="173" fill="url(#infillD)" rx="1" opacity="0.6"/>
  <g stroke="#1e3a58" stroke-width="0.7" opacity="0.5">
    <line x1="534" y1="134" x2="662" y2="134"/>
    <line x1="534" y1="150" x2="662" y2="150"/>
    <line x1="534" y1="166" x2="662" y2="166"/>
    <line x1="534" y1="182" x2="662" y2="182"/>
    <line x1="534" y1="198" x2="662" y2="198"/>
    <line x1="534" y1="214" x2="662" y2="214"/>
    <line x1="534" y1="230" x2="662" y2="230"/>
    <line x1="534" y1="246" x2="662" y2="246"/>
    <line x1="534" y1="262" x2="662" y2="262"/>
    <line x1="534" y1="278" x2="662" y2="278"/>
    <line x1="598" y1="118" x2="598" y2="291"/>
  </g>

  <!-- Right span: open (no infill – show freedom) -->
  <!-- Dashed outline showing optional infill -->
  <rect x="688" y="118" width="128" height="173" fill="none" stroke="#3a5a7a" stroke-width="1.5" stroke-dasharray="6,4" rx="2" opacity="0.7"/>
  <text x="752" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#5a8aaa">Nyitott</text>
  <text x="752" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#5a8aaa">tér</text>
  <text x="752" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#3a6080">(opcionális fal)</text>

  <!-- Load arrows on pillars only -->
  <g fill="#50b050" opacity="0.85">
    <!-- Arrow down on left pillar -->
    <polygon points="521,72 516,87 526,87" />
    <line x1="521" y1="60" x2="521" y2="87" stroke="#50b050" stroke-width="2"/>
    <!-- Arrow down on center pillar -->
    <polygon points="675,72 670,87 680,87" />
    <line x1="675" y1="60" x2="675" y2="87" stroke="#50b050" stroke-width="2"/>
    <!-- Arrow down on right pillar -->
    <polygon points="829,72 824,87 834,87" />
    <line x1="829" y1="60" x2="829" y2="87" stroke="#50b050" stroke-width="2"/>
  </g>

  <!-- Load label right -->
  <text x="675" y="73" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#70cc70">Teher csak a pilléreken át megy</text>

  <!-- Green check: fal eltávolítható -->
  <rect x="540" y="195" width="110" height="30" rx="4" fill="#0a2510" stroke="#30a040" stroke-width="1"/>
  <text x="595" y="207" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#70cc70">Fal eltávolítható,</text>
  <text x="595" y="218" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#70cc70">áthelyezhető</text>

  <!-- Bottom label right -->
  <text x="675" y="323" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#50a060">Szabad alaprajz – módosítható</text>

  <!-- === Center legend === -->
  <!-- VS badge -->
  <circle cx="450" cy="175" r="22" fill="#0d1b2a" stroke="#4a6fa5" stroke-width="2"/>
  <text x="450" y="181" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#7aa3cc">vs</text>

  <!-- Legend bottom -->
  <rect x="130" y="335" width="12" height="8" fill="#a06040" rx="1"/>
  <text x="148" y="343" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#9a8070">Teherhordó fal</text>

  <rect x="250" y="335" width="12" height="8" fill="#4a6fa5" rx="1"/>
  <text x="268" y="343" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7aa3cc">Vasbeton elem (pillér/gerenda/sávalap)</text>

  <rect x="550" y="335" width="12" height="8" fill="#2e4a6a" rx="1" opacity="0.8"/>
  <text x="568" y="343" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#607a95">Kitöltőfal (nem teherhordó)</text>
</svg>
