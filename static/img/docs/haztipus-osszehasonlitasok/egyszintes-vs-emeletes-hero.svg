<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e" rx="0"/>
  <defs>
    <pattern id="grid3" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid3)" opacity="0.3"/>

  <!-- Left: Single storey house -->
  <rect x="80" y="280" width="400" height="100" rx="4" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <!-- Windows -->
  <rect x="110" y="300" width="50" height="50" rx="2" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="1"/>
  <rect x="190" y="300" width="50" height="50" rx="2" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="1"/>
  <rect x="310" y="300" width="50" height="50" rx="2" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="1"/>
  <rect x="390" y="300" width="50" height="50" rx="2" fill="#2ecc71" opacity="0.2" stroke="#2ecc71" stroke-width="1"/>
  <!-- Door -->
  <rect x="265" y="310" width="35" height="70" rx="2" fill="#2ecc71" opacity="0.3" stroke="#2ecc71" stroke-width="1"/>
  <!-- Roof -->
  <polygon points="70,280 280,210 490,280" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <!-- Ground line -->
  <line x1="60" y1="380" x2="500" y2="380" stroke="#2ecc71" stroke-width="1" opacity="0.5"/>
  <!-- Dimension -->
  <line x1="80" y1="395" x2="480" y2="395" stroke="#f39c12" stroke-width="1"/>
  <line x1="80" y1="390" x2="80" y2="400" stroke="#f39c12" stroke-width="1"/>
  <line x1="480" y1="390" x2="480" y2="400" stroke="#f39c12" stroke-width="1"/>
  <text x="280" y="415" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f39c12">12 × 10 m = 120 m²</text>
  <!-- Label -->
  <text x="280" y="455" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#2ecc71" font-weight="bold">Egyszintes</text>
  <text x="280" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888">Telek: min. 600 m²</text>

  <!-- VS badge -->
  <circle cx="600" cy="320" r="35" fill="#f39c12"/>
  <text x="600" y="328" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" font-weight="bold">VS</text>

  <!-- Right: Two storey house -->
  <rect x="750" y="190" width="250" height="100" rx="4" fill="#2a2a4e" stroke="#9b59b6" stroke-width="2"/>
  <rect x="750" y="290" width="250" height="100" rx="4" fill="#2a2a4e" stroke="#9b59b6" stroke-width="2"/>
  <!-- Floor label -->
  <text x="875" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9b59b6" opacity="0.7">Emelet</text>
  <text x="875" y="345" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9b59b6" opacity="0.7">Földszint</text>
  <!-- Windows -->
  <rect x="770" y="210" width="40" height="40" rx="2" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="1"/>
  <rect x="940" y="210" width="40" height="40" rx="2" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="1"/>
  <rect x="770" y="310" width="40" height="40" rx="2" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="1"/>
  <rect x="940" y="310" width="40" height="40" rx="2" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="1"/>
  <!-- Door -->
  <rect x="860" y="320" width="30" height="70" rx="2" fill="#9b59b6" opacity="0.3" stroke="#9b59b6" stroke-width="1"/>
  <!-- Roof -->
  <polygon points="740,190 875,130 1010,190" fill="none" stroke="#9b59b6" stroke-width="2"/>
  <!-- Ground line -->
  <line x1="730" y1="390" x2="1020" y2="390" stroke="#9b59b6" stroke-width="1" opacity="0.5"/>
  <!-- Dimension -->
  <line x1="750" y1="405" x2="1000" y2="405" stroke="#f39c12" stroke-width="1"/>
  <line x1="750" y1="400" x2="750" y2="410" stroke="#f39c12" stroke-width="1"/>
  <line x1="1000" y1="400" x2="1000" y2="410" stroke="#f39c12" stroke-width="1"/>
  <text x="875" y="425" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f39c12">8 × 8 m × 2 = 128 m²</text>
  <!-- Label -->
  <text x="875" y="455" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#9b59b6" font-weight="bold">Emeletes</text>
  <text x="875" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888">Telek: min. 400 m²</text>

  <!-- Key comparison stats -->
  <rect x="150" y="510" width="200" height="50" rx="8" fill="#2a2a4e" stroke="#2ecc71" stroke-width="1"/>
  <text x="250" y="540" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">🏠 Nincs lépcső</text>

  <rect x="400" y="510" width="200" height="50" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1"/>
  <text x="500" y="540" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f39c12">💰 -10-20% m²-ár</text>

  <rect x="650" y="510" width="200" height="50" rx="8" fill="#2a2a4e" stroke="#9b59b6" stroke-width="1"/>
  <text x="750" y="540" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9b59b6">🌡️ Jobb energetika</text>

  <rect x="900" y="510" width="200" height="50" rx="8" fill="#2a2a4e" stroke="#3498db" stroke-width="1"/>
  <text x="1000" y="540" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#3498db">📐 Kisebb telek elég</text>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="white">Egyszintes vs emeletes családi ház</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Melyik éri meg jobban?</text>

  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
