<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#FAFBFC" rx="8"/>
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E293B">Könnyűszerkezetes ház – melyik típust válaszd?</text>
  <!-- Start -->
  <rect x="300" y="55" width="300" height="40" rx="20" fill="#16A34A"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Mi a legfontosabb szempont?</text>
  <!-- Branch lines -->
  <line x1="350" y1="95" x2="150" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="450" y1="95" x2="450" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="550" y1="95" x2="750" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <!-- Labels -->
  <text x="240" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#16A34A">Költség</text>
  <text x="450" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#3B82F6">Gyorsaság</text>
  <text x="660" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#8B5CF6">Tartósság</text>
  <!-- Left: Cost -->
  <rect x="30" y="140" width="240" height="75" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="150" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#15803D">Fa vázszerkezet</text>
  <text x="150" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">330–450 ezer Ft/m²</text>
  <text x="150" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">Legolcsóbb könnyűszerk. megoldás</text>
  <text x="150" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">Gyengébb hangszigetelés</text>
  <!-- Center: Speed -->
  <rect x="330" y="140" width="240" height="75" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="450" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">SIP panel</text>
  <text x="450" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">400–550 ezer Ft/m²</text>
  <text x="450" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">Gyári előregyártás → 2–3 hónap</text>
  <text x="450" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">Kiváló hőszigetelés (SIP mag)</text>
  <!-- Right: Durability -->
  <rect x="630" y="140" width="240" height="75" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="750" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6D28D9">CLT tömörfa</text>
  <text x="750" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5B21B6">800k–1,2M Ft/m²</text>
  <text x="750" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5B21B6">Masszív falszerkezet, 80+ év</text>
  <text x="750" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">Prémium, de téglaház-érzet</text>
  <!-- Second question -->
  <line x1="150" y1="215" x2="150" y2="250" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="450" y1="215" x2="450" y2="250" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="750" y1="215" x2="750" y2="250" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Second row question -->
  <rect x="250" y="250" width="400" height="35" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="450" y="273" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">Szükséged van zöld hitelre (A+ besorolás)?</text>
  <!-- Branches -->
  <line x1="350" y1="285" x2="200" y2="320" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="550" y1="285" x2="700" y2="320" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="265" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10B981">IGEN</text>
  <text x="635" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#EF4444">NEM</text>
  <!-- Left: A+ needed -->
  <rect x="60" y="320" width="280" height="70" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="342" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669">SIP vagy CLT → könnyebb A+</text>
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Gyárilag jó U-értékek (0,10–0,15)</text>
  <text x="200" y="376" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Fa váz is eléri, de több szigetelés kell</text>
  <!-- Right: No A+ -->
  <rect x="560" y="320" width="280" height="70" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="700" y="342" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DC2626">Fa vázszerkezet a legjobb ár/érték</text>
  <text x="700" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7F1D1D">BB besorolás is elég → olcsóbb falazat</text>
  <text x="700" y="376" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7F1D1D">Normál hitel: 20% önerő, 6–7% kamat</text>
  <!-- Bottom comparison table -->
  <rect x="30" y="415" width="840" height="175" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">ÖSSZEHASONLÍTÁS – 100 m²-es ház, kulcsrakész</text>
  <!-- Table header -->
  <text x="100" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">Szempont</text>
  <text x="280" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#16A34A">Fa váz</text>
  <text x="450" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#3B82F6">SIP panel</text>
  <text x="620" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#8B5CF6">CLT</text>
  <text x="780" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#DC2626">Acél váz</text>
  <line x1="50" y1="472" x2="850" y2="472" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Row 1 -->
  <text x="100" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Ár (Ft/m²)</text>
  <text x="280" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#16A34A">330–450k</text>
  <text x="450" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">400–550k</text>
  <text x="620" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5B21B6">800k–1,2M</text>
  <text x="780" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">380–520k</text>
  <!-- Row 2 -->
  <text x="100" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Építési idő</text>
  <text x="280" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">3–5 hónap</text>
  <text x="450" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">2–3 hónap</text>
  <text x="620" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5B21B6">3–4 hónap</text>
  <text x="780" y="510" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">3–5 hónap</text>
  <!-- Row 3 -->
  <text x="100" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Hangszigetelés</text>
  <text x="280" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">Gyenge</text>
  <text x="450" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">Közepes</text>
  <text x="620" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Jó</text>
  <text x="780" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">Gyenge</text>
  <!-- Row 4 -->
  <text x="100" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Élettartam</text>
  <text x="280" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">60–80 év</text>
  <text x="450" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">50–70 év</text>
  <text x="620" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">80–100+ év</text>
  <text x="780" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">50–70 év</text>
  <!-- Row 5 -->
  <text x="100" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Viszonteladás</text>
  <text x="280" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">–20–25%</text>
  <text x="450" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">–15–20%</text>
  <text x="620" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">–5–10%</text>
  <text x="780" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">–20–25%</text>
</svg>