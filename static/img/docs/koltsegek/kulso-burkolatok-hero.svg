<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- House cross-section showing layers -->
  <g transform="translate(200,80)">
    <!-- Roof -->
    <polygon points="400,0 100,120 700,120" fill="none" stroke="#818cf8" stroke-width="2"/>

    <!-- Wall layers (cross-section) -->
    <!-- Inner wall -->
    <rect x="150" y="120" width="60" height="280" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c4b5fd" transform="rotate(-90,180,270)">Falazat</text>

    <!-- Insulation layer -->
    <rect x="210" y="120" width="40" height="280" fill="#065f46" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
    <text x="230" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7" transform="rotate(-90,230,270)">Szigetelés</text>

    <!-- Base plaster -->
    <rect x="250" y="120" width="15" height="280" fill="#92400e" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>

    <!-- Finish plaster -->
    <rect x="265" y="120" width="10" height="280" fill="#f59e0b" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <text x="275" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fbbf24" transform="rotate(-90,275,270)">Vakolat</text>

    <!-- Plinth (lábazat) different color -->
    <rect x="210" y="350" width="65" height="50" fill="#7c2d12" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
    <text x="242" y="380" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fdba74">Lábazat</text>

    <!-- Ground line -->
    <line x1="100" y1="400" x2="700" y2="400" stroke="#4b5563" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="710" y="405" font-family="sans-serif" font-size="11" fill="#6b7280">talajszint</text>

    <!-- Price labels with arrows -->
    <line x1="310" y1="160" x2="350" y2="160" stroke="#818cf8" stroke-width="1"/>
    <text x="360" y="165" font-family="sans-serif" font-size="13" fill="#c4b5fd">Hőszigetelés: 2 200-5 500 Ft/m²</text>

    <line x1="310" y1="240" x2="350" y2="240" stroke="#f59e0b" stroke-width="1"/>
    <text x="360" y="245" font-family="sans-serif" font-size="13" fill="#fbbf24">Vakolat: 1 500-4 000 Ft/m²</text>

    <line x1="310" y1="320" x2="350" y2="320" stroke="#818cf8" stroke-width="1"/>
    <text x="360" y="325" font-family="sans-serif" font-size="13" fill="#c4b5fd">Alapvakolat + háló: 2 000-3 500 Ft/m²</text>

    <line x1="310" y1="375" x2="350" y2="375" stroke="#f97316" stroke-width="1"/>
    <text x="360" y="380" font-family="sans-serif" font-size="13" fill="#fdba74">Lábazat: 4 000-12 000 Ft/m²</text>
  </g>

  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Külső burkolat és homlokzat</text>
  <text x="600" y="550" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Hőszigetelés, vakolás, lábazat – árakkal 2026</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
