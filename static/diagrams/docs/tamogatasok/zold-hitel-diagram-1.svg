<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <rect width="900" height="650" fill="#FAFBFC" rx="8"/>
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E293B">Zöld hitel döntési diagram – melyik konstrukciót válaszd?</text>
  <!-- Start -->
  <rect x="300" y="55" width="300" height="40" rx="20" fill="#10B981"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Az ingatlanod eléri az A+ besorolást?</text>
  <!-- Branch lines -->
  <line x1="380" y1="95" x2="200" y2="130" stroke="#94A3B8" stroke-width="2"/>
  <line x1="520" y1="95" x2="700" y2="130" stroke="#94A3B8" stroke-width="2"/>
  <text x="280" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#EF4444">NEM</text>
  <text x="620" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#10B981">IGEN</text>
  <!-- Left: Not A+ -->
  <rect x="60" y="130" width="280" height="45" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#DC2626">Zöld kedvezmény NEM elérhető</text>
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7F1D1D">Normál hitel + 20% önerő + 50% JTM</text>
  <!-- Left sub -->
  <line x1="200" y1="175" x2="200" y2="200" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="70" y="200" width="260" height="35" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="200" y="223" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#475569">De az A+-ra felhozás 3–8% többlet</text>
  <line x1="200" y1="235" x2="200" y2="260" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="70" y="260" width="260" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="200" y="283" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#B45309">Mérlegeld: tervező módosítás</text>
  <text x="200" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">50M háznál: 1,5–4M Ft többlet → 5M+ Ft</text>
  <text x="200" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">önerő-megtakarítás + kamatkedvezmény</text>
  <!-- Right: A+ achieved -->
  <rect x="560" y="130" width="280" height="35" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="700" y="153" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#059669">Zöld kedvezmények elérhetők</text>
  <!-- Question: family status -->
  <line x1="700" y1="165" x2="700" y2="195" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="580" y="195" width="240" height="35" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="700" y="218" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#475569">Házaspár vagy, gyereket vállaltok?</text>
  <!-- Igen/Nem branches -->
  <line x1="640" y1="230" x2="560" y2="265" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="760" y1="230" x2="840" y2="265" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="590" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">Igen</text>
  <text x="810" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">Nem</text>
  <!-- Left-Right: married with kids -->
  <rect x="440" y="270" width="240" height="85" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="560" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">CSOK Plusz + Babaváró</text>
  <text x="560" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">Fix 3% + kamatmentes 11M Ft</text>
  <text x="560" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">10% önerő · 60% JTM</text>
  <text x="560" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">Max: 50M + 11M Ft</text>
  <!-- Right-Right: not married -->
  <rect x="720" y="270" width="170" height="85" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="805" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#059669">Otthon Start</text>
  <text x="805" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Fix 3% · max 50M Ft</text>
  <text x="805" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">10% önerő · bárki</text>
  <text x="805" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Egyszer igényelhető</text>
  <!-- Extra layer -->
  <line x1="560" y1="355" x2="560" y2="385" stroke="#94A3B8" stroke-width="1"/>
  <line x1="805" y1="355" x2="805" y2="385" stroke="#94A3B8" stroke-width="1"/>
  <text x="680" y="378" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">+ KIEGÉSZÍTÉS</text>
  <!-- Both can add green MFL -->
  <rect x="430" y="390" width="460" height="55" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="660" y="412" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">+ Zöld MFL (piaci zöld lakáshitel)</text>
  <text x="660" y="432" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4338CA">Piaci kamat – 0,5%+ · folyósítási díj elengedve · ingyenes ET tanúsítvány</text>
  <!-- Bottom summary -->
  <rect x="30" y="470" width="840" height="170" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="495" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">ÖSSZEHASONLÍTÁS – 50M Ft-os ház, 30M Ft hitel, 20 év futamidő</text>
  <!-- Table header -->
  <text x="130" y="525" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">Szempont</text>
  <text x="340" y="525" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">Normál hitel</text>
  <text x="550" y="525" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">CSOK Plusz (zöld)</text>
  <text x="760" y="525" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">Otthon Start (zöld)</text>
  <line x1="50" y1="532" x2="850" y2="532" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Row 1: Kamat -->
  <text x="130" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Kamat</text>
  <text x="340" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">6–7%</text>
  <text x="550" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">fix 3%</text>
  <text x="760" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">fix 3%</text>
  <!-- Row 2: Onero -->
  <text x="130" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Önerő</text>
  <text x="340" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">20% (10M Ft)</text>
  <text x="550" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">10% (5M Ft)</text>
  <text x="760" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">10% (5M Ft)</text>
  <!-- Row 3: Havi torleszto -->
  <text x="130" y="590" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Havi törlesztő</text>
  <text x="340" y="590" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">~230 ezer Ft</text>
  <text x="550" y="590" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">~166 ezer Ft</text>
  <text x="760" y="590" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">~166 ezer Ft</text>
  <!-- Row 4: Teljes visszafizetés -->
  <text x="130" y="610" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Teljes visszafiz.</text>
  <text x="340" y="610" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">~55M Ft</text>
  <text x="550" y="610" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">~40M Ft</text>
  <text x="760" y="610" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">~40M Ft</text>
  <!-- Row 5: Feltetel -->
  <text x="130" y="630" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Feltétel</text>
  <text x="340" y="630" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">Nincs extra</text>
  <text x="550" y="630" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">Házasság + gyerek</text>
  <text x="760" y="630" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">2 év TB</text>
</svg>
