<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <rect width="900" height="350" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Generálkivitelezés vs saját szervezés – összehasonlítás (120 m²)</text>
  <!-- Table -->
  <rect x="30" y="55" width="840" height="40" rx="6" fill="#312e81"/>
  <text x="200" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">Szempont</text>
  <text x="480" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">Saját szervezés</text>
  <text x="730" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">Generálkivitelező</text>
  <!-- Rows -->
  <rect x="30" y="100" width="840" height="40" fill="#fff"/>
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">Építési költség</text>
  <text x="480" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">48-55M Ft</text>
  <text x="730" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">58-68M Ft</text>

  <rect x="30" y="145" width="840" height="40" fill="#f8fafc"/>
  <text x="200" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">Te időd (12 hó)</text>
  <text x="480" y="170" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626">~1000 óra</text>
  <text x="730" y="170" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">~100 óra</text>

  <rect x="30" y="190" width="840" height="40" fill="#fff"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">Költségtúllépés kockázat</text>
  <text x="480" y="215" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Magas (15-30%)</text>
  <text x="730" y="215" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Alacsony (átalánydíj)</text>

  <rect x="30" y="235" width="840" height="40" fill="#f8fafc"/>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">Garancia</text>
  <text x="480" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Szétszórt</text>
  <text x="730" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Egypontos</text>

  <rect x="30" y="280" width="840" height="40" fill="#fff"/>
  <text x="200" y="305" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">Stressz szint</text>
  <text x="480" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626">🔴 Magas</text>
  <text x="730" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a">🟢 Közepes</text>

  <text x="450" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">A 15-25% felár fedezi: koordináció + kockázatátvállalás + garancia</text>
</svg>
