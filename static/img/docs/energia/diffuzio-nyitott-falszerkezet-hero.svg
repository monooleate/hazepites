<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#16242b"/>
  <defs><pattern id="gd" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21323a" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gd)" opacity="0.4"/>

  <!-- Wall layers (inside left -> outside right) -->
  <rect x="150" y="200" width="30" height="220" fill="#cdb48a"/>
  <rect x="180" y="200" width="55" height="220" fill="#c9a86a"/>
  <rect x="235" y="200" width="35" height="220" fill="#8a6a3a"/>
  <rect x="270" y="200" width="150" height="220" fill="#d6bd7e"/>
  <rect x="420" y="200" width="45" height="220" fill="#b5895a"/>
  <rect x="465" y="200" width="30" height="220" fill="#e8e0cf"/>
  <text x="200" y="445" font-family="sans-serif" font-size="14" fill="#8fb0a0">belso</text>
  <text x="460" y="445" font-family="sans-serif" font-size="14" fill="#8fb0a0">kulso</text>

  <!-- Vapor arrows passing through, getting easier outward -->
  <g stroke="#5dade2" stroke-width="3" fill="none">
    <path d="M 130 260 L 520 260" marker-end="url(#vd)"/>
    <path d="M 130 310 L 520 310" marker-end="url(#vd)"/>
    <path d="M 130 360 L 520 360" marker-end="url(#vd)"/>
  </g>
  <defs><marker id="vd" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><polygon points="0 0,12 4.5,0 9" fill="#5dade2"/></marker></defs>
  <text x="320" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5dade2">para szabadon kifele</text>

  <!-- stat boxes -->
  <rect x="600" y="210" width="480" height="90" rx="12" fill="#21323a" stroke="#2ecc71" stroke-width="2"/>
  <text x="840" y="250" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#2ecc71">Legtomor, megis paraatereszto</text>
  <text x="840" y="282" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ccc">folia nelkul, formaldehidmentes OSB parafekezovel</text>

  <rect x="600" y="330" width="230" height="60" rx="8" fill="#21323a" stroke="#e74c3c" stroke-width="1"/>
  <text x="715" y="357" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#e74c3c" font-weight="bold">penesz-</text>
  <text x="715" y="378" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">kockazat csokken</text>

  <rect x="850" y="330" width="230" height="60" rx="8" fill="#21323a" stroke="#f39c12" stroke-width="1"/>
  <text x="965" y="357" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12" font-weight="bold">595 g/m2/ev</text>
  <text x="965" y="378" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">szaradasi tartalek</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Diffuzionyitott falszerkezet</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#9fc0b0">A lelegzo, peneszmentes haz titka</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#5a7a6a">termeszetes anyagok – fa, farost, valyog, mesz</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#3a5a4a">hazepitesikalauz.hu</text>
</svg>
