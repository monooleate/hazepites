<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#14202b"/>
  <defs><pattern id="grk" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2f3a" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#grk)" opacity="0.4"/>

  <!-- LEFT: kozponti -->
  <rect x="100" y="200" width="440" height="260" rx="10" fill="none" stroke="#3498db" stroke-width="2.5"/>
  <!-- central unit -->
  <rect x="290" y="220" width="60" height="50" rx="4" fill="#3498db"/>
  <text x="320" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">gépház</text>
  <!-- ducts to rooms -->
  <g stroke="#5dade2" stroke-width="3" fill="none">
    <path d="M 290 245 L 160 245 L 160 360"/>
    <path d="M 350 245 L 480 245 L 480 360"/>
    <path d="M 320 270 L 320 400"/>
  </g>
  <rect x="130" y="360" width="60" height="50" fill="#1e2f3a" stroke="#5dade2" stroke-width="1"/>
  <rect x="450" y="360" width="60" height="50" fill="#1e2f3a" stroke="#5dade2" stroke-width="1"/>
  <rect x="290" y="400" width="60" height="50" fill="#1e2f3a" stroke="#5dade2" stroke-width="1"/>
  <text x="320" y="495" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#5dade2" font-weight="bold">Kozponti</text>
  <text x="320" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aab">legcsatorna, magas hatasfok</text>

  <!-- RIGHT: egyhelyiseges -->
  <rect x="660" y="200" width="440" height="260" rx="10" fill="none" stroke="#2ecc71" stroke-width="2.5"/>
  <!-- independent units in each room -->
  <g>
    <rect x="710" y="250" width="80" height="60" rx="6" fill="#1e2f3a" stroke="#2ecc71" stroke-width="1.5"/><circle cx="750" cy="280" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <rect x="850" y="250" width="80" height="60" rx="6" fill="#1e2f3a" stroke="#2ecc71" stroke-width="1.5"/><circle cx="890" cy="280" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <rect x="980" y="250" width="80" height="60" rx="6" fill="#1e2f3a" stroke="#2ecc71" stroke-width="1.5"/><circle cx="1020" cy="280" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <rect x="780" y="350" width="80" height="60" rx="6" fill="#1e2f3a" stroke="#2ecc71" stroke-width="1.5"/><circle cx="820" cy="380" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <rect x="910" y="350" width="80" height="60" rx="6" fill="#1e2f3a" stroke="#2ecc71" stroke-width="1.5"/><circle cx="950" cy="380" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
  </g>
  <text x="880" y="495" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#2ecc71" font-weight="bold">Egyhelyiseges</text>
  <text x="880" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aab">autonom, redundans, nincs legcsatorna</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="33" font-weight="bold" fill="white">Hovisszanyeros szelloztetes</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Kozponti vagy egyhelyiseges rekuperator?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7a8a95">a legtomor haz alapfelszerelese</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#3a4a55">hazepitesikalauz.hu</text>
</svg>
