<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b" rx="0"/>
  <!-- 8 phase circles with connecting line -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#312e81" stroke-width="4"/>
  <!-- Phase 1 -->
  <circle cx="100" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="100" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">1</text>
  <text x="100" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Döntés</text>
  <!-- Phase 2 -->
  <circle cx="243" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="243" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">2</text>
  <text x="243" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Tervezés</text>
  <!-- Phase 3 -->
  <circle cx="386" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="386" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">3</text>
  <text x="386" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Pénzügyek</text>
  <!-- Phase 4 -->
  <circle cx="529" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="529" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">4</text>
  <text x="529" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Kivitelező</text>
  <!-- Phase 5 -->
  <circle cx="672" cy="200" r="28" fill="#22c55e" stroke="#34d399" stroke-width="2.5"/>
  <text x="672" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">5</text>
  <text x="672" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6ee7b7">Építés</text>
  <!-- Phase 6 -->
  <circle cx="815" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="815" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">6</text>
  <text x="815" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Gépészet</text>
  <!-- Phase 7 -->
  <circle cx="958" cy="200" r="28" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="958" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#818cf8">7</text>
  <text x="958" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Befejezés</text>
  <!-- Phase 8 -->
  <circle cx="1100" cy="200" r="28" fill="#312e81" stroke="#34d399" stroke-width="2.5"/>
  <text x="1100" y="206" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#34d399">✓</text>
  <text x="1100" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6ee7b7">Átadás</text>
  <!-- Timeline bar -->
  <rect x="100" y="290" width="1000" height="40" rx="8" fill="#312e81"/>
  <rect x="100" y="290" width="200" height="40" rx="8" fill="#818cf8" opacity="0.3"/>
  <text x="200" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c4b5fd">3-6 hó tervezés</text>
  <rect x="300" y="290" width="700" height="40" rx="8" fill="#22c55e" opacity="0.15"/>
  <text x="650" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6ee7b7">8-14 hó építkezés</text>
  <rect x="1000" y="290" width="100" height="40" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="1050" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">1-2 hó</text>
  <!-- Key stats -->
  <g transform="translate(150, 380)">
    <text x="0" y="0" font-family="sans-serif" font-size="36" font-weight="bold" fill="#f1f5f9">14-24 hónap</text>
    <text x="0" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">Teljes átfutás</text>
  </g>
  <g transform="translate(500, 380)">
    <text x="0" y="0" font-family="sans-serif" font-size="36" font-weight="bold" fill="#f1f5f9">500-700e</text>
    <text x="0" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">Ft/m² kulcsrakész</text>
  </g>
  <g transform="translate(850, 380)">
    <text x="0" y="0" font-family="sans-serif" font-size="36" font-weight="bold" fill="#f1f5f9">8 fázis</text>
    <text x="0" y="30" font-family="sans-serif" font-size="14" fill="#94a3b8">Döntéstől kulcsig</text>
  </g>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Házépítés lépésről lépésre</text>
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Az első gondolattól a kulcsátadásig – 2026</text>
  <!-- Brand -->
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
