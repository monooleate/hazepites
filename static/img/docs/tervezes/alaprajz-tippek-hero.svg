<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Simplified floor plan outline -->
  <g transform="translate(300,120)" stroke="#818cf8" stroke-width="2" fill="none">
    <rect width="600" height="350" rx="4" fill="#312e81" opacity="0.3"/>
    <!-- Rooms -->
    <line x1="250" y1="0" x2="250" y2="200"/>
    <line x1="250" y1="200" x2="600" y2="200"/>
    <line x1="400" y1="200" x2="400" y2="350"/>
    <line x1="0" y1="200" x2="250" y2="200"/>
    <line x1="120" y1="200" x2="120" y2="350"/>
    <!-- Room labels -->
    <text x="125" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c4b5fd" stroke="none">Nappali</text>
    <text x="125" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none">30 m²</text>
    <text x="420" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#c4b5fd" stroke="none">Háló</text>
    <text x="420" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none">16 m²</text>
    <text x="60" y="280" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd" stroke="none">Konyha</text>
    <text x="60" y="298" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none">12 m²</text>
    <text x="260" y="280" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd" stroke="none">Gyerek</text>
    <text x="260" y="298" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none">12 m²</text>
    <text x="500" y="280" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd" stroke="none">Fürdő</text>
    <text x="500" y="298" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none">7 m²</text>
  </g>

  <!-- Compass -->
  <g transform="translate(1050,200)">
    <circle r="30" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text y="-12" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">É</text>
    <text y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">D</text>
    <text x="-18" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Ny</text>
    <text x="18" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">K</text>
  </g>

  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Alaprajz tippek</text>
  <text x="600" y="556" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Minden m² dolgozzon érted</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
