<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#ffffff" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Tájolási útmutató – melyik szoba hova kerüljön?</text>

  <!-- Compass rose center -->
  <circle cx="400" cy="200" r="130" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="400" cy="200" r="50" fill="#312e81" opacity="0.1"/>
  <text x="400" y="205" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">HÁZ</text>

  <!-- South (bottom) - Warm colors -->
  <text x="400" y="355" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">DÉL ☀️</text>
  <text x="400" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">Nappali, étkező, gyerekszoba</text>
  <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b45309">Nagy üvegfelületek ide!</text>

  <!-- North (top) - Cool colors -->
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">ÉSZAK ❄️</text>
  <text x="400" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Kamra, garázs, gépészet, lépcső</text>
  <text x="400" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2563eb">Hőpuffer zóna</text>

  <!-- East (right) -->
  <text x="680" y="195" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#22c55e">KELET 🌅</text>
  <text x="680" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#166534">Hálószobák, konyha</text>

  <!-- West (left) -->
  <text x="120" y="195" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f97316">NYUGAT 🌇</text>
  <text x="120" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9a3412">Kerülendő nagy üveg!</text>
  <text x="120" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c2410c">Árnyékolás kötelező</text>

  <text x="400" y="375" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">hazepitesikalauz.hu</text>
</svg>
