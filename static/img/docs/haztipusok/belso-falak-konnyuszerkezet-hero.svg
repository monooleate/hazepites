<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gbf" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gbf)" opacity="0.3"/>

  <!-- EXTRA fal cross-section -->
  <text x="325" y="195" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2ecc71">Extra teherhordó (~210 mm)</text>
  <g>
    <rect x="180" y="220" width="22" height="180" fill="#e74c3c" opacity="0.7"/>
    <rect x="202" y="220" width="20" height="180" fill="#8a6a3a"/>
    <rect x="222" y="220" width="160" height="180" fill="#c9a86a"/>
    <rect x="382" y="220" width="20" height="180" fill="#8a6a3a"/>
    <rect x="402" y="220" width="22" height="180" fill="#e74c3c" opacity="0.7"/>
  </g>
  <text x="302" y="315" text-anchor="middle" font-size="13" fill="#3a2a14">160 mm váz + befújt farost</text>
  <text x="302" y="425" text-anchor="middle" font-size="12" fill="#aaa">gk + OSB | OSB + gk (kétoldali merevítés)</text>

  <!-- NORMAL fal cross-section -->
  <text x="850" y="195" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3498db">Normál teherhordó (~148 mm)</text>
  <g>
    <rect x="740" y="240" width="18" height="140" fill="#e67e22" opacity="0.7"/>
    <rect x="758" y="240" width="18" height="140" fill="#8a6a3a"/>
    <rect x="776" y="240" width="108" height="140" fill="#c9a86a"/>
    <rect x="884" y="240" width="18" height="140" fill="#8a6a3a"/>
    <rect x="902" y="240" width="18" height="140" fill="#e67e22" opacity="0.7"/>
  </g>
  <text x="830" y="315" text-anchor="middle" font-size="13" fill="#3a2a14">100 mm váz</text>
  <text x="830" y="405" text-anchor="middle" font-size="12" fill="#aaa">helyiségelválasztás</text>

  <rect x="320" y="470" width="560" height="50" rx="8" fill="#2a2a4e" stroke="#f1c40f" stroke-width="1"/>
  <text x="600" y="501" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f1c40f">A gyártmányterv jelöli, melyik fal teherhordó és melyik bontható</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Belső falak könnyűszerkezetnél</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Teherhordó vagy bontható?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">tűzgátló gipszkarton + OSB + befújt farost</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
