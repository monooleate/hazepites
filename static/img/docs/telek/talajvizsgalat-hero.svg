<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e" rx="0"/>
  <defs>
    <linearGradient id="soil1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Soil layers -->
  <rect x="100" y="200" width="1000" height="35" fill="#854d0e" opacity="0.4" rx="4"/>
  <text x="130" y="223" font-family="sans-serif" font-size="14" fill="#fbbf24">Humusz (0-30 cm)</text>

  <rect x="100" y="240" width="1000" height="45" fill="#78350f" opacity="0.5" rx="4"/>
  <text x="130" y="268" font-family="sans-serif" font-size="14" fill="#fde68a">Agyag (30-80 cm)</text>

  <rect x="100" y="290" width="1000" height="50" fill="#713f12" opacity="0.4" rx="4"/>
  <text x="130" y="320" font-family="sans-serif" font-size="14" fill="#fde68a">Homok (80-150 cm)</text>

  <rect x="100" y="345" width="1000" height="40" fill="#422006" opacity="0.5" rx="4"/>
  <text x="130" y="370" font-family="sans-serif" font-size="14" fill="#d4a574">Kavics (150-200 cm)</text>

  <!-- Water level indicator -->
  <line x1="100" y1="310" x2="1100" y2="310" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="1080" y="305" text-anchor="end" font-family="sans-serif" font-size="12" fill="#38bdf8">Talajvíz ▾</text>

  <!-- Drill icon -->
  <g transform="translate(600,180)">
    <rect x="-4" y="-100" width="8" height="120" fill="#94a3b8" rx="2"/>
    <polygon points="-8,20 8,20 0,45" fill="#818cf8"/>
    <circle cx="0" cy="-100" r="12" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  </g>

  <!-- Cost badge -->
  <g transform="translate(900,150)">
    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text y="7" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c4b5fd">80–250e Ft</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Talajvizsgálat</text>
  <text x="600" y="500" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">amit 100 ezerért megelőzhetsz – milliókat spórolva</text>

  <!-- Brand -->
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
