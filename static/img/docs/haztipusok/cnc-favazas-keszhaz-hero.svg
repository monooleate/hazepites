<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gcnc" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gcnc)" opacity="0.3"/>

  <!-- Flow: terv -> CNC -> panel -> daru -->
  <!-- 1 terv -->
  <rect x="90" y="220" width="150" height="160" rx="8" fill="#2a2a4e" stroke="#3498db" stroke-width="2"/>
  <g stroke="#5dade2" stroke-width="2" fill="none"><rect x="115" y="250" width="100" height="70"/><line x1="115" y1="290" x2="215" y2="290"/><line x1="150" y1="250" x2="150" y2="320"/></g>
  <text x="165" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5dade2">gyartmanyterv</text>

  <path d="M 245 300 L 285 300" stroke="#f39c12" stroke-width="3" marker-end="url(#ac)"/>

  <!-- 2 CNC -->
  <rect x="290" y="220" width="150" height="160" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="2"/>
  <rect x="315" y="250" width="100" height="60" rx="3" fill="#34495e"/>
  <rect x="345" y="240" width="40" height="20" fill="#f39c12"/>
  <text x="365" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f39c12">CNC gyartas</text>

  <path d="M 445 300 L 485 300" stroke="#f39c12" stroke-width="3" marker-end="url(#ac)"/>

  <!-- 3 panel -->
  <rect x="490" y="220" width="150" height="160" rx="8" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <rect x="515" y="245" width="100" height="110" fill="#c9a86a"/>
  <g stroke="#8a6a3a" stroke-width="2"><line x1="540" y1="245" x2="540" y2="355"/><line x1="565" y1="245" x2="565" y2="355"/><line x1="590" y1="245" x2="590" y2="355"/></g>
  <text x="565" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2ecc71">falpanel</text>

  <path d="M 645 300 L 685 300" stroke="#f39c12" stroke-width="3" marker-end="url(#ac)"/>

  <!-- 4 daru -->
  <rect x="690" y="220" width="150" height="160" rx="8" fill="#2a2a4e" stroke="#9b59b6" stroke-width="2"/>
  <line x1="715" y1="350" x2="715" y2="245" stroke="#bb8fce" stroke-width="3"/>
  <line x1="715" y1="245" x2="800" y2="245" stroke="#bb8fce" stroke-width="3"/>
  <line x1="800" y1="245" x2="800" y2="280" stroke="#bb8fce" stroke-width="1.5"/>
  <rect x="785" y="280" width="30" height="40" fill="#c9a86a"/>
  <text x="765" y="375" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#bb8fce">helyszini daru</text>

  <defs><marker id="ac" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f39c12"/></marker></defs>

  <!-- precision stats -->
  <rect x="880" y="220" width="220" height="160" rx="10" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <text x="990" y="255" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Mm pontossag</text>
  <text x="990" y="290" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2ecc71">atlo: max ±6 mm</text>
  <text x="990" y="315" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2ecc71">sik: ±2 mm/m</text>
  <text x="990" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2ecc71">hossz: ±3 mm</text>
  <text x="990" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2ecc71">szog: max 0,5°</text>

  <text x="600" y="475" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12">A helyszinen mar csak osszeallitas es merevites – nehany nap alatt all a szerkezet</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="white">CNC favazas keszhaz</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Hogyan keszul a gyarban milliméter pontosan?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">a haz legokent all ossze – de mernoki pontossaggal</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
