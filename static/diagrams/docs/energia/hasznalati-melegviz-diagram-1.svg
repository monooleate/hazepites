<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#14202b">Melegvíz-megoldás házméret szerint</text>

  <!-- rows -->
  <g font-family="sans-serif">
    <!-- header -->
    <text x="60" y="78" font-size="13" font-weight="bold" fill="#777">Házméret</text>
    <text x="320" y="78" font-size="13" font-weight="bold" fill="#777">Megoldás</text>
    <text x="720" y="78" font-size="13" font-weight="bold" fill="#777">Energia</text>
    <line x1="50" y1="88" x2="850" y2="88" stroke="#ddd"/>

    <text x="60" y="124" font-size="13" fill="#333">100 m² alatt</text>
    <text x="320" y="124" font-size="13" fill="#e67e22">1 elektromos bojler (~100 l)</text>
    <rect x="720" y="112" width="120" height="14" fill="#e74c3c" opacity="0.5"/>
    <line x1="50" y1="142" x2="850" y2="142" stroke="#f0f0f0"/>

    <text x="60" y="178" font-size="13" fill="#333">100–150 m²</text>
    <text x="320" y="178" font-size="13" fill="#e67e22">2 elektromos bojler</text>
    <rect x="720" y="166" width="120" height="14" fill="#e74c3c" opacity="0.5"/>
    <line x1="50" y1="196" x2="850" y2="196" stroke="#f0f0f0"/>

    <text x="60" y="232" font-size="13" fill="#333">200 m² felett</text>
    <text x="320" y="232" font-size="13" fill="#27ae60">hőszivattyús vízmelegítő (200–250 l)</text>
    <rect x="720" y="220" width="38" height="14" fill="#2ecc71"/>
    <text x="765" y="232" font-size="11" fill="#27ae60">-65-70%</text>
    <line x1="50" y1="250" x2="850" y2="250" stroke="#f0f0f0"/>

    <text x="60" y="286" font-size="13" fill="#333">hőszivattyús fűtésnél</text>
    <text x="320" y="286" font-size="13" fill="#2980b9">központi + puffertartály</text>
    <rect x="720" y="274" width="42" height="14" fill="#3498db"/>
    <text x="770" y="286" font-size="11" fill="#2980b9">egy rendszer</text>
  </g>
  <line x1="50" y1="300" x2="850" y2="300" stroke="#ddd"/>

  <!-- tarolomeret -->
  <rect x="60" y="320" width="780" height="70" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Tárolóméret a háztartáshoz</text>
  <text x="200" y="370" text-anchor="middle" font-size="12" fill="#555">1-2 fő: 80-100 l</text>
  <text x="450" y="370" text-anchor="middle" font-size="12" fill="#555">3-4 fő: 100-150 l</text>
  <text x="700" y="370" text-anchor="middle" font-size="12" fill="#555">nagy család: 200-250 l</text>

  <rect x="60" y="405" width="780" height="45" rx="8" fill="#eafaf1" stroke="#27ae60"/>
  <text x="450" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5b36">A melegvizet mindig a fűtési rendszerrel együtt gondold végig – ne tégy pazarló bojlert hőszivattyú mellé!</text>

  <text x="880" y="470" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
