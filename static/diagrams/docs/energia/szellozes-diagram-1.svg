<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#ffffff" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Központi vs. decentralizált szellőztetés</text>

  <!-- Headers -->
  <rect x="200" y="55" width="250" height="35" rx="6" fill="#ede9fe"/>
  <text x="325" y="78" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5b21b6">Központi HRV</text>
  <rect x="455" y="55" width="250" height="35" rx="6" fill="#fef3c7"/>
  <text x="580" y="78" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#92400e">Decentralizált</text>

  <!-- Rows -->
  <text x="30" y="118" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Hatásfok</text>
  <text x="325" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534" font-weight="bold">80–93%</text>
  <text x="580" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9a3412">50–75%</text>

  <line x1="30" y1="132" x2="720" y2="132" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="158" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Zajszint</text>
  <text x="325" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534" font-weight="bold">Alacsony</text>
  <text x="580" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9a3412">Érezhető</text>

  <line x1="30" y1="172" x2="720" y2="172" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="198" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Ár (120 m²)</text>
  <text x="325" y="198" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">1,6–2,5M Ft</text>
  <text x="580" y="198" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">0,8–1,5M Ft</text>

  <line x1="30" y1="212" x2="720" y2="212" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="238" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Felújításnál</text>
  <text x="325" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9a3412">Nehéz</text>
  <text x="580" y="238" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534" font-weight="bold">Egyszerű</text>

  <line x1="30" y1="252" x2="720" y2="252" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="278" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Karbantartás</text>
  <text x="325" y="278" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534" font-weight="bold">1 gép, 1 szűrő</text>
  <text x="580" y="278" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9a3412">Szobánként külön</text>

  <line x1="30" y1="292" x2="720" y2="292" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="318" font-family="sans-serif" font-size="13" font-weight="600" fill="#374151">Ajánlott</text>
  <text x="325" y="318" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="bold">Új építés</text>
  <text x="580" y="318" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#92400e" font-weight="bold">Felújítás</text>

  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">hazepitesikalauz.hu</text>
</svg>
