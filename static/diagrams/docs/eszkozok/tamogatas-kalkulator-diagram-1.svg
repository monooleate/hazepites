<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#0f172a" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">Támogatás döntési fa – melyik konstrukció illik hozzád?</text>

  <!-- Start node -->
  <rect x="325" y="55" width="250" height="40" rx="20" fill="#6366f1"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Házasok vagytok?</text>

  <!-- YES branch -->
  <line x1="390" y1="95" x2="250" y2="125" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#22c55e">Igen</text>

  <!-- NO branch -->
  <line x1="510" y1="95" x2="650" y2="125" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">Nem</text>

  <!-- Not married result -->
  <rect x="550" y="125" width="300" height="70" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="700" y="148" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fca5a5" font-weight="bold">CSOK Plusz: NEM</text>
  <text x="700" y="166" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fca5a5" font-weight="bold">Babaváró: NEM</text>
  <text x="700" y="184" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Falusi CSOK: meglévő gyerekkel IGEN</text>

  <!-- Married - next question -->
  <rect x="100" y="125" width="300" height="40" rx="20" fill="#6366f1"/>
  <text x="250" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Vállaltok gyereket?</text>

  <!-- Child YES -->
  <line x1="180" y1="165" x2="130" y2="195" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#22c55e">Igen</text>

  <!-- Child NO -->
  <line x1="320" y1="165" x2="420" y2="195" stroke="#ef4444" stroke-width="2"/>
  <text x="380" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">Nem</text>

  <!-- No child result -->
  <rect x="330" y="195" width="280" height="55" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="470" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fbbf24" font-weight="bold">Csak Falusi CSOK</text>
  <text x="470" y="238" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">meglévő gyerekek után, preferált településen</text>

  <!-- With child - location question -->
  <rect x="20" y="195" width="280" height="40" rx="20" fill="#6366f1"/>
  <text x="160" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Preferált kistelepülés?</text>

  <!-- Location YES -->
  <line x1="90" y1="235" x2="90" y2="270" stroke="#22c55e" stroke-width="2"/>
  <text x="75" y="258" font-family="sans-serif" font-size="11" fill="#22c55e">Igen</text>

  <!-- Location NO -->
  <line x1="230" y1="235" x2="230" y2="270" stroke="#fbbf24" stroke-width="2"/>
  <text x="245" y="258" font-family="sans-serif" font-size="11" fill="#fbbf24">Nem</text>

  <!-- City result -->
  <rect x="130" y="270" width="260" height="100" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="260" y="293" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="bold">Város / nagyközség</text>
  <text x="260" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">CSOK Plusz: max 50M Ft</text>
  <text x="260" y="335" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Babaváró: 11M Ft</text>
  <text x="260" y="355" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Falusi CSOK: NEM</text>
  <text x="260" y="365" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">───────────────</text>

  <!-- Village result - FULL COMBO -->
  <rect x="550" y="270" width="310" height="120" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="705" y="293" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#818cf8" font-weight="bold">Preferált település – MAXIMUM</text>
  <text x="705" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">CSOK Plusz: max 50M Ft</text>
  <text x="705" y="335" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#60a5fa">Falusi CSOK: max 15M Ft (VNT)</text>
  <text x="705" y="355" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c084fc">Babaváró: 11M Ft</text>
  <text x="705" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">Tartozáselengedés: max 20M Ft</text>

  <!-- Arrow from village YES to full combo -->
  <line x1="90" y1="270" x2="90" y2="320" stroke="#22c55e" stroke-width="2"/>
  <line x1="90" y1="320" x2="548" y2="320" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Gyerekszám bontás -->
  <g transform="translate(50,410)">
    <rect x="0" y="0" width="800" height="80" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="400" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8" font-weight="bold">CSOK Plusz összeg gyerekszám szerint (meglévő + vállalt)</text>

    <rect x="20" y="35" width="230" height="35" rx="6" fill="#166534" opacity="0.3"/>
    <text x="135" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="bold">1 gyerek: 15M Ft</text>

    <rect x="270" y="35" width="230" height="35" rx="6" fill="#166534" opacity="0.5"/>
    <text x="385" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="bold">2 gyerek: 30M Ft</text>

    <rect x="520" y="35" width="260" height="35" rx="6" fill="#166534" opacity="0.7"/>
    <text x="650" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="bold">3+ gyerek: 50M Ft</text>
  </g>

  <text x="450" y="510" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">hazepitesikalauz.hu</text>
</svg>
