<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Házépítés időterv – 120 m² családi ház, 2026</text>
  <!-- Timeline header -->
  <g transform="translate(30, 60)">
    <text x="170" y="15" text-anchor="end" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b">Fázis</text>
    <!-- Month markers -->
    <text x="210" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">1</text>
    <text x="246" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">2</text>
    <text x="282" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">3</text>
    <text x="318" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">4</text>
    <text x="354" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">5</text>
    <text x="390" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">6</text>
    <text x="426" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">7</text>
    <text x="462" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">8</text>
    <text x="498" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">9</text>
    <text x="534" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">10</text>
    <text x="570" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">11</text>
    <text x="606" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">12</text>
    <text x="642" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">13</text>
    <text x="678" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">14</text>
    <text x="714" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">15</text>
    <text x="750" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">16</text>
    <text x="786" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">17</text>
    <text x="822" y="15" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">18</text>
    <!-- Phase bars -->
    <!-- 1. Döntés: month 1-2 -->
    <text x="170" y="45" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">1. Döntés</text>
    <rect x="192" y="30" width="72" height="22" rx="4" fill="#818cf8"/>
    <!-- 2. Tervezés: month 2-5 -->
    <text x="170" y="75" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">2. Tervezés</text>
    <rect x="228" y="60" width="144" height="22" rx="4" fill="#6366f1"/>
    <!-- 3. Finanszírozás: month 3-5 -->
    <text x="170" y="105" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">3. Pénzügyek</text>
    <rect x="264" y="90" width="108" height="22" rx="4" fill="#a78bfa"/>
    <!-- 4. Kivitelező: month 4-6 -->
    <text x="170" y="135" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">4. Kivitelező</text>
    <rect x="300" y="120" width="108" height="22" rx="4" fill="#c4b5fd"/>
    <!-- 5. Alapozás+szerkezet: month 6-10 -->
    <text x="170" y="165" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">5. Építés</text>
    <rect x="372" y="150" width="180" height="22" rx="4" fill="#22c55e"/>
    <!-- 6. Gépészet: month 9-12 -->
    <text x="170" y="195" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">6. Gépészet</text>
    <rect x="480" y="180" width="144" height="22" rx="4" fill="#34d399"/>
    <!-- 7. Befejezés: month 11-15 -->
    <text x="170" y="225" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">7. Befejezés</text>
    <rect x="552" y="210" width="180" height="22" rx="4" fill="#f59e0b"/>
    <!-- 8. Átadás: month 15-17 -->
    <text x="170" y="255" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1e293b">8. Átadás</text>
    <rect x="696" y="240" width="108" height="22" rx="4" fill="#ef4444" opacity="0.7"/>
  </g>
  <!-- Legend -->
  <g transform="translate(200, 340)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#6366f1"/>
    <text x="22" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Előkészítés (3-6 hó)</text>
    <rect x="180" y="0" width="16" height="16" rx="3" fill="#22c55e"/>
    <text x="202" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Építkezés (8-14 hó)</text>
    <rect x="380" y="0" width="16" height="16" rx="3" fill="#ef4444" opacity="0.7"/>
    <text x="402" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Átadás (1-2 hó)</text>
  </g>
  <!-- Total -->
  <text x="450" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Teljes átfutás: 14-24 hónap (párhuzamosítással 14-18 hónap elérhető)</text>
</svg>
