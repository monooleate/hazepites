<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bgD)" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Hőszivattyú típusok összehasonlítása</text>
  <!-- Fejlécek -->
  <text x="150" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#64748b">Szempont</text>
  <text x="370" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#22c55e">Levegő-víz</text>
  <text x="570" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#a855f7">Földhő</text>
  <text x="770" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#06b6d4">Víz-víz</text>
  <line x1="50" y1="95" x2="850" y2="95" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Sorok -->
  <g font-family="sans-serif" font-size="13" fill="#475569">
    <!-- Sor 1 -->
    <rect x="50" y="105" width="800" height="45" rx="6" fill="#f8fafc"/>
    <text x="150" y="132" text-anchor="middle" font-weight="600">Beruházás</text>
    <text x="370" y="132" text-anchor="middle">2,2-4,5M Ft</text>
    <text x="570" y="132" text-anchor="middle">3,5-7M Ft</text>
    <text x="770" y="132" text-anchor="middle">3-6M Ft</text>
    <!-- Sor 2 -->
    <rect x="50" y="160" width="800" height="45" rx="6" fill="#ffffff"/>
    <text x="150" y="187" text-anchor="middle" font-weight="600">SCOP</text>
    <text x="370" y="187" text-anchor="middle">3,5-4,5</text>
    <text x="570" y="187" text-anchor="middle" font-weight="bold" fill="#a855f7">4,0-5,0</text>
    <text x="770" y="187" text-anchor="middle" font-weight="bold" fill="#06b6d4">4,5-5,5</text>
    <!-- Sor 3 -->
    <rect x="50" y="215" width="800" height="45" rx="6" fill="#f8fafc"/>
    <text x="150" y="242" text-anchor="middle" font-weight="600">Éves rezsi (120 m²)</text>
    <text x="370" y="242" text-anchor="middle">170-250e Ft</text>
    <text x="570" y="242" text-anchor="middle" font-weight="bold" fill="#a855f7">120-180e Ft</text>
    <text x="770" y="242" text-anchor="middle" font-weight="bold" fill="#06b6d4">100-160e Ft</text>
    <!-- Sor 4 -->
    <rect x="50" y="270" width="800" height="45" rx="6" fill="#ffffff"/>
    <text x="150" y="297" text-anchor="middle" font-weight="600">Telepítési idő</text>
    <text x="370" y="297" text-anchor="middle" font-weight="bold" fill="#22c55e">2-3 nap</text>
    <text x="570" y="297" text-anchor="middle">1-2 hét</text>
    <text x="770" y="297" text-anchor="middle">1-3 hét</text>
    <!-- Sor 5 -->
    <rect x="50" y="325" width="800" height="45" rx="6" fill="#f8fafc"/>
    <text x="150" y="352" text-anchor="middle" font-weight="600">Zajszint</text>
    <text x="370" y="352" text-anchor="middle">45-55 dB</text>
    <text x="570" y="352" text-anchor="middle" font-weight="bold" fill="#a855f7">Hangtalan</text>
    <text x="770" y="352" text-anchor="middle" font-weight="bold" fill="#06b6d4">Hangtalan</text>
    <!-- Sor 6 -->
    <rect x="50" y="380" width="800" height="45" rx="6" fill="#ffffff"/>
    <text x="150" y="407" text-anchor="middle" font-weight="600">Telekkötöttség</text>
    <text x="370" y="407" text-anchor="middle" font-weight="bold" fill="#22c55e">Bárhol</text>
    <text x="570" y="407" text-anchor="middle">Alkalmas talaj</text>
    <text x="770" y="407" text-anchor="middle">Vízjogi eng.</text>
    <!-- Sor 7 -->
    <rect x="50" y="435" width="800" height="45" rx="6" fill="#f8fafc"/>
    <text x="150" y="462" text-anchor="middle" font-weight="600">Piaci arány (HU)</text>
    <text x="370" y="462" text-anchor="middle" font-weight="bold" fill="#22c55e">~80-85%</text>
    <text x="570" y="462" text-anchor="middle">~10-12%</text>
    <text x="770" y="462" text-anchor="middle">~3-5%</text>
  </g>
</svg>