<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#14202b"/>
  <defs><pattern id="ghm" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2f3a" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#ghm)" opacity="0.4"/>

  <!-- bojler -->
  <rect x="130" y="210" width="120" height="220" rx="20" fill="#1e2f3a" stroke="#e67e22" stroke-width="2"/>
  <rect x="150" y="250" width="80" height="140" rx="8" fill="#e67e22" opacity="0.3"/>
  <text x="190" y="465" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#e67e22" font-weight="bold">Elektromos bojler</text>
  <text x="190" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">olcsó, kis ház</text>

  <!-- hoszivattyus vizmelegito -->
  <rect x="470" y="200" width="130" height="230" rx="16" fill="#1e2f3a" stroke="#2ecc71" stroke-width="2"/>
  <rect x="485" y="200" width="100" height="55" rx="8" fill="#2ecc71" opacity="0.3"/>
  <circle cx="535" cy="227" r="16" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <rect x="495" y="270" width="80" height="140" rx="8" fill="#2ecc71" opacity="0.15"/>
  <text x="535" y="465" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#2ecc71" font-weight="bold">Hőszivattyús</text>
  <text x="535" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">-65-70% energia</text>

  <!-- kozponti puffer -->
  <rect x="820" y="200" width="140" height="230" rx="16" fill="#1e2f3a" stroke="#3498db" stroke-width="2"/>
  <rect x="838" y="230" width="104" height="180" rx="8" fill="#3498db" opacity="0.2"/>
  <path d="M 870 300 Q 890 280 910 300 Q 890 320 910 340" stroke="#5dade2" stroke-width="2" fill="none"/>
  <text x="890" y="465" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#5dade2" font-weight="bold">Központi + puffer</text>
  <text x="890" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">fűtés + HMV egyben</text>

  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12">A megoldás a házmérethez és a fűtési rendszerhez igazítható</text>

  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="white">Használati melegvíz (HMV)</text>
  <text x="600" y="110" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#9fc0b0">Bojler, hőszivattyú vagy puffer?</text>
  <text x="600" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#5a7a6a">a láthatatlan rezsitétel, amire ritkán gondolsz</text>
  <text x="600" y="615" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#3a5a4a">hazepitesikalauz.hu</text>
</svg>
