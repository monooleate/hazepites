<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gj" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gj)" opacity="0.3"/>

  <!-- Document with magnifier -->
  <rect x="120" y="180" width="280" height="340" rx="8" fill="#2a2a4e" stroke="#7f8c8d" stroke-width="2"/>
  <g stroke="#566" stroke-width="3"><line x1="155" y1="225" x2="365" y2="225"/><line x1="155" y1="255" x2="365" y2="255"/><line x1="155" y1="285" x2="320" y2="285"/></g>
  <!-- fine print highlighted -->
  <rect x="150" y="320" width="220" height="100" rx="4" fill="#e74c3c" opacity="0.15"/>
  <g stroke="#e74c3c" stroke-width="2"><line x1="160" y1="340" x2="360" y2="340"/><line x1="160" y1="360" x2="360" y2="360"/><line x1="160" y1="380" x2="340" y2="380"/><line x1="160" y1="400" x2="350" y2="400"/></g>
  <text x="260" y="450" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e74c3c">apro betus kikotesek</text>
  <!-- magnifier -->
  <circle cx="350" cy="380" r="55" fill="none" stroke="#f39c12" stroke-width="5"/>
  <line x1="388" y1="418" x2="430" y2="460" stroke="#f39c12" stroke-width="8" stroke-linecap="round"/>

  <!-- Warning items -->
  <rect x="500" y="190" width="280" height="55" rx="8" fill="#2a2a4e" stroke="#e74c3c" stroke-width="1"/>
  <text x="640" y="223" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ccc">Fogadoszint kulon tetel</text>
  <rect x="500" y="255" width="280" height="55" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1"/>
  <text x="640" y="288" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ccc">Kozmu csak 1 m-ig</text>
  <rect x="500" y="320" width="280" height="55" rx="8" fill="#2a2a4e" stroke="#e74c3c" stroke-width="1"/>
  <text x="640" y="353" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ccc">Esztrich-para = milliok</text>
  <rect x="500" y="385" width="280" height="55" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1"/>
  <text x="640" y="418" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ccc">Idojaras = nem kotber</text>
  <rect x="500" y="450" width="280" height="55" rx="8" fill="#2a2a4e" stroke="#9b59b6" stroke-width="1"/>
  <text x="640" y="483" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ccc">Potmunka csak irasban</text>

  <rect x="820" y="220" width="270" height="200" rx="10" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <text x="955" y="265" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#2ecc71">!</text>
  <text x="955" y="330" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold">Nem atveres –</text>
  <text x="955" y="358" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold">el nem olvasott</text>
  <text x="955" y="386" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff" font-weight="bold">szerzodes</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Keszhaz-szerzodes buktatoi</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Amit a kivitelezok nem mondanak el</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
