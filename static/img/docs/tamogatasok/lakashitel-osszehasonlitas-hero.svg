<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Three loan type cards -->
  <!-- Card 1: Piaci hitel -->
  <g transform="translate(100,100)">
    <rect x="0" y="0" width="280" height="300" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="140" y="40" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c4b5fd">Piaci hitel</text>
    <!-- Bank icon -->
    <rect x="100" y="60" width="80" height="50" rx="4" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <polygon points="140,50 95,70 185,70" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="115" y1="80" x2="115" y2="105" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="140" y1="80" x2="140" y2="105" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="165" y1="80" x2="165" y2="105" stroke="#818cf8" stroke-width="1.5"/>
    <text x="140" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#818cf8">6,5-8,5%</text>
    <text x="140" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">THM (fix, 5-10 év)</text>
    <text x="140" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Min. 20% önerő</text>
    <text x="140" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Max 25 év futamidő</text>
    <text x="140" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Nincs gyerekvállalási feltétel</text>
  </g>

  <!-- Card 2: CSOK Plusz hitel -->
  <g transform="translate(460,100)">
    <rect x="0" y="0" width="280" height="300" rx="12" fill="#1e3a3a" stroke="#34d399" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#34d399">CSOK Plusz hitel</text>
    <!-- Star icon -->
    <polygon points="140,60 148,80 170,80 152,92 158,112 140,100 122,112 128,92 110,80 132,80" fill="#34d399" opacity="0.4"/>
    <text x="140" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#34d399">3-5%</text>
    <text x="140" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">THM (kedvezményes)</text>
    <text x="140" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">+ Támogatás: 10-15M Ft</text>
    <text x="140" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Gyerekvállaláshoz kötve</text>
    <text x="140" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6ee7b7">Legjobb kombináció</text>
  </g>

  <!-- Card 3: Babaváró -->
  <g transform="translate(820,100)">
    <rect x="0" y="0" width="280" height="300" rx="12" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
    <text x="140" y="40" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c084fc">Babaváró</text>
    <!-- Heart icon -->
    <path d="M140,75 C130,60 110,60 110,78 C110,95 140,110 140,110 C140,110 170,95 170,78 C170,60 150,60 140,75" fill="#a855f7" opacity="0.4"/>
    <text x="140" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#c084fc">0%</text>
    <text x="140" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">kamat (5 évig)</text>
    <text x="140" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Max 11M Ft</text>
    <text x="140" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Házassághoz kötve</text>
    <text x="140" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Gyerek után tőke elengedés</text>
  </g>

  <!-- Title -->
  <text x="600" y="470" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Lakáshitel összehasonlítás</text>
  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Kamatok, futamidők, bankajánlatok – 2026</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
