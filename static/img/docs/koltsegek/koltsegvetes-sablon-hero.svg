    <text x="10" y="19" font-family="sans-serif" font-size="12" fill="#fff">Szerkezet (alapozás+fal+tető) 42%</text>

    <rect x="0" y="38" width="520" height="28" rx="4" fill="#312e81" opacity="0.5"/>
    <rect x="0" y="38" width="156" height="28" rx="4" fill="#818cf8" opacity="0.8"/>
    <text x="10" y="57" font-family="sans-serif" font-size="12" fill="#fff">Gépészet 20%</text>

    <rect x="0" y="76" width="520" height="28" rx="4" fill="#312e81" opacity="0.5"/>
