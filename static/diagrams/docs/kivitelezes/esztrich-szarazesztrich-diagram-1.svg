<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">Esztrich vs szárazesztrich – rétegrend és száradás</text>

  <!-- LEFT beton -->
  <text x="225" y="70" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#e67e22">Nedves beton esztrich</text>
  <rect x="90" y="90" width="270" height="30" fill="#9aa0a3"/><text x="225" y="110" text-anchor="middle" font-size="11" fill="#1a1a2e">esztrich beton 60-70 mm</text>
  <rect x="90" y="120" width="270" height="40" fill="#f6d365" opacity="0.7"/><text x="225" y="144" text-anchor="middle" font-size="11" fill="#3a2a14">EPS lépésálló 15 cm</text>
  <rect x="90" y="160" width="270" height="14" fill="#34495e"/><text x="225" y="171" text-anchor="middle" font-size="10" fill="#fff">bitumenes vízszigetelés</text>
  <rect x="90" y="174" width="270" height="20" fill="#bbb"/><text x="225" y="188" text-anchor="middle" font-size="10" fill="#333">beton aljzat</text>

  <line x1="450" y1="60" x2="450" y2="340" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- RIGHT szaraz -->
  <text x="675" y="70" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#27ae60">Szárazesztrich (gipszlap)</text>
  <rect x="540" y="90" width="270" height="26" fill="#ecf0f1" stroke="#ccc"/><text x="675" y="108" text-anchor="middle" font-size="11" fill="#1a1a2e">2×12 mm gipszlap</text>
  <rect x="540" y="116" width="270" height="34" fill="#c9a86a"/><text x="675" y="138" text-anchor="middle" font-size="11" fill="#3a2a14">farost lépéshangszig. 60 mm</text>
  <rect x="540" y="150" width="270" height="24" fill="#8a6a3a"/><text x="675" y="166" text-anchor="middle" font-size="10" fill="#fff">hőszigetelt födémpanel</text>

  <!-- timeline comparison -->
  <text x="450" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Burkolhatóság – mikor rakhatod le a padlót?</text>
  <!-- axis -->
  <line x1="120" y1="300" x2="780" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="320" font-size="10" fill="#777">0 nap</text>
  <text x="300" y="320" font-size="10" fill="#777">2 hét</text>
  <text x="640" y="320" font-size="10" fill="#777">6 hét</text>
  <!-- szaraz bar -->
  <rect x="120" y="255" width="20" height="18" fill="#2ecc71"/>
  <text x="150" y="269" font-size="11" fill="#27ae60">Szárazesztrich: 24 órán belül bármilyen burkolat</text>
  <!-- beton csempe -->
  <rect x="120" y="278" width="190" height="14" fill="#e67e22" opacity="0.7"/>
  <text x="320" y="289" font-size="11" fill="#b9651b">Beton: csempe ~2 hét</text>
  <!-- beton parketta -->
  <rect x="120" y="295" width="0" height="0" fill="none"/>
  <text x="120" y="345" font-size="11" fill="#c0392b">Beton: parketta/laminált ~6 hét (+2 hét hűvös, párás időben)</text>

  <!-- note -->
  <rect x="90" y="370" width="720" height="80" rx="8" fill="#fdedec" stroke="#e74c3c"/>
  <text x="450" y="398" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c0392b">A nedves esztrich párájának el kell párolognia!</text>
  <text x="450" y="421" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#922b21">Ablakok min. 3 hétig bukóra nyitva. Lezárt ablak → repedés, penész, milliós kár.</text>
  <text x="450" y="440" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#922b21">Padlófűtéssel szárítani TILOS – a beton megrepedhet vagy szétrobbanhat.</text>

  <text x="880" y="488" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
