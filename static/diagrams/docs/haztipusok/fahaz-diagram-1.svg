<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <rect width="900" height="620" fill="#FAFBFC" rx="8"/>
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E293B">Faház típusok – melyik illik hozzád?</text>
  <!-- Start -->
  <rect x="300" y="55" width="300" height="40" rx="20" fill="#92400E"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Mit szeretnél a faháztól?</text>
  <!-- Branch lines -->
  <line x1="350" y1="95" x2="150" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="450" y1="95" x2="450" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <line x1="550" y1="95" x2="750" y2="140" stroke="#94A3B8" stroke-width="2"/>
  <!-- Labels -->
  <text x="240" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#92400E">Természetes érzet</text>
  <text x="450" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#16A34A">Modern + ökotudatos</text>
  <text x="660" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#3B82F6">Költséghatékony</text>
  <!-- Left: Natural feel -->
  <rect x="20" y="140" width="260" height="90" rx="8" fill="#FEF7ED" stroke="#92400E" stroke-width="1.5"/>
  <text x="150" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#78350F">Rönkház</text>
  <text x="150" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">450–750 ezer Ft/m²</text>
  <text x="150" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">Masszív rönkfalak, 20–30 cm</text>
  <text x="150" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B45309">⚠ Ülepedés 1–2 cm / első 2 év</text>
  <text x="150" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B45309">⚠ Kiegészítő szigetelés kell A+-hoz</text>
  <!-- Center: Modern + eco -->
  <rect x="320" y="140" width="260" height="90" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="450" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#15803D">CLT tömörfa</text>
  <text x="450" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">800k–1,2M Ft/m²</text>
  <text x="450" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">Gyárilag préselt rétegelt fa</text>
  <text x="450" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">✓ Nincs ülepedés, A+ könnyű</text>
  <text x="450" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">✓ 80–100+ év élettartam</text>
  <!-- Right: Cost-effective -->
  <rect x="620" y="140" width="260" height="90" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="750" y="162" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">Gerendaház / Fa váz</text>
  <text x="750" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">330–600 ezer Ft/m²</text>
  <text x="750" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1E3A8A">Vázszerkezet + kitöltés</text>
  <text x="750" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">✓ Leggyorsabb (3–5 hónap)</text>
  <text x="750" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3B82F6">✓ Rugalmas alaprajz</text>
  <!-- Second question -->
  <rect x="250" y="260" width="400" height="35" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="450" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">Karbantartásra készen állsz?</text>
  <line x1="350" y1="295" x2="200" y2="330" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="550" y1="295" x2="700" y2="330" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="265" y="315" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10B981">Igen, nem baj</text>
  <text x="635" y="315" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#EF4444">Minimálisat akarok</text>
  <!-- Left: maintenance OK -->
  <rect x="50" y="330" width="300" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="200" y="352" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#B45309">Rönkház vagy gerendaház</text>
  <text x="200" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">Lazúrozás 3–5 évente kötelező</text>
  <text x="200" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">Tömítés, favédelem 5–10 évente</text>
  <!-- Right: minimal maintenance -->
  <rect x="550" y="330" width="300" height="70" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="700" y="352" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669">CLT vagy fa vázszerkezet</text>
  <text x="700" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Burkolat védi a faszerkezetet</text>
  <text x="700" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065F46">Hasonló karbantartás mint téglaháznál</text>
  <!-- Bottom summary table -->
  <rect x="30" y="425" width="840" height="185" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="450" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">ÖSSZEHASONLÍTÁS – 100 m²-es faház típusok</text>
  <!-- Table header -->
  <text x="100" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748B">Szempont</text>
  <text x="280" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#92400E">Rönkház</text>
  <text x="450" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#B8733A">Gerendaház</text>
  <text x="620" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#16A34A">CLT</text>
  <text x="780" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#3B82F6">Fa vázszerk.</text>
  <line x1="50" y1="482" x2="850" y2="482" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Row 1 -->
  <text x="100" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Ár (Ft/m²)</text>
  <text x="280" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">450–750k</text>
  <text x="450" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B8733A">400–600k</text>
  <text x="620" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">800k–1,2M</text>
  <text x="780" y="500" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">330–550k</text>
  <!-- Row 2 -->
  <text x="100" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Építési idő</text>
  <text x="280" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400E">4–8 hónap</text>
  <text x="450" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B8733A">4–6 hónap</text>
  <text x="620" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16A34A">3–4 hónap</text>
  <text x="780" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">3–5 hónap</text>
  <!-- Row 3 -->
  <text x="100" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Karbantartás</text>
  <text x="280" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">Magas</text>
  <text x="450" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">Közepes</text>
  <text x="620" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Alacsony</text>
  <text x="780" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Alacsony</text>
  <!-- Row 4 -->
  <text x="100" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Energetika</text>
  <text x="280" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#DC2626">Pótl. kell A+-hoz</text>
  <text x="450" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F59E0B">Pótl. kell A+-hoz</text>
  <text x="620" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Könnyen A+</text>
  <text x="780" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Könnyen A+</text>
  <!-- Row 5 -->
  <text x="100" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">CO₂ tárolás</text>
  <text x="280" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">20–25 t</text>
  <text x="450" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">15–20 t</text>
  <text x="620" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">18–25 t</text>
  <text x="780" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">8–12 t</text>
  <!-- Row 6 -->
  <text x="100" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Hangulat</text>
  <text x="280" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">Alpesi, rusztikus</text>
  <text x="450" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B8733A">Tradicionális</text>
  <text x="620" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16A34A">Modern, letisztult</text>
  <text x="780" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3B82F6">Szabadon alakítható</text>
</svg>