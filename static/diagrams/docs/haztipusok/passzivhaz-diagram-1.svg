<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <rect width="900" height="550" fill="#FAFBFC" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E293B">Passzívház vs. nZEB vs. hagyományos – energiaigény összehasonlítás</text>
  <!-- Bar chart -->
  <!-- Labels -->
  <text x="150" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">Hagyományos</text>
  <text x="150" y="496" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">(régebbi)</text>
  <text x="350" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">Hagyományos</text>
  <text x="350" y="496" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">(2020 utáni)</text>
  <text x="550" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">nZEB (közel nulla)</text>
  <text x="550" y="496" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">2024 óta kötelező</text>
  <text x="750" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16A34A">PHI Passzívház</text>
  <!-- Baseline -->
  <line x1="60" y1="460" x2="850" y2="460" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Y axis labels -->
  <text x="50" y="464" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">0</text>
  <text x="50" y="380" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">50</text>
  <line x1="60" y1="376" x2="850" y2="376" stroke="#F1F5F9" stroke-width="1"/>
  <text x="50" y="296" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">100</text>
  <line x1="60" y1="292" x2="850" y2="292" stroke="#F1F5F9" stroke-width="1"/>
  <text x="50" y="212" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">150</text>
  <line x1="60" y1="208" x2="850" y2="208" stroke="#F1F5F9" stroke-width="1"/>
  <text x="50" y="128" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">200</text>
  <line x1="60" y1="124" x2="850" y2="124" stroke="#F1F5F9" stroke-width="1"/>
  <text x="50" y="70" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94A3B8">kWh/m²/év</text>
  <!-- Bar 1: Old traditional - 200-300 kWh -->
  <rect x="100" y="80" width="100" height="380" rx="4" fill="#EF4444" opacity="0.8"/>
  <text x="150" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#DC2626">200–300</text>
  <!-- Bar 2: New traditional - 100-140 kWh -->
  <rect x="300" y="224" width="100" height="236" rx="4" fill="#F59E0B" opacity="0.8"/>
  <text x="350" y="216" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">100–140</text>
  <!-- Bar 3: nZEB - 68-100 kWh -->
  <rect x="500" y="290" width="100" height="170" rx="4" fill="#3B82F6" opacity="0.8"/>
  <text x="550" y="282" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2563EB">68–100</text>
  <!-- Bar 4: Passive - 15 kWh (fűtés) + ~45 kWh (összes primer ~120) -->
  <rect x="700" y="432" width="100" height="28" rx="4" fill="#22C55E" opacity="0.9"/>
  <text x="750" y="424" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16A34A">15</text>
  <text x="750" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16A34A">(fűtési igény)</text>
  <!-- Savings annotation -->
  <rect x="580" y="60" width="280" height="45" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="720" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16A34A">80–90% megtakarítás</text>
  <text x="720" y="96" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">a régebbi épületekhez képest</text>
</svg>