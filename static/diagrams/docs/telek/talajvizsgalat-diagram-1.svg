<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#ffffff" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Talajtípusok és alapozási költségek</text>

  <!-- Table header -->
  <rect x="40" y="55" width="180" height="40" rx="6" fill="#f1f5f9"/>
  <text x="130" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Talajtípus</text>

  <rect x="225" y="55" width="140" height="40" rx="6" fill="#f1f5f9"/>
  <text x="295" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Teherbírás</text>

  <rect x="370" y="55" width="120" height="40" rx="6" fill="#f1f5f9"/>
  <text x="430" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Kockázat</text>

  <rect x="495" y="55" width="140" height="40" rx="6" fill="#f1f5f9"/>
  <text x="565" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Alap költség</text>

  <rect x="640" y="55" width="120" height="40" rx="6" fill="#f1f5f9"/>
  <text x="700" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Régió</text>

  <!-- Row 1: Kavics -->
  <rect x="40" y="100" width="720" height="48" rx="4" fill="#f0fdf4" opacity="0.5"/>
  <text x="130" y="129" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#166534">Kavics</text>
  <text x="295" y="129" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">300–600 kPa</text>
  <rect x="400" y="112" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="430" y="129" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534">Alacsony</text>
  <text x="565" y="129" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">1,2–2,0M Ft</text>
  <text x="700" y="129" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Folyóvölgyek</text>

  <!-- Row 2: Homok -->
  <rect x="40" y="152" width="720" height="48" rx="4" fill="#f0fdf4" opacity="0.3"/>
  <text x="130" y="181" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#166534">Homok</text>
  <text x="295" y="181" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">150–300 kPa</text>
  <rect x="400" y="164" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="430" y="181" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534">Alacsony</text>
  <text x="565" y="181" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">1,2–2,0M Ft</text>
  <text x="700" y="181" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Alföld</text>

  <!-- Row 3: Sziklás -->
  <rect x="40" y="204" width="720" height="48" rx="4" fill="#fefce8" opacity="0.4"/>
  <text x="130" y="233" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#854d0e">Sziklás/márga</text>
  <text x="295" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">500+ kPa</text>
  <rect x="395" y="216" width="70" height="24" rx="12" fill="#fef9c3"/>
  <text x="430" y="233" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#854d0e">Közepes</text>
  <text x="565" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">1,5–3,0M Ft</text>
  <text x="700" y="233" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Buda, hegyek</text>

  <!-- Row 4: Agyag -->
  <rect x="40" y="256" width="720" height="48" rx="4" fill="#fef2f2" opacity="0.4"/>
  <text x="130" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#991b1b">Agyag</text>
  <text x="295" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">80–200 kPa</text>
  <rect x="405" y="268" width="50" height="24" rx="12" fill="#fecaca"/>
  <text x="430" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Magas</text>
  <text x="565" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">2,0–3,5M Ft</text>
  <text x="700" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Dunántúl</text>

  <!-- Row 5: Feltöltés -->
  <rect x="40" y="308" width="720" height="48" rx="4" fill="#fef2f2" opacity="0.6"/>
  <text x="130" y="337" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#7f1d1d">Feltöltött</text>
  <text x="295" y="337" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">Kiszám.hatatlan</text>
  <rect x="392" y="320" width="76" height="24" rx="12" fill="#ef4444"/>
  <text x="430" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Nagyon magas</text>
  <text x="565" y="337" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#374151">3,5–8,0M Ft</text>
  <text x="700" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Vegyes</text>

  <!-- Legend -->
  <text x="40" y="385" font-family="sans-serif" font-size="12" fill="#94a3b8">Költségek 100 m² alapterületű családi ház alapozására vonatkoznak, 2026-os árakon</text>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">hazepitesikalauz.hu</text>
</svg>
