<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">Bejárati ajtó – hangszigetelés és biztonság</text>

  <!-- Rw bar chart -->
  <text x="230" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2980b9">Hangszigetelés (Rw dB)</text>
  <line x1="80" y1="240" x2="400" y2="240" stroke="#333" stroke-width="1.5"/>
  <!-- bars -->
  <rect x="110" y="180" width="50" height="60" fill="#95a5a6"/><text x="135" y="260" text-anchor="middle" font-size="11" fill="#555">alap</text><text x="135" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f8c8d">27-30</text>
  <rect x="200" y="130" width="50" height="110" fill="#3498db"/><text x="225" y="260" text-anchor="middle" font-size="11" fill="#555">kiemelt</text><text x="225" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">40</text>
  <rect x="290" y="100" width="50" height="140" fill="#27ae60"/><text x="315" y="260" text-anchor="middle" font-size="11" fill="#555">csúcs</text><text x="315" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">47</text>
  <text x="230" y="290" text-anchor="middle" font-size="11" fill="#777">+10 dB ≈ fele akkora érzékelt zaj</text>

  <line x1="450" y1="60" x2="450" y2="300" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- security elements -->
  <text x="675" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#c0392b">Biztonsági elemek</text>
  <g font-family="sans-serif" font-size="12" fill="#444">
    <circle cx="520" cy="105" r="6" fill="#e74c3c"/><text x="535" y="110">Megerősített acél / alu szerkezet</text>
    <circle cx="520" cy="140" r="6" fill="#e74c3c"/><text x="535" y="145">Többpontos zár (nem csak a kilincsnél)</text>
    <circle cx="520" cy="175" r="6" fill="#e74c3c"/><text x="535" y="180">Erős / rejtett pánt</text>
    <circle cx="520" cy="210" r="6" fill="#e74c3c"/><text x="535" y="215">Szakszerű tokrögzítés a falba</text>
    <circle cx="520" cy="245" r="6" fill="#2ecc71"/><text x="535" y="250">Opció: ujjlenyomat, kód, okosotthon</text>
  </g>

  <!-- acel vs alu -->
  <rect x="60" y="320" width="380" height="90" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="250" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Acél vs alumínium szerkezet</text>
  <text x="250" y="368" text-anchor="middle" font-size="11" fill="#555">Acél: robusztus, jó ár-érték</text>
  <text x="250" y="386" text-anchor="middle" font-size="11" fill="#555">Alu: könnyű, korrózióálló, modern</text>
  <text x="250" y="404" text-anchor="middle" font-size="11" fill="#777">Mindkettő teljesíti a szabványt – esztétika és ár dönt</text>

  <rect x="460" y="320" width="380" height="90" rx="8" fill="#eafaf1" stroke="#27ae60"/>
  <text x="650" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5b36">A bejárati ajtón ne spórolj!</text>
  <text x="650" y="368" text-anchor="middle" font-size="11" fill="#555">Biztonság + hangszigetelés + a homlokzat arca.</text>
  <text x="650" y="386" text-anchor="middle" font-size="11" fill="#555">Évtizedekre szóló, értéktartó befektetés –</text>
  <text x="650" y="404" text-anchor="middle" font-size="11" fill="#555">inkább a beltéri ajtókon spórolj.</text>

  <text x="450" y="450" text-anchor="middle" font-size="12" fill="#777">A védelem rendszer: szerkezet + zár + pánt + beépítés együtt.</text>
  <text x="880" y="470" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
