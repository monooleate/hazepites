<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Villanyszerelés költségbontás – 100 m² családi ház, 2026</text>
  <!-- Stacked horizontal bar chart -->
  <g transform="translate(30, 60)">
    <!-- Alap csomag -->
    <text x="0" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Alap csomag</text>
    <rect x="200" y="15" width="200" height="28" rx="4" fill="#6366f1"/>
    <text x="300" y="34" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Durva szerelés 800e</text>
    <rect x="400" y="15" width="120" height="28" rx="4" fill="#818cf8"/>
    <text x="460" y="34" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">Finom 500e</text>
    <rect x="520" y="15" width="70" height="28" rx="4" fill="#a5b4fc"/>
    <text x="555" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#312e81">Elosztó</text>
    <rect x="590" y="15" width="80" height="28" rx="4" fill="#c7d2fe"/>
    <text x="630" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#312e81">Csatl. 350e</text>
    <text x="690" y="34" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">= 1,8-2,5M</text>

    <!-- Közepes csomag -->
    <text x="0" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Közepes</text>
    <rect x="200" y="65" width="200" height="28" rx="4" fill="#6366f1"/>
    <rect x="400" y="65" width="120" height="28" rx="4" fill="#818cf8"/>
    <rect x="520" y="65" width="70" height="28" rx="4" fill="#a5b4fc"/>
    <rect x="590" y="65" width="80" height="28" rx="4" fill="#c7d2fe"/>
    <rect x="670" y="65" width="60" height="28" rx="4" fill="#f59e0b"/>
    <text x="700" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">Napelem</text>
    <rect x="730" y="65" width="40" height="28" rx="4" fill="#fbbf24"/>
    <text x="750" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#422006">LED</text>
    <text x="790" y="84" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">= 2,5-3,5M</text>

    <!-- Prémium csomag -->
    <text x="0" y="130" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Prémium</text>
    <rect x="200" y="115" width="200" height="28" rx="4" fill="#6366f1"/>
    <rect x="400" y="115" width="120" height="28" rx="4" fill="#818cf8"/>
    <rect x="520" y="115" width="70" height="28" rx="4" fill="#a5b4fc"/>
    <rect x="590" y="115" width="80" height="28" rx="4" fill="#c7d2fe"/>
    <rect x="670" y="115" width="60" height="28" rx="4" fill="#f59e0b"/>
    <rect x="730" y="115" width="40" height="28" rx="4" fill="#fbbf24"/>
    <rect x="770" y="115" width="50" height="28" rx="4" fill="#22c55e"/>
    <text x="795" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">Okos</text>
    <text x="840" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e293b">= 3,5-5,0M</text>
  </g>
  <!-- Konnektor cost comparison -->
  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="840" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="20" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#991b1b">⚠ Utólagos konnektor beépítés kész falba</text>
    <text x="20" y="45" font-family="sans-serif" font-size="13" fill="#dc2626">Falvésés + kábelhúzás + vakolás + festés = 50-80 ezer Ft / darab</text>
  </g>
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="840" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534">✓ Konnektor beépítés építkezés közben</text>
    <text x="20" y="45" font-family="sans-serif" font-size="13" fill="#16a34a">Kötődoboz + kábel + beépítés = 3-5 ezer Ft / darab (10-25x olcsóbb!)</text>
  </g>
</svg>
