<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">A négy glettelési minőség – mit, hova, milyen fényben</text>

  <!-- table-like rows -->
  <!-- headers -->
  <text x="60" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#777">Szint</text>
  <text x="170" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#777">Felület</text>
  <text x="430" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#777">Mire jó</text>
  <text x="700" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#777">Surlófény</text>
  <line x1="50" y1="90" x2="850" y2="90" stroke="#ddd"/>

  <!-- Q1 -->
  <text x="60" y="128" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e74c3c">Q1</text>
  <path d="M 160 130 Q 185 115 210 128 Q 235 141 260 122 Q 285 108 310 130" stroke="#e74c3c" stroke-width="2.5" fill="none"/>
  <text x="430" y="126" font-family="sans-serif" font-size="12" fill="#333">csempe / burkolat alá</text>
  <text x="700" y="126" font-family="sans-serif" font-size="12" fill="#999">nem számít</text>
  <line x1="50" y1="148" x2="850" y2="148" stroke="#f0f0f0"/>

  <!-- Q2 -->
  <text x="60" y="186" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e67e22">Q2</text>
  <path d="M 160 188 Q 195 178 230 186 Q 265 194 300 182 Q 305 180 310 184" stroke="#e67e22" stroke-width="2.5" fill="none"/>
  <text x="430" y="184" font-family="sans-serif" font-size="12" fill="#333">normál festés, tapéta</text>
  <text x="700" y="184" font-family="sans-serif" font-size="12" fill="#e67e22">enyhe hullám látszhat</text>
  <line x1="50" y1="206" x2="850" y2="206" stroke="#f0f0f0"/>

  <!-- Q3 -->
  <text x="60" y="244" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3498db">Q3</text>
  <path d="M 160 246 Q 210 242 260 245 Q 290 247 310 244" stroke="#3498db" stroke-width="2.5" fill="none"/>
  <text x="430" y="242" font-family="sans-serif" font-size="12" fill="#333">strukturálatlan festék, nagy ablak</text>
  <text x="700" y="242" font-family="sans-serif" font-size="12" fill="#2980b9">max 0,5 mm</text>
  <line x1="50" y1="264" x2="850" y2="264" stroke="#f0f0f0"/>

  <!-- Q4 -->
  <text x="60" y="302" font-family="sans-serif" font-size="20" font-weight="bold" fill="#27ae60">Q4</text>
  <line x1="160" y1="300" x2="310" y2="300" stroke="#27ae60" stroke-width="2.5"/>
  <text x="430" y="298" font-family="sans-serif" font-size="12" fill="#333">magasfényű festék, design fal</text>
  <text x="700" y="298" font-family="sans-serif" font-size="12" fill="#27ae60">max 0,2-0,3 mm</text>
  <line x1="50" y1="320" x2="850" y2="320" stroke="#ddd"/>

  <!-- recommendation box -->
  <rect x="60" y="345" width="780" height="70" rx="8" fill="#eafaf1" stroke="#27ae60"/>
  <text x="450" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a5b36">Bevált stratégia: Q3 az egész lakótérben + Q4 csak a surlófénynek kitett, hangsúlyos falakon.</text>
  <text x="450" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Az egész házat Q4-ben gletteltetni felesleges – ahol nincs surlófény, ott nem látszik a különbség.</text>

  <!-- warning -->
  <rect x="60" y="430" width="780" height="55" rx="8" fill="#fdedec" stroke="#e74c3c"/>
  <text x="450" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">A repedés gyakran nem a glettelés, hanem a száradás hibája.</text>
  <text x="450" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#922b21">Festés előtt műszeres páramérés kötelező – nedves falra glettelni/festeni tilos.</text>

  <text x="880" y="505" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
