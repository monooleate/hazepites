<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="ge" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#ge)" opacity="0.3"/>

  <!-- LEFT: nedves beton -->
  <rect x="110" y="200" width="430" height="250" rx="10" fill="#2a2a4e" stroke="#e67e22" stroke-width="2"/>
  <text x="325" y="240" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#e67e22">Nedves beton esztrich</text>
  <!-- layers -->
  <rect x="150" y="270" width="350" height="30" fill="#9aa0a3"/><text x="325" y="291" text-anchor="middle" font-size="13" fill="#1a1a2e">60-70 mm esztrich beton</text>
  <rect x="150" y="300" width="350" height="38" fill="#f1c40f" opacity="0.5"/><text x="325" y="324" text-anchor="middle" font-size="13" fill="#3a2a14">15 cm EPS hoszigeteles</text>
  <rect x="150" y="338" width="350" height="14" fill="#34495e"/><text x="325" y="349" text-anchor="middle" font-size="11" fill="#ccc">bitumenes vizszigeteles</text>
  <text x="325" y="390" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#e74c3c" font-weight="bold">parketta: ~6 het szaradas</text>
  <text x="325" y="418" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">masszív, olcsóbb, sok beépített víz</text>

  <!-- RIGHT: szarazesztrich -->
  <rect x="660" y="200" width="430" height="250" rx="10" fill="#2a2a4e" stroke="#2ecc71" stroke-width="2"/>
  <text x="875" y="240" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2ecc71">Szarazesztrich (gipszlap)</text>
  <rect x="700" y="275" width="350" height="26" fill="#ecf0f1"/><text x="875" y="293" text-anchor="middle" font-size="13" fill="#1a1a2e">2x12 mm gipszlap</text>
  <rect x="700" y="301" width="350" height="34" fill="#c9a86a"/><text x="875" y="323" text-anchor="middle" font-size="13" fill="#3a2a14">60 mm farost lépéshangszig.</text>
  <rect x="700" y="335" width="350" height="14" fill="#8a6a3a"/><text x="875" y="346" text-anchor="middle" font-size="11" fill="#fff">gyárilag hőszigetelt födémpanel</text>
  <text x="875" y="390" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#27ae60" font-weight="bold">burkolható 24 órán belül</text>
  <text x="875" y="418" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">gyors, könnyű, vízmentes</text>

  <rect x="320" y="490" width="560" height="50" rx="8" fill="#2a2a4e" stroke="#e74c3c" stroke-width="1"/>
  <text x="600" y="521" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#e74c3c">A nedves esztrich párája lezárt ablaknál: repedés, penész, milliós kár</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="white">Esztrich vs szárazesztrich</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Nedves vagy száraz padlóaljzat?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">a padló rejtett rétege – eldönti, mikor költözhetsz be</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
