<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#14202b"/>
  <defs><pattern id="gny" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2f3a" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gny)" opacity="0.4"/>

  <!-- LEFT: műanyag ablak -->
  <rect x="160" y="200" width="200" height="250" rx="6" fill="#1e2f3a" stroke="#ecf0f1" stroke-width="6"/>
  <rect x="185" y="225" width="150" height="200" rx="3" fill="#5dade2" opacity="0.18"/>
  <line x1="260" y1="225" x2="260" y2="425" stroke="#ecf0f1" stroke-width="3"/>
  <text x="260" y="485" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#ecf0f1" font-weight="bold">Műanyag (82 mm)</text>
  <text x="260" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9fc0b0">legjobb ár-érték</text>

  <!-- RIGHT: fa-alu ablak -->
  <rect x="840" y="200" width="200" height="250" rx="6" fill="#1e2f3a" stroke="#b5895a" stroke-width="6"/>
  <rect x="865" y="225" width="150" height="200" rx="3" fill="#5dade2" opacity="0.18"/>
  <line x1="940" y1="225" x2="940" y2="425" stroke="#b5895a" stroke-width="3"/>
  <text x="940" y="485" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#b5895a" font-weight="bold">Fa-alu (100 mm)</text>
  <text x="940" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9fc0b0">prémium, természetes</text>

  <!-- middle stats -->
  <rect x="430" y="210" width="340" height="70" rx="10" fill="#1e2f3a" stroke="#2ecc71" stroke-width="2"/>
  <text x="600" y="243" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2ecc71">Uw ~0,8 W/m²K</text>
  <text x="600" y="267" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">3 rétegű argon + melegperem</text>

  <rect x="430" y="300" width="340" height="60" rx="8" fill="#1e2f3a" stroke="#f39c12" stroke-width="1"/>
  <text x="600" y="326" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12" font-weight="bold">Erkélyajtó-sorolás</text>
  <text x="600" y="347" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">akár -50% a tolóajtóhoz képest</text>

  <rect x="430" y="380" width="340" height="60" rx="8" fill="#1e2f3a" stroke="#3498db" stroke-width="1"/>
  <text x="600" y="406" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#5dade2" font-weight="bold">A beépítés a kulcs</text>
  <text x="600" y="427" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">duzzadó szalag, RAL irányelv</text>

  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Nyílászáró-összehasonlítás</text>
  <text x="600" y="110" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#9fc0b0">Műanyag vs fa-alu ablak</text>
  <text x="600" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#5a7a6a">hőszigetelésben hasonló – az ár és az esztétika dönt</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#3a5a4a">hazepitesikalauz.hu</text>
</svg>
