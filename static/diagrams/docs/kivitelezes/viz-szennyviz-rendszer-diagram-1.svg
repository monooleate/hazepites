<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">A ház víz- és szennyvízrendszere</text>

  <!-- LEFT: viz osztó-gyűjtő -->
  <text x="225" y="72" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2980b9">Vízvezeték – osztó-gyűjtős</text>
  <rect x="120" y="100" width="40" height="90" rx="5" fill="#3498db" opacity="0.3" stroke="#3498db"/>
  <text x="140" y="205" text-anchor="middle" font-size="10" fill="#2980b9">osztó</text>
  <g stroke="#3498db" stroke-width="2.5" fill="none">
    <path d="M 160 115 C 230 110, 280 130, 350 130"/>
    <path d="M 160 145 C 250 145, 300 160, 360 160"/>
    <path d="M 160 175 C 230 180, 290 200, 350 200"/>
  </g>
  <g fill="#3498db"><circle cx="352" cy="130" r="7"/><circle cx="362" cy="160" r="7"/><circle cx="352" cy="200" r="7"/></g>
  <text x="250" y="245" text-anchor="middle" font-size="11" fill="#2980b9">egy folytonos cső / vízvevő</text>
  <text x="250" y="263" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">nincs kötés a padlóban</text>

  <line x1="450" y1="80" x2="450" y2="290" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- RIGHT: szennyviz méretek -->
  <text x="675" y="72" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#e67e22">Szennyvíz – csőméret + lejtés</text>
  <g>
    <circle cx="530" cy="120" r="20" fill="#e67e22" opacity="0.3" stroke="#e67e22"/><text x="565" y="125" font-size="12" fill="#333">WC – 110 mm</text>
    <circle cx="535" cy="170" r="13" fill="#f39c12" opacity="0.3" stroke="#f39c12"/><text x="565" y="174" font-size="12" fill="#333">mosdó/zuhany/mosogató – 50 mm</text>
    <circle cx="538" cy="215" r="9" fill="#9b59b6" opacity="0.3" stroke="#9b59b6"/><text x="565" y="219" font-size="12" fill="#333">klíma/fan-coil kondenzvíz – 32 mm</text>
  </g>
  <text x="675" y="263" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">90° könyök helyett lágy ívek!</text>

  <!-- alapozás szerint -->
  <rect x="60" y="305" width="380" height="100" rx="8" fill="#f4f9fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="250" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Beton alapozás</text>
  <text x="250" y="352" text-anchor="middle" font-size="11" fill="#555">110-es KGPVC a szerelőbeton alatt</text>
  <text x="250" y="370" text-anchor="middle" font-size="11" fill="#555">köpenycső a betonáttörésnél</text>
  <text x="250" y="388" text-anchor="middle" font-size="11" fill="#555">vezeték a padló hőszigetelésében</text>

  <rect x="460" y="305" width="380" height="100" rx="8" fill="#f3fbf6" stroke="#27ae60" stroke-width="1.5"/>
  <text x="650" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5b36">Födémpanel (favázas)</text>
  <text x="650" y="352" text-anchor="middle" font-size="11" fill="#555">110-es csövek a panelben</text>
  <text x="650" y="370" text-anchor="middle" font-size="11" fill="#555">50-esek a szigetelési rétegben</text>
  <text x="650" y="388" text-anchor="middle" font-size="11" fill="#555">3 m-nél távolabbi lefolyó az alsó födémben</text>

  <rect x="60" y="420" width="780" height="45" rx="8" fill="#eafaf1" stroke="#27ae60"/>
  <text x="450" y="447" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5b36">Nyomáspróba (víz) + víztartási próba (szennyvíz) eltakarás előtt – mindig jegyzőkönyvvel!</text>

  <text x="880" y="490" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
