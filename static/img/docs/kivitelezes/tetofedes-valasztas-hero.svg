  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f39c12">A kulcs a alatetheazat – nyari hovedelem + vizzaras</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Tetofedes valasztas 2026</text>
