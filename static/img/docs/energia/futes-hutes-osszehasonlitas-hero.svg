<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gh" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gh)" opacity="0.3"/>

  <!-- 4 system cards -->
  <rect x="90" y="200" width="250" height="320" rx="10" fill="#2a2a4e" stroke="#e74c3c" stroke-width="2"/>
  <text x="215" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e74c3c">Split</text>
  <text x="215" y="266" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ccc">hoszivattyu</text>
  <!-- wall unit -->
  <rect x="140" y="290" width="150" height="35" rx="6" fill="#34495e"/>
  <path d="M 150 340 Q 215 360 280 340" stroke="#e74c3c" stroke-width="2" fill="none"/>
  <text x="215" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">fut + hut</text>
  <text x="215" y="445" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">paratlanit</text>
  <text x="215" y="470" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5dade2">nagyon gyors</text>

  <rect x="350" y="200" width="250" height="320" rx="10" fill="#2a2a4e" stroke="#f39c12" stroke-width="2"/>
  <text x="475" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f39c12">Padlofutes</text>
  <rect x="380" y="350" width="190" height="14" rx="3" fill="#f39c12" opacity="0.5"/>
  <g stroke="#f39c12" stroke-width="2"><line x1="400" y1="350" x2="400" y2="320"/><line x1="440" y1="350" x2="440" y2="320"/><line x1="480" y1="350" x2="480" y2="320"/><line x1="520" y1="350" x2="520" y2="320"/></g>
  <text x="475" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">csucs komfort</text>
  <text x="475" y="445" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e74c3c">nyaron nem hut</text>
  <text x="475" y="470" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">lassu, rejtett</text>

  <rect x="610" y="200" width="250" height="320" rx="10" fill="#2a2a4e" stroke="#9b59b6" stroke-width="2"/>
  <text x="735" y="240" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#bb8fce">Mennyezeti</text>
  <rect x="640" y="300" width="190" height="14" rx="3" fill="#9b59b6" opacity="0.5"/>
  <text x="735" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">lathatatlan</text>
  <text x="735" y="445" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e74c3c">kondenzacio veszely</text>
  <text x="735" y="470" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e74c3c">nincs paraszab.</text>

  <rect x="870" y="200" width="250" height="320" rx="10" fill="#2a2a4e" stroke="#3498db" stroke-width="2"/>
  <text x="995" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5dade2">Fan coil</text>
  <rect x="930" y="290" width="130" height="40" rx="6" fill="#34495e"/>
  <circle cx="995" cy="310" r="12" fill="none" stroke="#5dade2" stroke-width="2"/>
  <text x="995" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2ecc71">fut + hut</text>
  <text x="995" y="445" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5dade2">gyors</text>
  <text x="995" y="470" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e74c3c">ventilatorzaj</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Futes-hutes osszehasonlitas 2026</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Padlofutes, split, fan coil vagy mennyezeti?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">nincs egyetlen legjobb – paritas a kulcs</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
