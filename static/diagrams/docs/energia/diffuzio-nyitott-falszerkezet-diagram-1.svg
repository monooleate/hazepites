<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#16242b">Az sd-érték lépcső – belül magas, kifelé csökkenő páraellenállás</text>
  <text x="450" y="60" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#777">A pára mindig könnyebb utat talál kifelé, mint befelé – ezért nem reked meg</text>

  <!-- BELSO / KULSO labels -->
  <text x="70" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2980b9">BELSŐ (lakótér)</text>
  <text x="830" y="110" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="bold" fill="#27ae60">KÜLSŐ (homlokzat)</text>

  <!-- Descending sd staircase bars -->
  <!-- each layer: x, width, sd bar height -->
  <!-- Valyogvakolat -->
  <rect x="70" y="200" width="100" height="190" fill="#cdb48a" opacity="0.5"/>
  <rect x="95" y="290" width="50" height="100" fill="#2980b9"/>
  <text x="120" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">vályog-</text>
  <text x="120" y="423" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">vakolat</text>
  <text x="120" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2980b9" font-weight="bold">~0,1</text>

  <!-- Gipszkarton + install -->
  <rect x="170" y="200" width="90" height="190" fill="#c9a86a" opacity="0.5"/>
  <rect x="190" y="300" width="50" height="90" fill="#2e86c1"/>
  <text x="215" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">install +</text>
  <text x="215" y="423" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">gipszkarton</text>
  <text x="215" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2980b9" font-weight="bold">~0,5</text>

  <!-- OSB parafekezo (highest sd) -->
  <rect x="260" y="200" width="80" height="190" fill="#8a6a3a" opacity="0.6"/>
  <rect x="278" y="230" width="44" height="160" fill="#1a5276"/>
  <text x="300" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">OSB</text>
  <text x="300" y="423" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">párafékező</text>
  <text x="300" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a5276" font-weight="bold">3,6 m</text>
  <text x="300" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a5276">legmagasabb sd</text>

  <!-- Befujt farost -->
  <rect x="340" y="200" width="220" height="190" fill="#d6bd7e" opacity="0.6"/>
  <rect x="420" y="340" width="60" height="50" fill="#5dade2"/>
  <text x="450" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">befújt farost 240 mm</text>
  <text x="450" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2980b9" font-weight="bold">~0,16</text>

  <!-- Kulso farost tabla -->
  <rect x="560" y="200" width="90" height="190" fill="#b5895a" opacity="0.6"/>
  <rect x="582" y="350" width="46" height="40" fill="#48c9b0"/>
  <text x="605" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">külső farost</text>
  <text x="605" y="345" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16a085" font-weight="bold">~0,1</text>

  <!-- Meszvakolat -->
  <rect x="650" y="200" width="100" height="190" fill="#e8e0cf"/>
  <rect x="675" y="355" width="50" height="35" fill="#2ecc71"/>
  <text x="700" y="410" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">mészvakolat</text>
  <text x="700" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#27ae60" font-weight="bold">~0,05</text>

  <!-- vapor flow arrow -->
  <line x1="80" y1="150" x2="740" y2="150" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="7,4"/>
  <polygon points="745,150 733,144 733,156" fill="#e67e22"/>
  <text x="410" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e67e22" font-weight="bold">pára áramlása →</text>

  <text x="450" y="460" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">A kék oszlopok az sd-értéket (páraellenállást) mutatják. Az OSB a párafékező csúcs, utána kifelé minden réteg nyitottabb.</text>
  <text x="450" y="482" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">A teljes fal sd-értéke ~5,8 m – légtömör, de kondenzációmentes, 595 g/m²/év száradási tartalékkal.</text>
  <text x="880" y="508" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
