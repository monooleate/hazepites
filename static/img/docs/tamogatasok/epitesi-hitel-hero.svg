<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b" rx="0"/>
  <!-- Background pattern -->
  <g opacity="0.06">
    <rect x="50" y="50" width="100" height="100" fill="#818cf8" rx="8"/>
    <rect x="200" y="50" width="100" height="100" fill="#818cf8" rx="8"/>
    <rect x="1050" y="480" width="100" height="100" fill="#818cf8" rx="8"/>
    <rect x="900" y="480" width="100" height="100" fill="#818cf8" rx="8"/>
  </g>
  <!-- Bank building icon -->
  <g transform="translate(520, 100)">
    <!-- Roof/pediment -->
    <polygon points="80,0 0,50 160,50" fill="none" stroke="#818cf8" stroke-width="3"/>
    <!-- Columns -->
    <rect x="15" y="55" width="16" height="80" fill="none" stroke="#818cf8" stroke-width="2" rx="2"/>
    <rect x="52" y="55" width="16" height="80" fill="none" stroke="#818cf8" stroke-width="2" rx="2"/>
    <rect x="92" y="55" width="16" height="80" fill="none" stroke="#818cf8" stroke-width="2" rx="2"/>
    <rect x="129" y="55" width="16" height="80" fill="none" stroke="#818cf8" stroke-width="2" rx="2"/>
    <!-- Base -->
    <rect x="0" y="135" width="160" height="12" fill="#818cf8" rx="2"/>
    <!-- Steps -->
    <rect x="-10" y="150" width="180" height="8" fill="#818cf8" opacity="0.5" rx="2"/>
  </g>
  <!-- Money/percentage icons -->
  <g transform="translate(180, 180)">
    <circle cx="50" cy="50" r="45" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <text x="50" y="58" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#34d399">3%</text>
    <text x="50" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6ee7b7">Otthon Start</text>
  </g>
  <g transform="translate(920, 180)">
    <circle cx="50" cy="50" r="45" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="50" y="58" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#f59e0b">7%</text>
    <text x="50" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fbbf24">Piaci kamat</text>
  </g>
  <!-- Arrow flow: milestones -->
  <g transform="translate(150, 370)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#312e81"/>
    <text x="70" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd">Alapozás</text>
    <line x1="145" y1="25" x2="175" y2="25" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="180" y="0" width="140" height="50" rx="8" fill="#312e81"/>
    <text x="250" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd">Szerkezetkész</text>
    <line x1="325" y1="25" x2="355" y2="25" stroke="#818cf8" stroke-width="2"/>
    <rect x="360" y="0" width="140" height="50" rx="8" fill="#312e81"/>
    <text x="430" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd">Tető + ablak</text>
    <line x1="505" y1="25" x2="535" y2="25" stroke="#818cf8" stroke-width="2"/>
    <rect x="540" y="0" width="140" height="50" rx="8" fill="#312e81"/>
    <text x="610" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c4b5fd">Belső munkák</text>
    <line x1="685" y1="25" x2="715" y2="25" stroke="#818cf8" stroke-width="2"/>
    <rect x="720" y="0" width="160" height="50" rx="8" fill="#312e81" stroke="#34d399" stroke-width="1.5"/>
    <text x="800" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#34d399">Kulcsrakész ✓</text>
  </g>
  <text x="600" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Ütemezett folyósítás: a bank lépésenként ad pénzt</text>
  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Építési hitel 2026</text>
  <text x="600" y="560" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Kamatok, feltételek és a bankok trükkjei</text>
  <!-- Brand -->
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
