<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">Négy rendszer – négy erősség és gyengeség</text>
  <text x="450" y="60" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#777">A pontok minél teljesebbek, annál erősebb az adott szempontban</text>

  <!-- column headers -->
  <text x="300" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">Split</text>
  <text x="450" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f39c12">Padlófűtés</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Mennyezeti</text>
  <text x="750" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#3498db">Fan coil</text>

  <!-- rows: label + 4 ratings (filled circles 0-3) -->
  <!-- Reakcioido -->
  <text x="30" y="145" font-family="sans-serif" font-size="13" fill="#333">Reakcióidő</text>
  <g><circle cx="300" cy="140" r="9" fill="#2ecc71"/><circle cx="450" cy="140" r="9" fill="#e74c3c"/><circle cx="600" cy="140" r="9" fill="#f39c12"/><circle cx="750" cy="140" r="9" fill="#2ecc71"/></g>

  <!-- Hutes -->
  <text x="30" y="185" font-family="sans-serif" font-size="13" fill="#333">Hűtés képesség</text>
  <g><circle cx="300" cy="180" r="9" fill="#2ecc71"/><circle cx="450" cy="180" r="9" fill="#e74c3c"/><circle cx="600" cy="180" r="9" fill="#f39c12"/><circle cx="750" cy="180" r="9" fill="#2ecc71"/></g>

  <!-- Teli komfort -->
  <text x="30" y="225" font-family="sans-serif" font-size="13" fill="#333">Téli komfort</text>
  <g><circle cx="300" cy="220" r="9" fill="#f39c12"/><circle cx="450" cy="220" r="9" fill="#2ecc71"/><circle cx="600" cy="220" r="9" fill="#2ecc71"/><circle cx="750" cy="220" r="9" fill="#f39c12"/></g>

  <!-- Paraszabalyozas -->
  <text x="30" y="265" font-family="sans-serif" font-size="13" fill="#333">Páraszabályozás</text>
  <g><circle cx="300" cy="260" r="9" fill="#2ecc71"/><circle cx="450" cy="260" r="9" fill="#e74c3c"/><circle cx="600" cy="260" r="9" fill="#e74c3c"/><circle cx="750" cy="260" r="9" fill="#f39c12"/></g>

  <!-- Rejtettseg -->
  <text x="30" y="305" font-family="sans-serif" font-size="13" fill="#333">Rejtettség (esztétika)</text>
  <g><circle cx="300" cy="300" r="9" fill="#f39c12"/><circle cx="450" cy="300" r="9" fill="#2ecc71"/><circle cx="600" cy="300" r="9" fill="#2ecc71"/><circle cx="750" cy="300" r="9" fill="#e74c3c"/></g>

  <!-- Csendesseg -->
  <text x="30" y="345" font-family="sans-serif" font-size="13" fill="#333">Csendesség</text>
  <g><circle cx="300" cy="340" r="9" fill="#f39c12"/><circle cx="450" cy="340" r="9" fill="#2ecc71"/><circle cx="600" cy="340" r="9" fill="#2ecc71"/><circle cx="750" cy="340" r="9" fill="#e74c3c"/></g>

  <!-- Alacsony karbantartas -->
  <text x="30" y="385" font-family="sans-serif" font-size="13" fill="#333">Alacsony karbantartás</text>
  <g><circle cx="300" cy="380" r="9" fill="#f39c12"/><circle cx="450" cy="380" r="9" fill="#2ecc71"/><circle cx="600" cy="380" r="9" fill="#2ecc71"/><circle cx="750" cy="380" r="9" fill="#f39c12"/></g>

  <!-- legend -->
  <circle cx="250" cy="440" r="8" fill="#2ecc71"/><text x="265" y="445" font-family="sans-serif" font-size="12" fill="#555">erős</text>
  <circle cx="370" cy="440" r="8" fill="#f39c12"/><text x="385" y="445" font-family="sans-serif" font-size="12" fill="#555">közepes</text>
  <circle cx="500" cy="440" r="8" fill="#e74c3c"/><text x="515" y="445" font-family="sans-serif" font-size="12" fill="#555">gyenge</text>

  <text x="450" y="485" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">A legkiegyensúlyozottabb gyakran a párosítás: padlófűtés (tél) + split/fan coil (nyár).</text>
  <text x="880" y="510" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
