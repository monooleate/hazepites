<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <rect width="900" height="350" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Közmű csatlakozás – költség összesítés (családi ház, 2026)</text>
  <rect x="30" y="55" width="840" height="35" rx="6" fill="#312e81"/>
  <text x="130" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Közmű</text>
  <text x="310" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Szolgáltatói díj</text>
  <text x="490" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Földmunka + terv</text>
  <text x="660" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Összesen</text>
  <text x="810" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Átfutás</text>
  <!-- Rows -->
  <rect x="30" y="95" width="840" height="40" fill="#eff6ff"/>
  <text x="130" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#1e40af">💧 Víz</text>
  <text x="310" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16a34a">0 Ft (32mm-ig)</text>
  <text x="490" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">230-480e Ft</text>
  <text x="660" y="120" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">230-480e Ft</text>
  <text x="810" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">2-6 hét</text>

  <rect x="30" y="140" width="840" height="40" fill="#f5f3ff"/>
  <text x="130" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#6d28d9">🔧 Csatorna</text>
  <text x="310" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16a34a">0 Ft (160mm-ig)</text>
  <text x="490" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">170-440e Ft</text>
  <text x="660" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">170-440e Ft</text>
  <text x="810" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">2-4 hét</text>

  <rect x="30" y="185" width="840" height="40" fill="#fffbeb"/>
  <text x="130" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#92400e">⚡ Áram</text>
  <text x="310" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16a34a">0 Ft (3x32A-ig)</text>
  <text x="490" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">200-550e Ft</text>
  <text x="660" y="210" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">200-550e Ft</text>
  <text x="810" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">3-8 hét</text>

  <rect x="30" y="230" width="840" height="40" fill="#fef2f2"/>
  <text x="130" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#991b1b">🔥 Gáz</text>
  <text x="310" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#dc2626">120-170e Ft</text>
  <text x="490" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e293b">180-350e Ft</text>
  <text x="660" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">300-520e Ft</text>
  <text x="810" y="255" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">4-8 hét</text>

  <!-- Totals -->
  <rect x="30" y="280" width="840" height="30" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="130" y="300" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">Gáz nélkül</text>
  <text x="660" y="300" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#166534">600e – 1,5M Ft</text>

  <rect x="30" y="315" width="840" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="130" y="335" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Gázzal</text>
  <text x="660" y="335" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#991b1b">900e – 2M Ft</text>
</svg>
