<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">Tetőfedés rétegrend – cserép vs fémlemez</text>

  <!-- LEFT: betoncserep -->
  <text x="225" y="75" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#c0392b">Betoncserép</text>
  <g>
    <rect x="100" y="100" width="250" height="26" fill="#c0392b"/><text x="360" y="118" font-family="sans-serif" font-size="11" fill="#666">cserép</text>
    <rect x="100" y="126" width="250" height="16" fill="#b5895a"/><text x="360" y="138" font-family="sans-serif" font-size="11" fill="#666">tetőléc</text>
    <rect x="100" y="142" width="250" height="14" fill="#8a6a3a"/><text x="360" y="153" font-family="sans-serif" font-size="11" fill="#666">ellenléc</text>
    <rect x="100" y="156" width="250" height="30" fill="#d6bd7e"/><text x="225" y="176" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a2a14">32 mm farost alátét</text>
    <rect x="100" y="186" width="250" height="40" fill="#c9a86a"/><text x="225" y="211" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a2a14">szaruzat + szigetelés</text>
  </g>
  <text x="225" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c0392b" font-weight="bold">nagy tömeg, csendes, javítható</text>

  <line x1="450" y1="70" x2="450" y2="300" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- RIGHT: femlemez -->
  <text x="675" y="75" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#5a7a8a">Korcolt fémlemez</text>
  <g>
    <rect x="550" y="100" width="250" height="22" fill="#7f8c8d"/><text x="810" y="116" font-family="sans-serif" font-size="11" fill="#666">fémlemez</text>
    <rect x="550" y="122" width="250" height="12" fill="#aab7c4"/><text x="810" y="132" font-family="sans-serif" font-size="11" fill="#666">páraáteresztő fólia</text>
    <rect x="550" y="134" width="250" height="26" fill="#d6bd7e"/><text x="675" y="151" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a2a14">22-32 mm farost</text>
    <rect x="550" y="160" width="250" height="22" fill="#8a6a3a"/><text x="675" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">22 mm OSB</text>
    <rect x="550" y="182" width="250" height="44" fill="#c9a86a"/><text x="675" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a2a14">faszerkezet</text>
  </g>
  <text x="675" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a7a8a" font-weight="bold">könnyű, gyors, 55 év garancia</text>

  <!-- bottom comparison strip -->
  <rect x="60" y="310" width="780" height="120" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="160" y="340" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Cserép →</text>
  <text x="160" y="365" font-family="sans-serif" font-size="12" fill="#555">klasszikus stílus</text>
  <text x="160" y="385" font-family="sans-serif" font-size="12" fill="#555">meredekebb tető</text>
  <text x="160" y="405" font-family="sans-serif" font-size="12" fill="#555">cserepenként javítható</text>
  <text x="560" y="340" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Fémlemez →</text>
  <text x="560" y="365" font-family="sans-serif" font-size="12" fill="#555">modern stílus</text>
  <text x="560" y="385" font-family="sans-serif" font-size="12" fill="#555">alacsony hajlásnál is jó</text>
  <text x="560" y="405" font-family="sans-serif" font-size="12" fill="#555">leghosszabb garancia</text>

  <text x="450" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">A 32 mm farost alátéthéjazat mindkettőnél a nyári hővédelem kulcsa.</text>
  <text x="880" y="490" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
