<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Tile grid pattern - floor -->
  <g transform="translate(150,100)">
    <!-- Floor tiles -->
    <g opacity="0.6">
      <rect x="0" y="0" width="80" height="80" rx="2" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="85" y="0" width="80" height="80" rx="2" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="170" y="0" width="80" height="80" rx="2" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="0" y="85" width="80" height="80" rx="2" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="85" y="85" width="80" height="80" rx="2" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="170" y="85" width="80" height="80" rx="2" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="0" y="170" width="80" height="80" rx="2" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="85" y="170" width="80" height="80" rx="2" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="170" y="170" width="80" height="80" rx="2" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
    </g>
    <text x="125" y="290" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#c4b5fd">Padlóburkolat</text>
    <text x="125" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#818cf8">3 500-12 000 Ft/m²</text>
  </g>

  <!-- Paint roller - wall -->
  <g transform="translate(500,120)">
    <rect x="20" y="0" width="160" height="240" rx="4" fill="#1e3a3a" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <!-- Paint stripes -->
    <rect x="35" y="20" width="130" height="30" rx="2" fill="#f1f5f9" opacity="0.15"/>
    <rect x="35" y="60" width="130" height="30" rx="2" fill="#f1f5f9" opacity="0.25"/>
    <rect x="35" y="100" width="130" height="30" rx="2" fill="#f1f5f9" opacity="0.35"/>
    <!-- Roller -->
    <rect x="60" y="150" width="80" height="25" rx="12" fill="#34d399" opacity="0.8"/>
    <line x1="100" y1="175" x2="100" y2="210" stroke="#6ee7b7" stroke-width="3"/>
    <text x="100" y="270" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#34d399">Festés</text>
    <text x="100" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6ee7b7">2 800-4 500 Ft/m²</text>
  </g>

  <!-- Door - interior doors -->
  <g transform="translate(800,100)">
    <rect x="40" y="0" width="120" height="250" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <circle cx="140" cy="130" r="6" fill="#f59e0b" opacity="0.8"/>
    <!-- Door frame -->
    <rect x="35" y="-5" width="130" height="5" fill="#f59e0b" opacity="0.4" rx="1"/>
    <rect x="35" y="0" width="5" height="255" fill="#f59e0b" opacity="0.3"/>
    <rect x="160" y="0" width="5" height="255" fill="#f59e0b" opacity="0.3"/>
    <text x="100" y="290" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fbbf24">Belső ajtók</text>
    <text x="100" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f59e0b">35-160e Ft/db</text>
  </g>

  <!-- Total cost badge -->
  <g transform="translate(400,400)">
    <rect x="0" y="0" width="400" height="50" rx="25" fill="#6366f1" opacity="0.3"/>
    <text x="200" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f1f5f9">Összesen: 4-10 millió Ft / 100 m²</text>
  </g>

  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Belső burkolatok költsége</text>
  <text x="600" y="550" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Padló, csempe, festés – árakkal 2026</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
