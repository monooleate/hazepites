<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e" rx="0"/>
  <defs>
    <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid2)"/>

  <!-- Gyár (bal) -->
  <g transform="translate(120, 160)">
    <!-- Gyárépület -->
    <rect x="0" y="60" width="320" height="180" fill="#2d3748" stroke="#22c55e" stroke-width="2"/>
    <!-- Tető -->
    <polygon points="0,60 160,10 320,60" fill="#1e3a2e" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Kémény -->
    <rect x="240" y="15" width="25" height="45" fill="#374151" stroke="#22c55e" stroke-width="1"/>
    <!-- Gyári ablaksor -->
    <rect x="20" y="90" width="50" height="40" fill="#0f172a" stroke="#4ade80" stroke-width="1" rx="1"/>
    <rect x="80" y="90" width="50" height="40" fill="#0f172a" stroke="#4ade80" stroke-width="1" rx="1"/>
    <rect x="140" y="90" width="50" height="40" fill="#0f172a" stroke="#4ade80" stroke-width="1" rx="1"/>
    <rect x="200" y="90" width="50" height="40" fill="#0f172a" stroke="#4ade80" stroke-width="1" rx="1"/>
    <rect x="260" y="90" width="50" height="40" fill="#0f172a" stroke="#4ade80" stroke-width="1" rx="1"/>
    <!-- Kapuk -->
    <rect x="30" y="160" width="80" height="80" fill="#0f172a" stroke="#4ade80" stroke-width="1.5" rx="3"/>
    <rect x="210" y="160" width="80" height="80" fill="#0f172a" stroke="#4ade80" stroke-width="1.5" rx="3"/>
    <!-- Falpanel kilépő elem -->
    <rect x="120" y="170" width="70" height="10" fill="#22c55e" rx="2"/>
    <rect x="120" y="185" width="70" height="10" fill="#22c55e" rx="2" opacity="0.7"/>
    <rect x="120" y="200" width="70" height="10" fill="#22c55e" rx="2" opacity="0.5"/>
    <!-- Nyíl jobbra (szállítás) -->
    <line x1="330" y1="150" x2="380" y2="150" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="380,142 400,150 380,158" fill="#22c55e"/>
    <!-- Talaj -->
    <line x1="-20" y1="240" x2="340" y2="240" stroke="#4a5568" stroke-width="2"/>
    <!-- Címke -->
    <text x="160" y="290" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#4ade80">KÉSZHÁZ</text>
    <text x="160" y="318" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#94a3b8">350-600e Ft/m²</text>
    <text x="160" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">3-6 hónap</text>
  </g>

  <!-- VS felirat -->
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#6366f1" opacity="0.4">VS</text>

  <!-- Helyszíni építés (jobb) -->
  <g transform="translate(700, 160)">
    <!-- Állványzat -->
    <line x1="0" y1="60" x2="0" y2="240" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="280" y1="60" x2="280" y2="240" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="-10" y1="100" x2="290" y2="100" stroke="#f59e0b" stroke-width="1"/>
    <line x1="-10" y1="170" x2="290" y2="170" stroke="#f59e0b" stroke-width="1"/>
    <!-- Ház félig kész -->
    <rect x="20" y="80" width="240" height="160" fill="#2d3748" stroke="#f59e0b" stroke-width="2"/>
    <!-- Tégla mintázat -->
    <g opacity="0.3">
      <line x1="20" y1="100" x2="260" y2="100" stroke="#f59e0b" stroke-width="0.5"/>
      <line x1="20" y1="115" x2="260" y2="115" stroke="#f59e0b" stroke-width="0.5"/>
      <line x1="20" y1="130" x2="260" y2="130" stroke="#f59e0b" stroke-width="0.5"/>
      <line x1="20" y1="145" x2="260" y2="145" stroke="#f59e0b" stroke-width="0.5"/>
      <line x1="80" y1="80" x2="80" y2="240" stroke="#f59e0b" stroke-width="0.3"/>
      <line x1="140" y1="80" x2="140" y2="240" stroke="#f59e0b" stroke-width="0.3"/>
      <line x1="200" y1="80" x2="200" y2="240" stroke="#f59e0b" stroke-width="0.3"/>
    </g>
    <!-- Befejezetlen tető (szarufák) -->
    <line x1="10" y1="80" x2="140" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <line x1="270" y1="80" x2="140" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <line x1="80" y1="80" x2="140" y2="35" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <line x1="200" y1="80" x2="140" y2="35" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <!-- Daru -->
    <line x1="260" y1="240" x2="260" y2="-20" stroke="#fbbf24" stroke-width="2"/>
    <line x1="260" y1="-20" x2="160" y2="-20" stroke="#fbbf24" stroke-width="2"/>
    <line x1="200" y1="-20" x2="200" y2="30" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Talaj -->
    <line x1="-20" y1="240" x2="300" y2="240" stroke="#4a5568" stroke-width="2"/>
    <!-- Címke -->
    <text x="140" y="290" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#fbbf24">HELYSZÍNI</text>
    <text x="140" y="318" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#94a3b8">500-850e Ft/m²</text>
    <text x="140" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">10-18 hónap</text>
  </g>

  <!-- Cím -->
  <text x="600" y="55" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#f1f5f9">Prefab vs Helyszíni Építés</text>
  <text x="600" y="90" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Ár · Idő · Minőség · Garancia · 2026</text>

  <!-- Brand -->
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>