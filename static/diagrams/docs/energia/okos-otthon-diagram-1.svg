<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <rect width="900" height="350" fill="#1a1a2e" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Okos otthon: előkészítés vs utólagos beépítés költsége</text>

  <!-- Bar chart comparison -->
  <!-- Item 1: Kábelezés -->
  <text x="50" y="80" font-family="sans-serif" font-size="13" fill="#e2e8f0">Kábelcsatorna (szobánként)</text>
  <rect x="280" y="65" width="60" height="22" rx="4" fill="#34d399" opacity="0.7"/>
  <text x="350" y="81" font-family="sans-serif" font-size="12" fill="#6ee7b7">3-5e Ft</text>
  <rect x="280" y="90" width="300" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="590" y="106" font-family="sans-serif" font-size="12" fill="#fca5a5">30-50e Ft</text>

  <!-- Item 2: Redőnymotor -->
  <text x="50" y="140" font-family="sans-serif" font-size="13" fill="#e2e8f0">Redőnymotor előkészítés (db)</text>
  <rect x="280" y="125" width="80" height="22" rx="4" fill="#34d399" opacity="0.7"/>
  <text x="370" y="141" font-family="sans-serif" font-size="12" fill="#6ee7b7">5-8e Ft</text>
  <rect x="280" y="150" width="350" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="640" y="166" font-family="sans-serif" font-size="12" fill="#fca5a5">40-70e Ft</text>

  <!-- Item 3: Hálózat -->
  <text x="50" y="200" font-family="sans-serif" font-size="13" fill="#e2e8f0">CAT6 hálózat (szobánként)</text>
  <rect x="280" y="185" width="50" height="22" rx="4" fill="#34d399" opacity="0.7"/>
  <text x="340" y="201" font-family="sans-serif" font-size="12" fill="#6ee7b7">2-4e Ft</text>
  <rect x="280" y="210" width="250" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="540" y="226" font-family="sans-serif" font-size="12" fill="#fca5a5">25-40e Ft</text>

  <!-- Item 4: Összesen -->
  <line x1="50" y1="245" x2="850" y2="245" stroke="#334155" stroke-width="1"/>
  <text x="50" y="275" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f1f5f9">Összesen (120 m² ház)</text>
  <rect x="280" y="258" width="120" height="28" rx="6" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="1"/>
  <text x="340" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34d399">200-400e Ft</text>
  <rect x="450" y="258" width="250" height="28" rx="6" fill="#f87171" opacity="0.2" stroke="#f87171" stroke-width="1"/>
  <text x="575" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f87171">1-2 millió Ft</text>

  <!-- Legend -->
  <rect x="280" y="305" width="14" height="14" rx="3" fill="#34d399" opacity="0.7"/>
  <text x="300" y="317" font-family="sans-serif" font-size="12" fill="#6ee7b7">Építkezés során</text>
  <rect x="430" y="305" width="14" height="14" rx="3" fill="#f87171" opacity="0.5"/>
  <text x="450" y="317" font-family="sans-serif" font-size="12" fill="#fca5a5">Utólagos beépítés</text>
  <text x="650" y="317" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">5-10x drágább!</text>

  <text x="450" y="345" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
