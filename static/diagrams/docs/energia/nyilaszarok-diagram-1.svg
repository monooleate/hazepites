<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#ffffff" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Ablak U-értékek összehasonlítása (W/m²K)</text>
  <text x="450" y="55" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">Alacsonyabb = jobb hőszigetelés</text>

  <!-- Y tengely -->
  <line x1="120" y1="80" x2="120" y2="320" stroke="#e2e8f0" stroke-width="1"/>
  <!-- X tengely -->
  <line x1="120" y1="320" x2="820" y2="320" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Skála (0 - 1.2) -->
  <text x="110" y="324" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">0</text>
  <text x="110" y="244" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">0.4</text>
  <line x1="120" y1="240" x2="820" y2="240" stroke="#f1f5f9" stroke-width="0.5"/>
  <text x="110" y="164" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">0.8</text>
  <line x1="120" y1="160" x2="820" y2="160" stroke="#f1f5f9" stroke-width="0.5"/>
  <text x="110" y="84" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">1.2</text>
  <line x1="120" y1="80" x2="820" y2="80" stroke="#f1f5f9" stroke-width="0.5"/>

  <!-- BB határ vonal -->
  <line x1="120" y1="90" x2="820" y2="90" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="830" y="94" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="bold">BB max: 1.15</text>

  <!-- Kétrétegű -->
  <rect x="160" y="120" width="80" height="200" fill="#94a3b8" rx="4"/>
  <text x="200" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="bold">1.0-1.1</text>
  <text x="200" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Kétrétegű</text>
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">NEM BB</text>

  <!-- Háromrétegű alap -->
  <rect x="290" y="200" width="80" height="120" fill="#3b82f6" rx="4"/>
  <text x="330" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">0.7-0.9</text>
  <text x="330" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">3 réteg</text>
  <text x="330" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6">BB ✓</text>

  <!-- Háromrétegű Low-E argon -->
  <rect x="420" y="220" width="80" height="100" fill="#6366f1" rx="4"/>
  <text x="460" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1" font-weight="bold">0.5-0.6</text>
  <text x="460" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Low-E argon</text>
  <text x="460" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6366f1">BB ✓✓</text>

  <!-- Háromrétegű krypton -->
  <rect x="550" y="250" width="80" height="70" fill="#8b5cf6" rx="4"/>
  <text x="590" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8b5cf6" font-weight="bold">0.3-0.5</text>
  <text x="590" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Low-E krypton</text>
  <text x="590" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b5cf6">Passzív ✓✓✓</text>

  <!-- Fa-alu -->
  <rect x="680" y="230" width="80" height="90" fill="#22c55e" rx="4"/>
  <text x="720" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e" font-weight="bold">0.6-0.8</text>
  <text x="720" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Fa-alu</text>
  <text x="720" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22c55e">Prémium ✓✓</text>

  <!-- Jelmagyarázat -->
  <line x1="200" y1="385" x2="240" y2="385" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="245" y="389" font-family="sans-serif" font-size="11" fill="#64748b">BB maximum követelmény (Uw ≤ 1.15 W/m²K)</text>
</svg>