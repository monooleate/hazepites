<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <!-- Left: self-managed (many people) -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="#312e81" stroke="#f59e0b" stroke-width="2"/>
    <text x="175" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fbbf24">Saját szervezés</text>
    <!-- Multiple worker icons -->
    <circle cx="60" cy="100" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="60" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Kőműves</text>
    <circle cx="130" cy="100" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="130" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Tetős</text>
    <circle cx="200" cy="100" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="200" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Villany</text>
    <circle cx="270" cy="100" r="18" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="270" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Gépész</text>
    <!-- YOU in center coordinating -->
    <circle cx="175" cy="195" r="25" fill="#f59e0b" opacity="0.3"/>
    <text x="175" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbbf24">TE</text>
    <!-- Lines from you to workers -->
    <line x1="155" y1="180" x2="60" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
    <line x1="165" y1="175" x2="130" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
    <line x1="185" y1="175" x2="200" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
    <line x1="195" y1="180" x2="270" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">Napi 3-4 óra koordináció</text>
  </g>
  <!-- VS -->
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#818cf8">VS</text>
  <!-- Right: general contractor (one person) -->
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="#312e81" stroke="#34d399" stroke-width="2"/>
    <text x="175" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#6ee7b7">Generálkivitelező</text>
    <!-- General contractor icon (one big) -->
    <circle cx="175" cy="120" r="35" fill="#22c55e" opacity="0.2"/>
    <text x="175" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34d399">GENERÁL</text>
    <text x="175" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6ee7b7">KIVITELEZŐ</text>
    <!-- Workers below -->
    <circle cx="60" cy="200" r="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="130" cy="200" r="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="270" cy="200" r="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="160" y1="155" x2="60" y2="190" stroke="#34d399" stroke-width="1.5"/>
    <line x1="170" y1="155" x2="130" y2="190" stroke="#34d399" stroke-width="1.5"/>
    <line x1="180" y1="155" x2="200" y2="190" stroke="#34d399" stroke-width="1.5"/>
    <line x1="190" y1="155" x2="270" y2="190" stroke="#34d399" stroke-width="1.5"/>
    <text x="175" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">Ő koordinálja – te heti 1-2 óra</text>
  </g>
  <!-- Bottom stats -->
  <g transform="translate(150, 430)">
    <text x="175" y="0" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">48-55M Ft</text>
    <text x="175" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">120 m² saját szervezés</text>
  </g>
  <g transform="translate(700, 430)">
    <text x="175" y="0" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#6ee7b7">58-68M Ft</text>
    <text x="175" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">120 m² generálkivitelező</text>
  </g>
  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f1f5f9">Generálkivitelezés vs saját szervezés</text>
  <text x="600" y="565" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94a3b8">Melyik éri meg jobban 2026-ban?</text>
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
