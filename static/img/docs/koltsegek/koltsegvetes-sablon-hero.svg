    <text x="10" y="95" font-family="sans-serif" font-size="12" fill="#fff">Belső munkák 15%</text>

    <rect x="0" y="114" width="520" height="28" rx="4" fill="#312e81" opacity="0.5"/>
    <rect x="0" y="114" width="78" height="28" rx="4" fill="#c4b5fd" opacity="0.8"/>
    <text x="10" y="133" font-family="sans-serif" font-size="12" fill="#1e1b4b">Külső 10%</text>

    <rect x="0" y="152" width="520" height="28" rx="4" fill="#312e81" opacity="0.5"/>
    <rect x="0" y="152" width="78" height="28" rx="4" fill="#34d399" opacity="0.8"/>
    <text x="10" y="171" font-family="sans-serif" font-size="12" fill="#fff">Tartalék 15-20%</text>
  </g>

  <!-- Key stat -->
  <g transform="translate(780,180)">
    <rect x="0" y="0" width="260" height="120" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <text x="130" y="40" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">19 tételes bontás</text>
    <text x="130" y="75" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#34d399">15-20%</text>
    <text x="130" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">tartalékkeret</text>
  </g>

  <text x="600" y="480" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Költségvetés sablon</text>
  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">Tervezd meg a büdzsét tételre pontosan</text>
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
