<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <rect width="900" height="350" fill="#1a1a2e" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Klíma méretezés – hűtőteljesítmény szobánként</text>

  <!-- Room size guide -->
  <!-- Row headers -->
  <text x="50" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Szoba méret</text>
  <text x="200" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Alap (jó szigetelés)</text>
  <text x="430" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">+ Déli ablak</text>
  <text x="620" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">+ Tetőtér</text>
  <text x="790" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Becsült ár</text>

  <line x1="30" y1="85" x2="870" y2="85" stroke="#334155" stroke-width="1"/>

  <!-- 15-20 m² -->
  <rect x="30" y="92" width="840" height="45" rx="4" fill="#312e81" opacity="0.2"/>
  <text x="50" y="118" font-family="sans-serif" font-size="14" fill="#e2e8f0">15-20 m²</text>
  <text x="100" y="132" font-family="sans-serif" font-size="10" fill="#6b7280">hálószoba</text>
  <rect x="200" y="105" width="80" height="22" rx="4" fill="#60a5fa" opacity="0.6"/>
  <text x="240" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">2,0 kW</text>
  <rect x="430" y="105" width="100" height="22" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="480" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">2,5 kW</text>
  <rect x="620" y="105" width="110" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="675" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">2,9 kW</text>
  <text x="790" y="120" font-family="sans-serif" font-size="13" fill="#c4b5fd">250-380e Ft</text>

  <!-- 20-30 m² -->
  <rect x="30" y="142" width="840" height="45" rx="4" fill="#312e81" opacity="0.3"/>
  <text x="50" y="168" font-family="sans-serif" font-size="14" fill="#e2e8f0">20-30 m²</text>
  <text x="100" y="182" font-family="sans-serif" font-size="10" fill="#6b7280">nappali</text>
  <rect x="200" y="155" width="100" height="22" rx="4" fill="#60a5fa" opacity="0.6"/>
  <text x="250" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">2,5-3,5 kW</text>
  <rect x="430" y="155" width="120" height="22" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="490" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">3,5-4,5 kW</text>
  <rect x="620" y="155" width="130" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="685" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">4,0-5,0 kW</text>
  <text x="790" y="170" font-family="sans-serif" font-size="13" fill="#c4b5fd">300-500e Ft</text>

  <!-- 30-50 m² -->
  <rect x="30" y="192" width="840" height="45" rx="4" fill="#312e81" opacity="0.2"/>
  <text x="50" y="218" font-family="sans-serif" font-size="14" fill="#e2e8f0">30-50 m²</text>
  <text x="100" y="232" font-family="sans-serif" font-size="10" fill="#6b7280">nyitott tér</text>
  <rect x="200" y="205" width="120" height="22" rx="4" fill="#60a5fa" opacity="0.6"/>
  <text x="260" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">3,5-5,0 kW</text>
  <rect x="430" y="205" width="140" height="22" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="500" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">4,5-6,5 kW</text>
  <rect x="620" y="205" width="150" height="22" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="695" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">5,5-7,5 kW</text>
  <text x="790" y="220" font-family="sans-serif" font-size="13" fill="#c4b5fd">400-650e Ft</text>

  <!-- Legend -->
  <line x1="30" y1="250" x2="870" y2="250" stroke="#334155" stroke-width="1"/>
  <text x="50" y="275" font-family="sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Korrekciós tényezők:</text>
  <rect x="220" y="262" width="12" height="12" rx="2" fill="#60a5fa" opacity="0.6"/>
  <text x="238" y="274" font-family="sans-serif" font-size="11" fill="#93c5fd">Alap méretezés</text>
  <rect x="380" y="262" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="398" y="274" font-family="sans-serif" font-size="11" fill="#fcd34d">Déli ablak: +20-30%</text>
  <rect x="560" y="262" width="12" height="12" rx="2" fill="#f87171" opacity="0.5"/>
  <text x="578" y="274" font-family="sans-serif" font-size="11" fill="#fca5a5">Tetőtér: +15-25%</text>

  <text x="450" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">Rossz szigetelés: további +30-40% | Konyha: +10-15%</text>
  <text x="450" y="348" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
