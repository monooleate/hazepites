<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gc" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gc)" opacity="0.3"/>

  <!-- 4 facade swatches on houses -->
  <!-- vakolat -->
  <rect x="100" y="200" width="230" height="280" rx="8" fill="#ecf0f1"/>
  <polygon points="90,200 215,140 340,200" fill="#34495e"/>
  <rect x="150" y="250" width="60" height="60" fill="#5dade2" opacity="0.3"/>
  <rect x="230" y="250" width="60" height="60" fill="#5dade2" opacity="0.3"/>
  <text x="215" y="460" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#34495e" font-weight="bold">Vakolat</text>

  <!-- faburkolat -->
  <rect x="360" y="200" width="230" height="280" rx="8" fill="#b5895a"/>
  <g stroke="#8a6a3a" stroke-width="2"><line x1="360" y1="240" x2="590" y2="240"/><line x1="360" y1="280" x2="590" y2="280"/><line x1="360" y1="320" x2="590" y2="320"/><line x1="360" y1="360" x2="590" y2="360"/><line x1="360" y1="400" x2="590" y2="400"/></g>
  <polygon points="350,200 475,140 600,200" fill="#34495e"/>
  <text x="475" y="460" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#3a2a14" font-weight="bold">Faburkolat</text>

  <!-- fémlemez -->
  <rect x="620" y="200" width="230" height="280" rx="8" fill="#7f8c8d"/>
  <g stroke="#5a6668" stroke-width="2"><line x1="660" y1="200" x2="660" y2="480"/><line x1="710" y1="200" x2="710" y2="480"/><line x1="760" y1="200" x2="760" y2="480"/><line x1="810" y1="200" x2="810" y2="480"/></g>
  <polygon points="610,200 735,140 860,200" fill="#34495e"/>
  <text x="735" y="460" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">Korcolt lemez</text>

  <!-- HPL / szalcement -->
  <rect x="880" y="200" width="230" height="280" rx="8" fill="#2c3e50"/>
  <g stroke="#1a2530" stroke-width="2"><line x1="995" y1="200" x2="995" y2="480"/><line x1="880" y1="290" x2="1110" y2="290"/><line x1="880" y1="380" x2="1110" y2="380"/></g>
  <polygon points="870,200 995,140 1120,200" fill="#1a2530"/>
  <text x="995" y="460" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#bdc3c7" font-weight="bold">HPL / szalcement</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="white">Homlokzatburkolat konnyuszerkezetnel</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Vakolat, fa, lemez vagy HPL?</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">szerelt burkolat = szellozo legres + paratechnika</text>
  <text x="600" y="525" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f39c12">Ugyanaz a farost fal – negy teljesen mas haz</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
