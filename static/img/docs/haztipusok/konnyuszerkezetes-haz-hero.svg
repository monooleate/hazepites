<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F0FDF4" rx="0"/>
  <!-- Background frame pattern -->
  <g opacity="0.06">
    <rect x="80" y="100" width="10" height="200" fill="#16A34A"/>
    <rect x="80" y="100" width="200" height="10" fill="#16A34A"/>
    <rect x="280" y="100" width="10" height="200" fill="#16A34A"/>
    <rect x="80" y="300" width="200" height="10" fill="#16A34A"/>
    <rect x="140" y="100" width="10" height="200" fill="#16A34A" opacity="0.5"/>
    <rect x="200" y="100" width="10" height="200" fill="#16A34A" opacity="0.5"/>
    <rect x="80" y="180" width="200" height="8" fill="#16A34A" opacity="0.5"/>
  </g>
  <!-- House illustration -->
  <g transform="translate(680, 50)">
    <!-- House body - timber frame look -->
    <rect x="40" y="170" width="300" height="240" fill="#FEF3C7" rx="4" stroke="#92400E" stroke-width="3"/>
    <!-- Frame lines (timber frame visible) -->
    <line x1="40" y1="250" x2="340" y2="250" stroke="#92400E" stroke-width="2.5" opacity="0.4"/>
    <line x1="40" y1="330" x2="340" y2="330" stroke="#92400E" stroke-width="2.5" opacity="0.4"/>
    <line x1="140" y1="170" x2="140" y2="410" stroke="#92400E" stroke-width="2.5" opacity="0.4"/>
    <line x1="240" y1="170" x2="240" y2="410" stroke="#92400E" stroke-width="2.5" opacity="0.4"/>
    <!-- Green roof -->
    <polygon points="20,170 190,50 360,170" fill="#16A34A" stroke="#15803D" stroke-width="2"/>
    <!-- Window 1 -->
    <rect x="70" y="210" width="50" height="60" fill="#BFDBFE" rx="2" stroke="#fff" stroke-width="2"/>
    <line x1="95" y1="210" x2="95" y2="270" stroke="#fff" stroke-width="1.5"/>
    <line x1="70" y1="240" x2="120" y2="240" stroke="#fff" stroke-width="1.5"/>
    <!-- Window 2 -->
    <rect x="260" y="210" width="50" height="60" fill="#BFDBFE" rx="2" stroke="#fff" stroke-width="2"/>
    <line x1="285" y1="210" x2="285" y2="270" stroke="#fff" stroke-width="1.5"/>
    <line x1="260" y1="240" x2="310" y2="240" stroke="#fff" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="160" y="320" width="60" height="90" fill="#92400E" rx="3"/>
    <circle cx="210" cy="370" r="4" fill="#FCD34D"/>
    <!-- Clock icon (fast build) -->
    <circle cx="370" cy="190" r="28" fill="#16A34A" stroke="#15803D" stroke-width="2"/>
    <text x="370" y="186" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">3–5</text>
    <text x="370" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff">hónap</text>
  </g>
  <!-- Info badges -->
  <rect x="60" y="120" width="350" height="55" rx="12" fill="#16A34A"/>
  <text x="235" y="155" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">330–550 ezer Ft/m² kulcsrakész</text>
  <rect x="60" y="195" width="350" height="50" rx="12" fill="#22C55E"/>
  <text x="235" y="227" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="600" fill="#fff">10–20%-kal olcsóbb a tégláénál</text>
  <rect x="60" y="265" width="350" height="50" rx="12" fill="#86EFAC" opacity="0.9"/>
  <text x="235" y="297" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#14532D">Építési idő: 3–5 hónap</text>
  <!-- Types -->
  <rect x="60" y="340" width="170" height="40" rx="8" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <text x="145" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#16A34A">Fa vázszerkezet</text>
  <rect x="240" y="340" width="170" height="40" rx="8" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <text x="325" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#16A34A">Acél vázszerkezet</text>
  <rect x="60" y="390" width="170" height="40" rx="8" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <text x="145" y="416" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#16A34A">SIP panel</text>
  <rect x="240" y="390" width="170" height="40" rx="8" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <text x="325" y="416" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#16A34A">CLT tömörfa</text>
  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#14532D">Könnyűszerkezetes ház 2026</text>
  <!-- Subtitle -->
  <text x="600" y="570" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#166534">Árak, típusok, előnyök és hátrányok</text>
  <!-- Brand -->
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#16A34A">hazepitesikalauz.hu</text>
</svg>
