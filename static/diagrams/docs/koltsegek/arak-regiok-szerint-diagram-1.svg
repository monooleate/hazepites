<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#f8fafc" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">120 m² téglaház teljes bekerülési költsége régiónként (telek + építés)</text>
  <!-- Horizontal bars -->
  <g transform="translate(30, 60)">
    <text x="200" y="25" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1e293b">Budapest agglomeráció</text>
    <rect x="210" y="10" width="600" height="26" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="820" y="28" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991b1b">104-137M Ft</text>

    <text x="200" y="65" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1e293b">Pest megye (30+ km)</text>
    <rect x="210" y="50" width="480" height="26" rx="4" fill="#f59e0b" opacity="0.7"/>
    <text x="700" y="68" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">81-108M Ft</text>

    <text x="200" y="105" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1e293b">Megyeszékhely</text>
    <rect x="210" y="90" width="400" height="26" rx="4" fill="#eab308" opacity="0.6"/>
    <text x="620" y="108" font-family="sans-serif" font-size="13" font-weight="bold" fill="#713f12">64-91M Ft</text>

    <text x="200" y="145" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1e293b">Kisváros</text>
    <rect x="210" y="130" width="340" height="26" rx="4" fill="#22c55e" opacity="0.6"/>
    <text x="560" y="148" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">55-77M Ft</text>

    <text x="200" y="185" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1e293b">Falu (Falusi CSOK)</text>
    <rect x="210" y="170" width="300" height="26" rx="4" fill="#34d399" opacity="0.6"/>
    <text x="520" y="188" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">49-70M Ft</text>
  </g>
  <!-- Breakdown legend -->
  <g transform="translate(210, 270)">
    <rect x="0" y="0" width="20" height="16" rx="3" fill="#6366f1" opacity="0.5"/>
    <text x="28" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Telek</text>
    <rect x="100" y="0" width="20" height="16" rx="3" fill="#818cf8" opacity="0.5"/>
    <text x="128" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Építés</text>
    <rect x="200" y="0" width="20" height="16" rx="3" fill="#c7d2fe" opacity="0.5"/>
    <text x="228" y="13" font-family="sans-serif" font-size="12" fill="#64748b">Tervezés + közmű + tartalék</text>
  </g>
  <!-- Key insight -->
  <rect x="30" y="300" width="840" height="65" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="325" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#991b1b">A Budapest agglomeráció és a legolcsóbb falu között: 55-67M Ft különbség</text>
  <text x="450" y="350" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#dc2626">Ez majdnem egy teljes vidéki ház ára – a telek teszi ki a különbség 60%-át</text>
</svg>
