<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F172A" rx="0"/>
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- House shape -->
  <polygon points="600,120 380,260 380,420 820,420 820,260" fill="#1E3A5F" stroke="#22C55E" stroke-width="2"/>
  <polygon points="600,120 380,260 820,260" fill="#1E4D6E" stroke="#22C55E" stroke-width="2"/>
  <!-- Thick insulation layer (outer) -->
  <rect x="362" y="258" width="18" height="164" fill="#22C55E" opacity="0.4" rx="2"/>
  <rect x="820" y="258" width="18" height="164" fill="#22C55E" opacity="0.4" rx="2"/>
  <rect x="380" y="420" width="440" height="14" fill="#22C55E" opacity="0.4" rx="2"/>
  <!-- Insulation label -->
  <text x="345" y="345" text-anchor="end" font-family="sans-serif" font-size="13" fill="#86EFAC">20–25 cm</text>
  <text x="345" y="362" text-anchor="end" font-family="sans-serif" font-size="13" fill="#86EFAC">szigetelés</text>
  <!-- Triple-pane window -->
  <rect x="460" y="290" width="80" height="90" rx="3" fill="#38BDF8" opacity="0.3" stroke="#38BDF8" stroke-width="2"/>
  <line x1="500" y1="290" x2="500" y2="380" stroke="#38BDF8" stroke-width="1"/>
  <line x1="460" y1="335" x2="540" y2="335" stroke="#38BDF8" stroke-width="1"/>
  <text x="500" y="400" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7DD3FC">3 réteg üveg</text>
  <!-- HRV unit -->
  <rect x="620" y="300" width="60" height="60" rx="8" fill="#22C55E" opacity="0.2" stroke="#22C55E" stroke-width="1.5"/>
  <text x="650" y="325" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#86EFAC">HRV</text>
  <text x="650" y="340" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#86EFAC">80–93%</text>
  <!-- Arrows for HRV -->
  <line x1="680" y1="315" x2="740" y2="315" stroke="#F87171" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="740" y1="345" x2="680" y2="345" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="760" y="315" font-family="sans-serif" font-size="10" fill="#FCA5A5">meleg ki</text>
  <text x="760" y="348" font-family="sans-serif" font-size="10" fill="#7DD3FC">friss be</text>
  <!-- Key metrics -->
  <rect x="80" y="480" width="220" height="80" rx="12" fill="#16A34A" opacity="0.15" stroke="#22C55E" stroke-width="1"/>
  <text x="190" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#22C55E">15 kWh/m²/év</text>
  <text x="190" y="535" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#86EFAC">max. fűtési energiaigény</text>
  <rect x="340" y="480" width="220" height="80" rx="12" fill="#0EA5E9" opacity="0.15" stroke="#38BDF8" stroke-width="1"/>
  <text x="450" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#38BDF8">n50 ≤ 0,6</text>
  <text x="450" y="535" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7DD3FC">légtömörség (1/h)</text>
  <rect x="600" y="480" width="220" height="80" rx="12" fill="#A855F7" opacity="0.15" stroke="#A78BFA" stroke-width="1"/>
  <text x="710" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#A78BFA">550–800k</text>
  <text x="710" y="535" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#C4B5FD">Ft/m² kulcsrakész</text>
  <rect x="860" y="480" width="220" height="80" rx="12" fill="#F59E0B" opacity="0.15" stroke="#FBBF24" stroke-width="1"/>
  <text x="970" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#FBBF24">–80–90%</text>
  <text x="970" y="535" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FDE68A">fűtésköltség</text>
  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#F8FAFC">Passzívház építés 2026</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94A3B8">Költségek, követelmények és a valóság</text>
  <!-- Brand -->
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#475569">hazepitesikalauz.hu</text>
</svg>