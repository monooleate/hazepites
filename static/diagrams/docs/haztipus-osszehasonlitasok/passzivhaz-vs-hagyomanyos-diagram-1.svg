<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#0f172a" rx="12"/>

  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" fill="white" font-weight="bold">Megtérülési szcenáriók – 120 m²-es ház, 20 éves időtáv</text>

  <!-- Y-axis labels -->
  <text x="45" y="100" text-anchor="end" font-family="sans-serif" font-size="12" fill="#94a3b8">Összköltség</text>
  <text x="45" y="115" text-anchor="end" font-family="sans-serif" font-size="12" fill="#94a3b8">(M Ft)</text>

  <!-- Chart area -->
  <g transform="translate(60,70)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="780" y2="0" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="80" x2="780" y2="80" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="160" x2="780" y2="160" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="240" x2="780" y2="240" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="320" x2="780" y2="320" stroke="#1e293b" stroke-width="1"/>

    <!-- Y axis values -->
    <text x="-10" y="5" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">100</text>
    <text x="-10" y="85" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">80</text>
    <text x="-10" y="165" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">60</text>
    <text x="-10" y="245" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">40</text>
    <text x="-10" y="325" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">20</text>

    <!-- Scenario 1: Hagyományos + gáz (20 év) -->
    <g transform="translate(50,0)">
      <!-- Építés: 68M -->
      <rect x="0" y="56" width="100" height="264" fill="#f97316" opacity="0.8" rx="4"/>
      <!-- Fűtés 20 év: 6-8M -->
      <rect x="0" y="24" width="100" height="32" fill="#ef4444" opacity="0.8" rx="4"/>
      <text x="50" y="18" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold">76M Ft</text>
      <text x="50" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Hagyományos</text>
      <text x="50" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">+ gáz</text>
    </g>

    <!-- Scenario 2: Hagyományos + hőszivattyú (20 év) -->
    <g transform="translate(230,0)">
      <rect x="0" y="56" width="100" height="264" fill="#f97316" opacity="0.8" rx="4"/>
      <rect x="0" y="40" width="100" height="16" fill="#fbbf24" opacity="0.8" rx="4"/>
      <text x="50" y="34" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fbbf24" font-weight="bold">71M Ft</text>
      <text x="50" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Hagyományos</text>
      <text x="50" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">+ hőszivattyú</text>
    </g>

    <!-- Scenario 3: Passzívház + hőszivattyú (20 év) -->
    <g transform="translate(410,0)">
      <rect x="0" y="24" width="100" height="296" fill="#3b82f6" opacity="0.8" rx="4"/>
      <rect x="0" y="18" width="100" height="6" fill="#60a5fa" opacity="0.8" rx="4"/>
      <text x="50" y="12" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#60a5fa" font-weight="bold">87M Ft</text>
      <text x="50" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Passzívház</text>
      <text x="50" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">+ hőszivattyú</text>
    </g>

    <!-- Scenario 4: Passzívház + zöld hitel (20 év) -->
    <g transform="translate(590,0)">
      <rect x="0" y="56" width="100" height="264" fill="#22c55e" opacity="0.8" rx="4"/>
      <rect x="0" y="52" width="100" height="4" fill="#86efac" opacity="0.8" rx="4"/>
      <text x="50" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="bold">75M Ft</text>
      <text x="50" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Passzívház</text>
      <text x="50" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#22c55e">+ zöld hitel</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(100,460)">
    <rect x="0" y="0" width="16" height="16" fill="#f97316" opacity="0.8" rx="2"/>
    <text x="22" y="13" font-family="sans-serif" font-size="12" fill="#94a3b8">Építési költség</text>

    <rect x="160" y="0" width="16" height="16" fill="#ef4444" opacity="0.8" rx="2"/>
    <text x="182" y="13" font-family="sans-serif" font-size="12" fill="#94a3b8">Gázfűtés 20 év</text>

    <rect x="310" y="0" width="16" height="16" fill="#fbbf24" opacity="0.8" rx="2"/>
    <text x="332" y="13" font-family="sans-serif" font-size="12" fill="#94a3b8">Hősz. fűtés 20 év</text>

    <rect x="490" y="0" width="16" height="16" fill="#60a5fa" opacity="0.8" rx="2"/>
    <text x="512" y="13" font-family="sans-serif" font-size="12" fill="#94a3b8">Passzív fűtés 20 év</text>
  </g>

  <!-- Annotation -->
  <text x="450" y="500" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="bold">Zöld hitellel a passzívház 20 éves összköltségben is versenyképes!</text>

  <text x="450" y="515" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">hazepitesikalauz.hu</text>
</svg>
