<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <!-- Simplified Hungary map outline -->
  <g transform="translate(300, 60)">
    <!-- Budapest dot -->
    <circle cx="280" cy="140" r="18" fill="#ef4444" opacity="0.8"/>
    <text x="280" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff">BP</text>
    <text x="280" y="175" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#fca5a5">759e</text>
    <!-- Győr -->
    <circle cx="130" cy="100" r="12" fill="#f59e0b" opacity="0.7"/>
    <text x="130" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fbbf24">Győr</text>
    <text x="130" y="130" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fbbf24">650e</text>
    <!-- Debrecen -->
    <circle cx="480" cy="120" r="12" fill="#22c55e" opacity="0.7"/>
    <text x="480" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7">Debrecen</text>
    <text x="480" y="150" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6ee7b7">560e</text>
    <!-- Szeged -->
    <circle cx="370" cy="260" r="12" fill="#22c55e" opacity="0.7"/>
    <text x="370" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7">Szeged</text>
    <text x="370" y="290" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6ee7b7">550e</text>
    <!-- Pécs -->
    <circle cx="170" cy="250" r="12" fill="#22c55e" opacity="0.7"/>
    <text x="170" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7">Pécs</text>
    <text x="170" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6ee7b7">540e</text>
    <!-- Miskolc/Eger area -->
    <circle cx="380" cy="70" r="12" fill="#34d399" opacity="0.7"/>
    <text x="380" y="55" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7">É-Mo.</text>
    <text x="380" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#34d399">500e</text>
  </g>
  <!-- Legend -->
  <g transform="translate(100, 400)">
    <circle cx="10" cy="8" r="8" fill="#ef4444" opacity="0.8"/>
    <text x="25" y="13" font-family="sans-serif" font-size="13" fill="#94a3b8">700+ ezer Ft/m²</text>
    <circle cx="200" cy="8" r="8" fill="#f59e0b" opacity="0.7"/>
    <text x="215" y="13" font-family="sans-serif" font-size="13" fill="#94a3b8">600-700e Ft/m²</text>
    <circle cx="400" cy="8" r="8" fill="#22c55e" opacity="0.7"/>
    <text x="415" y="13" font-family="sans-serif" font-size="13" fill="#94a3b8">500-600e Ft/m²</text>
    <circle cx="600" cy="8" r="8" fill="#34d399" opacity="0.7"/>
    <text x="615" y="13" font-family="sans-serif" font-size="13" fill="#94a3b8">430-500e Ft/m²</text>
  </g>
  <!-- Difference callout -->
  <rect x="350" y="440" width="500" height="50" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
  <text x="600" y="472" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Budapest vs vidék: 41% különbség = 26M Ft (120 m²)</text>
  <!-- Title -->
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f1f5f9">Árak régiók szerint 2026</text>
  <text x="600" y="575" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94a3b8">Budapest vs vidék – a valós különbségek</text>
  <text x="600" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6366f1">hazepitesikalauz.hu</text>
</svg>
