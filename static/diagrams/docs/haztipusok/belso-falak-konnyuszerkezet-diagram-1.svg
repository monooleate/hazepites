<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="bold" fill="#1a1a2e">Belső teherhordó falak rétegrendje</text>

  <!-- EXTRA -->
  <text x="225" y="72" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#27ae60">Extra teherhordó (~210 mm)</text>
  <g>
    <rect x="90" y="90" width="270" height="22" fill="#e74c3c" opacity="0.6"/><text x="375" y="106" font-size="10" fill="#666">gk 15</text>
    <rect x="90" y="112" width="270" height="18" fill="#8a6a3a"/><text x="375" y="125" font-size="10" fill="#666">OSB 12</text>
    <rect x="90" y="130" width="270" height="50" fill="#c9a86a"/><text x="225" y="160" text-anchor="middle" font-size="11" fill="#3a2a14">160 mm váz + befújt farost</text>
    <rect x="90" y="180" width="270" height="18" fill="#8a6a3a"/><text x="375" y="193" font-size="10" fill="#666">OSB 12</text>
    <rect x="90" y="198" width="270" height="22" fill="#e74c3c" opacity="0.6"/><text x="375" y="214" font-size="10" fill="#666">gk 15</text>
  </g>
  <text x="225" y="245" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">beépített födém terhének felét is viseli</text>

  <line x1="450" y1="80" x2="450" y2="260" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- NORMAL -->
  <text x="675" y="72" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2980b9">Normál teherhordó (~148 mm)</text>
  <g>
    <rect x="540" y="95" width="270" height="18" fill="#e67e22" opacity="0.6"/><text x="825" y="108" font-size="10" fill="#666">gk 12</text>
    <rect x="540" y="113" width="270" height="16" fill="#8a6a3a"/><text x="825" y="125" font-size="10" fill="#666">OSB 12</text>
    <rect x="540" y="129" width="270" height="40" fill="#c9a86a"/><text x="675" y="153" text-anchor="middle" font-size="11" fill="#3a2a14">100 mm váz + farost</text>
    <rect x="540" y="169" width="270" height="16" fill="#8a6a3a"/><text x="825" y="181" font-size="10" fill="#666">OSB 12</text>
    <rect x="540" y="185" width="270" height="18" fill="#e67e22" opacity="0.6"/><text x="825" y="198" font-size="10" fill="#666">gk 12</text>
  </g>
  <text x="675" y="245" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">helyiségelválasztás, könnyebb teher</text>

  <!-- bontható box -->
  <rect x="90" y="285" width="720" height="70" rx="8" fill="#fff9e6" stroke="#f1c40f"/>
  <text x="450" y="312" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8a6d00">A gyártmányterv jelöli, melyik fal teherhordó és melyik bontható.</text>
  <text x="450" y="335" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#777">Téglánál ez találgatás – favázasnál dokumentált, az átépítés tervezhető és biztonságos.</text>

  <!-- ket tulajdonsag -->
  <rect x="90" y="370" width="350" height="60" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="265" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Hangszigetelés</text>
  <text x="265" y="415" text-anchor="middle" font-size="11" fill="#555">kétoldali OSB + gk + befújt farost</text>
  <rect x="460" y="370" width="350" height="60" rx="8" fill="#f8f9fa" stroke="#ddd"/>
  <text x="635" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Tűzvédelem</text>
  <text x="635" y="415" text-anchor="middle" font-size="11" fill="#555">tűzgátló (piros) gk mindkét oldalon</text>

  <text x="450" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c0392b">Teherhordó falat csak statikus által méretezett megerősítéssel szabad bontani!</text>
  <text x="880" y="490" text-anchor="end" font-family="sans-serif" font-size="11" fill="#bbb">hazepitesikalauz.hu</text>
</svg>
