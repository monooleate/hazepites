<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e" rx="0"/>

  <!-- Background grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>

  <!-- Rising cost arrow (main visual) -->
  <path d="M 200 450 L 400 380 L 550 320 L 680 240 L 800 180 L 900 120" stroke="#e74c3c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="910,115 920,140 895,130" fill="#e74c3c"/>

  <!-- Planned budget line (flat) -->
  <path d="M 200 380 L 900 380" stroke="#3498db" stroke-width="3" stroke-dasharray="12,6" fill="none"/>
  <text x="920" y="385" font-family="sans-serif" font-size="14" fill="#3498db">Tervezett</text>

  <!-- Gap indicators -->
  <line x1="550" y1="320" x2="550" y2="380" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="560" y="355" font-family="sans-serif" font-size="13" fill="#f39c12">+12%</text>

  <line x1="800" y1="180" x2="800" y2="380" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="810" y="290" font-family="sans-serif" font-size="15" fill="#f39c12" font-weight="bold">+25%</text>

  <!-- Cost breakdown icons -->
  <!-- Material prices -->
  <rect x="120" y="490" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="190" y="520" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#e74c3c">📦</text>
  <text x="190" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Anyagár</text>
  <text x="190" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c">+8-15%/év</text>

  <!-- Plan changes -->
  <rect x="290" y="490" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1.5"/>
  <text x="360" y="520" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#f39c12">📐</text>
  <text x="360" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Tervmódosítás</text>
  <text x="360" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f39c12">+2-5M Ft</text>

  <!-- Missing items -->
  <rect x="460" y="490" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="530" y="520" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#9b59b6">📋</text>
  <text x="530" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Kimaradt tételek</text>
  <text x="530" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9b59b6">+3-8M Ft</text>

  <!-- Ground issues -->
  <rect x="630" y="490" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="700" y="520" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#2ecc71">⛏️</text>
  <text x="700" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Talajprobléma</text>
  <text x="700" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2ecc71">+1-3M Ft</text>

  <!-- Delays -->
  <rect x="800" y="490" width="140" height="80" rx="8" fill="#2a2a4e" stroke="#3498db" stroke-width="1.5"/>
  <text x="870" y="520" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#3498db">⏱️</text>
  <text x="870" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ccc">Csúszás</text>
  <text x="870" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3498db">+200e/hó</text>

  <!-- Stat badge -->
  <rect x="950" y="490" width="140" height="80" rx="8" fill="#e74c3c" opacity="0.9"/>
  <text x="1020" y="525" text-anchor="middle" font-family="sans-serif" font-size="28" fill="white" font-weight="bold">70%</text>
  <text x="1020" y="550" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">túllép a</text>
  <text x="1020" y="563" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">költségvetésen</text>

  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="white">Költségtúllépés okai házépítésnél</text>
  <text x="600" y="110" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Miért lesz mindig drágább – és hogyan védekezz?</text>

  <!-- Brand -->
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
