<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#ffffff" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Építési idővonal – készház vs hagyományos (hónapok)</text>

  <!-- Hónap skála -->
  <g transform="translate(180, 70)">
    <line x1="0" y1="0" x2="660" y2="0" stroke="#e2e8f0" stroke-width="1"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">0</text>
    <text x="110" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">3</text>
    <text x="220" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">6</text>
    <text x="330" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">9</text>
    <text x="440" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">12</text>
    <text x="550" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">15</text>
    <text x="660" y="-8" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">18</text>
    <!-- Jelölővonalak -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="220" y1="0" x2="220" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="330" y1="0" x2="330" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="440" y1="0" x2="440" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="550" y1="0" x2="550" y2="280" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="280" stroke="#f1f5f9" stroke-width="1"/>
  </g>

  <!-- KÉSZHÁZ idővonal -->
  <text x="20" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#22c55e">KÉSZHÁZ</text>
  <!-- Tervezés -->
  <rect x="180" y="95" width="110" height="22" fill="#86efac" rx="4"/>
  <text x="235" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">Tervezés</text>
  <!-- Alapozás -->
  <rect x="290" y="95" width="55" height="22" fill="#4ade80" rx="4"/>
  <text x="317" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">Alap</text>
  <!-- Gyári gyártás (párhuzamosan) -->
  <rect x="290" y="122" width="73" height="22" fill="#22c55e" rx="4"/>
  <text x="326" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">Gyártás ↕</text>
  <!-- Összeszerelés -->
  <rect x="345" y="95" width="37" height="22" fill="#16a34a" rx="4"/>
  <text x="363" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Össze</text>
  <!-- Belső munkák -->
  <rect x="382" y="95" width="110" height="22" fill="#15803d" rx="4"/>
  <text x="437" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">Belső munkák</text>
  <!-- Beköltözés jelző -->
  <line x1="492" y1="85" x2="492" y2="150" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="492" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#22c55e" font-weight="bold">~ 6 hónap</text>

  <!-- HAGYOMÁNYOS idővonal -->
  <text x="20" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">HAGYOM.</text>
  <!-- Tervezés -->
  <rect x="180" y="205" width="110" height="22" fill="#fde68a" rx="4"/>
  <text x="235" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#713f12">Tervezés</text>
  <!-- Alapozás -->
  <rect x="290" y="205" width="55" height="22" fill="#fbbf24" rx="4"/>
  <text x="317" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#713f12">Alap</text>
  <!-- Falazás -->
  <rect x="345" y="205" width="73" height="22" fill="#f59e0b" rx="4"/>
  <text x="381" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">Falazás</text>
  <!-- Tető -->
  <rect x="418" y="205" width="55" height="22" fill="#d97706" rx="4"/>
  <text x="445" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">Tető</text>
  <!-- Száradás -->
  <rect x="473" y="205" width="73" height="22" fill="#fcd34d" rx="4" opacity="0.6"/>
  <text x="509" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#713f12">Száradás</text>
  <!-- Gépészet + belső -->
  <rect x="546" y="205" width="147" height="22" fill="#b45309" rx="4"/>
  <text x="619" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">Gépészet + Belső munkák</text>
  <!-- Beköltözés jelző -->
  <line x1="693" y1="195" x2="693" y2="255" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="693" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f59e0b" font-weight="bold">~ 14 hónap</text>

  <!-- Idő-megtakarítás nyíl -->
  <line x1="492" y1="290" x2="693" y2="290" stroke="#ef4444" stroke-width="2"/>
  <polygon points="492,285 482,290 492,295" fill="#ef4444"/>
  <polygon points="693,285 703,290 693,295" fill="#ef4444"/>
  <text x="592" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ef4444" font-weight="bold">8 hónap megtakarítás</text>

  <!-- Jelmagyarázat -->
  <rect x="280" y="365" width="14" height="10" fill="#22c55e" rx="2"/>
  <text x="300" y="374" font-family="sans-serif" font-size="12" fill="#334155">Készház</text>
  <rect x="400" y="365" width="14" height="10" fill="#f59e0b" rx="2"/>
  <text x="420" y="374" font-family="sans-serif" font-size="12" fill="#334155">Hagyományos</text>
  <rect x="540" y="365" width="14" height="10" fill="#22c55e" rx="2" opacity="0.8"/>
  <text x="560" y="374" font-family="sans-serif" font-size="12" fill="#334155">↕ = párhuzamos</text>
</svg>