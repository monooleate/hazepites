<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <defs><pattern id="gvsz" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a4e" stroke-width="0.5"/></pattern></defs>
  <rect width="1200" height="630" fill="url(#gvsz)" opacity="0.3"/>

  <!-- distributor (osztó) -->
  <rect x="160" y="290" width="60" height="120" rx="6" fill="#2a2a4e" stroke="#3498db" stroke-width="2"/>
  <text x="190" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5dade2">osztó-gyűjtő</text>
  <!-- single pipes to fixtures (no joints) -->
  <g stroke="#5dade2" stroke-width="3" fill="none">
    <path d="M 220 310 C 320 300, 360 240, 460 240"/>
    <path d="M 220 340 C 340 340, 400 340, 500 340"/>
    <path d="M 220 380 C 320 390, 380 440, 480 440"/>
  </g>
  <g fill="#3498db"><circle cx="465" cy="240" r="10"/><circle cx="505" cy="340" r="10"/><circle cx="485" cy="440" r="10"/></g>
  <text x="350" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5dade2">egy cső a sarokszelepig – nincs kötés a padlóban</text>

  <!-- szennyviz size badges -->
  <rect x="700" y="230" width="380" height="60" rx="8" fill="#2a2a4e" stroke="#e67e22" stroke-width="1"/>
  <circle cx="740" cy="260" r="22" fill="none" stroke="#e67e22" stroke-width="3"/>
  <text x="790" y="256" font-family="sans-serif" font-size="15" fill="#e67e22" font-weight="bold">WC: 110 mm</text>
  <text x="790" y="276" font-family="sans-serif" font-size="13" fill="#ccc">tokos, gumigyűrűs</text>

  <rect x="700" y="300" width="380" height="60" rx="8" fill="#2a2a4e" stroke="#f39c12" stroke-width="1"/>
  <circle cx="740" cy="330" r="14" fill="none" stroke="#f39c12" stroke-width="3"/>
  <text x="790" y="326" font-family="sans-serif" font-size="15" fill="#f39c12" font-weight="bold">mosdó/zuhany: 50 mm</text>
  <text x="790" y="346" font-family="sans-serif" font-size="13" fill="#ccc">lejtéssel, 90° nélkül</text>

  <rect x="700" y="370" width="380" height="60" rx="8" fill="#2a2a4e" stroke="#9b59b6" stroke-width="1"/>
  <circle cx="740" cy="400" r="9" fill="none" stroke="#bb8fce" stroke-width="3"/>
  <text x="790" y="396" font-family="sans-serif" font-size="15" fill="#bb8fce" font-weight="bold">kondenzvíz: 32 mm</text>
  <text x="790" y="416" font-family="sans-serif" font-size="13" fill="#ccc">klíma / fan-coil</text>

  <rect x="160" y="470" width="880" height="50" rx="8" fill="#2a2a4e" stroke="#2ecc71" stroke-width="1"/>
  <text x="600" y="501" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#2ecc71">Nyomáspróba + víztartási próba eltakarás előtt – jegyzőkönyvvel</text>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Víz- és szennyvízrendszer</text>
  <text x="600" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ccc">Amit a falban nem látsz</text>
  <text x="600" y="135" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888">a megbízhatóság a kivitelezés módján múlik, nem a szerencsén</text>
  <text x="600" y="618" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">hazepitesikalauz.hu</text>
</svg>
